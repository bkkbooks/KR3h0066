body:
  text: 書法正傳卷五常熟馮武撰纂言上李斯用筆法凡書非但裹結流快終藉筆力輕徤蒙將軍恬筆經猶有簡畧斯更脩改望益於用用筆法先急迴後疾下鷹望鵬逝信之自然不得重改如遊魚得水景山興雲或卷或舒乍輕乍重善思之此理可見斯書秦望紀功石云吾死後五百三十年閒當有一人替吾蹟焉一本作九百四十年簡縁云此段似説正書非論玉箸疑未必是斯言也蕭何筆法漢相國何善篆籕其論筆道云夫書勢法猶若登陣變通正在腕前文武貴於筆下出没須有倚伏開闔藉乎陰陽每欲書字喻如安營下寨穩思審之方可用筆筆者心也墨者意也書者營也力也通也塞也決也依此遵妙矣何為殿成覃思三月以題其額觀者如流水何使秃筆常自為之簡縁云亦未說著痛痒但就唐太宗餘意而為之酇侯恐無此言蔡邕書說蔡邕入嵩山學書於石室内得素書八角垂芒頗似篆焉寫李斯并史籕等用筆勢喈得之不餐三日唯大呌歡喜若對千人喈因學之三年便妙得其理用筆頗異當代善書者咸異焉喈自書石經於太學觀者如市於㑹稽作筆論曰書者散也欲書先散懷抱任意恣情然後書之若綰閒務雖中山兔毫不能佳也先黙坐靜思隨意取擬言不出口心不再思沈宻神彩若對人君則無不善矣字體形勢若坐若行若飛若動若往若來若卧若起若愁若喜若春夏秋冬若鳥啄形若蟲蝕木若利戈刄若強弓矢若水火若樹雲若日月縱横有象可謂書矣蔡邕石室神授筆勢邕嘗居一室不寐恍然見一客厥狀甚異授以九勢言訖而没琰字文姬邕之女也蔡琰云臣父造八分時神授筆法曰書肇於自然自然既立陰陽生焉陰陽既生形氣立矣藏頭䕶尾力在字中下筆用力獻酧之麗故曰勢來不可止勢去不可遏書有二法一曰疾二曰澀得疾澀二法書妙盡矣夫書稟乎人性疾者不可使之令徐徐者不可使之令疾筆惟軟則竒怪生焉九勢列後自然無師授而合於先聖矣簡縁云八體之中有疾有澀宜疾則疾不疾則失勢宜澀則澀不澀則病生疾徐在心形體在字得心應手妙出筆端鍾繇筆法鍾繇少時隨劉勝往抱犢山學書三年比還與邯鄲淳韋誕孫子荆闗枇杷魏太祖等議用筆於韋誕坐中見蔡邕筆法自拊胷盡青因嘔血魏太祖以五靈丹活之苦求邕法誕不與及誕死繇陰令人發其墓遂得之故知多力豐筋者聖無力無筋者病簡縁云二語真骨髓一一從其消息而用之由是更妙繇曰筆迹者界也流美者人也或作用筆者天也流美者地也非凡庸所知臨死乃囊中取出以授其子㑹曰吾精思學書三十年讀他書未終盡學其字與人居畫地廣數步卧畫被穿過表如厠終日忘歸毎見萬類皆書象之簡縁云用心如此之專方成藝業繇善三色書然最妙八分也㸃如山頽滴如雨驟纎如絲毫輕如雲霧去若鳴鳯之遊雲漢來若遊女之入花林燦燦分明遥遥逺藹者矣晉衞夫人筆陣圖衞恒之從女汝陰太守李矩之妻名鑠字茂猗夫三端之妙莫先乎用筆六藝之奥莫匪乎銀鈎昔秦丞相李斯見周穆王書七日興歎患其無骨蔡尚書入鴻都觀碣十旬不返嗟其出羣故知達其源者少暗其理者多近代以來殊不師古縁情棄道纔記姓名或學不該贍聞見又寡致使成功不就虚費精神自非通靈感物不可與談斯道矣今刪李斯筆妙更加潤色總七條并作其形容列事如左貽諸子孫永為模範庶將來君子時復覽焉筆要取崇山絶仭中兔毫八九月收之其筆頭長一寸管長五寸鋒齊腰強者其硯取煎涸新石潤澀相兼浮津耀墨者其墨取廬山之松煙代郡之鹿膠十年以上強如石者為之紙取東陽魚卵虚柔滑淨者凡學書字先學執筆若真書去筆頭二寸一分若行草書去筆頭三寸一分執之下筆㸃畫芟波屈曲皆須盡一身之力而送之若初學先大書不得從小善鑒者不寫善寫者不鑒善筆力者多骨不善筆力者多肉多骨微肉者謂之筋書多肉微骨者謂之墨豬多力豐筋者聖無力無筋者病一一從其消息而用之一如千里陣雲隱隱然其實有形丶如髙峯墜石磕磕然實如崩也丿如陸斷犀象丨如萬嵗枯藤如崩浪雷奔如百鈞弩發􅗵如勁弩筋節右七條筆陣出入斬斫圖執筆有七種有心急而執筆緩者有心緩而執筆急者若執筆近而不能𦂳者心手不齊意後筆前者敗若執筆逺而急意前筆後者勝又有六種用筆結構圓備如篆法飄颺灑落如章草凶險可畏如八分窈窕出入如飛白耿介特立如鶴頭鬱拔縱横如古隸然心存委曲每為一字各象其形斯造妙矣書道畢矣永和四年上虞製記簡縁云知此方可寫正書王右軍題衛夫人筆陣圖後夫紙者陣也筆者刀矟也墨者鍪甲也水硯者城池也心意者將軍也本領者副將也結構者謀畧也颺筆者吉凶也出入者號令也屈折者殺戮也夫欲書先乾研墨凝神靜思預想字形大小偃仰平直振動令筋脈相連意在筆前然後作字若平直相似狀如算子上下方整前後齊平此不是書但得其㸃畫耳昔宋翼嘗作此書翼是鍾繇弟子繇乃叱之翼三年不敢見繇即潛心改蹟每作一波常三過折筆每作一㸃常隠鋒而為之每作一横畫如列陣之排雲每作一戈如百鈞之弩發每作一㸃如髙峯墜石屈折如鋼鈎每作一牽如萬嵗枯藤每作一放縱如足行之趨驟翼先來書惡晉太康中有人於許下破鍾公墓遂得筆勢論翼乃讀之依此法學名遂大振欲真書及行書皆依此法若欲學草又别有法須緩前急後字體形勢狀等龍蛇相鈎聨不斷仍須稜側起伏用筆亦不使齊平大小一等每作一字須有㸃處且作餘字總竟然後安㸃其㸃須空中遥擲筆作之其草書亦復須象篆勢八分古隸相雜亦不得急令墨不入紙若急作意思淺薄筆即直過惟有章草及章程行押等不用此勢但用擊石波而已其擊石波者缺波也又八分更有一波謂之隼尾波其即鍾公太山銘及魏文帝受禪碑中已有此體夫書先須引八分章草入隸字中發人意氣若直取俗字不能先發羲之少學衞夫人書將謂大能及後渡江北游名山比見李斯曹喜等書又之許下見鍾繇梁鵠書又之洛下見蔡邕石經三體書又之從兄洽處見張旭華嶽碑始知學衛夫人書徒費年月耳羲之遂改本師仍於衆碑學習焉遂成書爾時年五十有三或恐風燭奄及聊遺教於子孫耳可藏之石室千金勿傳非其人也永和十二年四月十二書簡縁云此篇非右軍不能道王羲之論書吾書比之鍾張當抗衡或謂過之張草猶當雁行張精熟過人臨池學書池水盡墨若吾躭之若此未必謝之後達解者知其評之不虚吾盡心精作亦久尋諸舊書惟鍾張故為絶倫其餘為是小佳不足在意去此二賢僕書次之須得書意轉深㸃畫之閒皆有意自有言所不能盡得其妙者事事皆然平南李式論君不謝平南即右軍叔平南將軍王廙也李式晉侍中簡縁云非自道必不能如此之確而妥王右軍筆勢論見周子發書苑菁華第一卷告汝子敬吾觀汝書性過人仍未閑規矩父不親教自古有之令述筆勢論一篇開汝之性凡諸字勢總立十章章有指歸定其模楷審其舛謬撮其要實録其便宜或變體處多罕測其本轉筆者衆莫識其源懸針垂露之法固難體制揚波騰氣之勢足可迷人故謂辨其所由堪愈膏肓之疾今書樂毅論一本筆勢論一篇貽子藏之勿播於外窮研篆籕功省而易成纂習精專形彰而勢顯存意學者兩月可見其成天性靈者百日即知其本此筆勢可為家珍學者秘之世有名譽筆削久矣始克有成研精覃思審諸規矩存其要畧以為斯論一曰凡欲書時先乾研墨安筆水中研墨須調不得生用生用即浸潯漫澀㸃筆之法只可大如菽麥也不宜多㸃㸃多則不利横畫之法不得緩緩則不𦂳竪牽之法不得急宜卓把筆筆頭先行筆管須卓立竪傍則曲也倚竿之勢亦須緩干戈形勢頭尾大小輕徤妙好真書如此行草任意二曰初學字時不可盡其形勢先想字成意在筆前一遍正其手脚二遍須學形勢三遍須令似本四遍加其遒潤五遍每加抽拔使不生澀如筆下未滑不可便休三行兩行臨之未休取滑徤為能勿計其遍數也三曰平穏為本分間布白上下齊平均其體勢大者促之令小小者縱之令大自然寛狹得所不失其宜横則正如長舟之截江渚竪則直如冬筍之挺寒谷四曰作㸃之法必須磊磊如大石之當衢路或如蹲鴟或如蝌斗或如𤓰瓣或如鶚口或如鼠矢凡此之類各禀其儀用之落竿之法峨峨如長松之倚谿谷若欲倒也復似百鈞之弩初張處其戈意妙理難窮放似弓張箭發收如虎鬭龍驤直如勁松之臨谷曲類懸鈎之釣水簡縁云落竿戈法也五曰立人之形如烏鳥之在柱首信任使之類是也屈脚之勢彎彎如角弓之張烏焉為島之類是也腕脚之勢要如壯士之屈臂鳯飛凡氣之類是也急引疾牽如雲中之掣電還逺送道之類是也六曰日月目具等字之例中畫不得觸其右右又宜粗腕脚􅀈斡上搽下撚終始轉折悉令和韻勿使蜂腰鶴膝放縱宜從氣力作右邊折角疾牽下微開左畔斡轉令取登對勿使腰中傷慢視筆取勢直截而下七曰凡字處中畫之法皆不得倒其左右横貴乎纎竪貴乎粗分閒布白逺近宜均上下得所自然平穏並須逓相掩蓋不可孤露形影藏鋒㸃畫使左先右回右亦然藏頭㸃畫懸筆屬紙令筆心當畫中行八曰作字之勢在乎精思熟察然後下筆撆不宜緩緩則鈍捺不宜遲遲則失力脚不宜斜斜則不正腹不宜促促則太濶啄不宜賖賖則失勢囘角不宜峻不宜作稜角二字合為一體者並不宜闊重不宜長單不宜小複不宜大宻勝乎疎短勝乎長字之形勢不宜上濶下狹如此則重輕不相稱也九曰作字之體須遵正法不宜宻宻則似疴瘵纒身不能展舒不宜疎疎則似翔禽溺水諸處皆慢不宜傷長傷長則似既死之虺腰閒無力不宜傷短傷短則似已踐之蛙形醜而闊此為大忌簡縁云此謂應短而長應長而短非謂本短而欲其長本長而欲其短也十曰莫以字小易而忙行筆勢莫以字大難而慢展毫頭如是則筋力不等生死相混倘或一㸃失所若美人之病一目一畫失節如壯士之折一肱不可不慎樂毅之法王氏累世學此得成自外皆達勿以難學而自惰焉此論日有丹陽僧求吾吾不復與也簡縁云此篇孫過庭極言其偽張彦逺亦棄而不録獨周子發書苑菁華首列此篇朱長文墨池編亦云恐是後之學者所作然其中不無要言故存之右軍書法論曰夫書者𤣥妙之技也自非達人君子不可得而述之夫書大須存意思予覽李斯等論筆勢又鍾繇書骨皆是不輕恐子孫不記故序而論之夫書字不用平直不用調端先須用筆或偃或仰或欹或側或大或小或長或短凡作一字或似籕或如鵠頭或如散隸或如八分或如蟲食木或如流水態或如壯士利劍或似婦人纎麗先構筋力然後裝束簡縁云裝束布置結構是也必須汪濊詳雅起發齊宻疎闊相閒每作㸃必須懸手作之或作波抑而復曳每作一字即須作數種意况或横畫似八分而發如篆籕或牽竪如深林之喬木而屈折如鋼鐵鈎或上大如稈藁或下細如針韭或轉發如鳥飛或稜側如流水作一字横竪可連滿一行直看媚態第一須存筋藏鋒滅迹隠端用筆尖如落鋒勢無一毫如尖筆勢意况生舉爽爽若神為一字須數體俱入若作一紙皆須字字意别勿使相同若書弱紙用強筆若書強紙用弱筆強弱不等則蹉跌不入凡書之時貴乎沈靜令意在筆前筆居心後未作之始結思成矣然下筆不用急而須遲何也管是將軍故須持重心不宜遲心是箭鋒箭不欲遲遲則中物不入夫字有緩急一字之中何者是急止如鳥字下手一㸃㸃須急横直皆須遲欲鳥之脚張大須急不急不有形勢每書欲得十遲五急十曲五直十藏五出十起五伏然後是書若直㸃急牽急裹此暫看是書久味無力又須用筆著墨不過三分不得深浸深浸則毫弱無勢墨用松節研之久久不動彌佳矣簡縁云閱此則知唐宋人所說皆原於此故不以其重出而並録之又筆陣圖晉右軍將軍王羲之曠之子也七嵗善書年十二見前代筆說於父枕中竊而讀之父曰爾何來吾所秘羲之笑而不荅母曰爾觀用筆秘法否父見其小恐不能秘之不與語羲之拜曰今藉而用之使待成人晚矣父遂與之不盈期月書大進衛夫人語太常王榮曰此兒必見吾用筆訣也妾近見其書便有老成之意因流涕曰此子必蔽吾名晉穆帝時書祭北郊文久乃更寫工人削之筆入木三分三十三書蘭亭序三十七書黄庭經訖空中有語卿書感我而况人乎吾天台丈人自言真勝鍾繇羲之書多不一體永和九年作筆陣圖與子敬曰夫紙者城也筆者主也水者兵也硯者糧也銛者智也躁者形也大座者壘也調神者謀也輕者鉦也重者鼔也心者刀也手者騎也並以書之經緯夫筆墨皆強者然後可行若勾者似用干將之劍陸截犀革若曳者似六鈞之弓夏服之箭縱横若花開草野起伏若雲霧去來至於主客勝負皆須姑息而後行之先作者主也後為者客也夫用筆似安營似用槊調墨如調弓端箭㸃水似觀象察色看毫似砥刃合鋒畜硯似甲楯舟航用紙似突騎屯聚出入若由門戶囘轉若似旌旗挺發若號令齊整小大若法律嚴明正直若糾察吏官輕重若破賊㑹圍結字若獻凱廟堂凡解如此可謂是書不然虚費紙筆終日矻矻何所成名簡縁云按筆陣圖與前篇不同嵗月亦異蓋永和十二年所作是右軍題衞夫人筆陣圖後者也九年所作是右軍與子敬者也故並存之右軍述天台紫真傳授筆法天台紫真因及余曰子雖至於斯仍未至於斯若書之器必達乎道同混元之理似七寳之貴垂萬古之名陽氣明而華壁立陰氣大而風神生把筆抵鋒肇於本性力圓則潤勢疾則澀法以𦂳而勁逸以險而峻内盈外虚起不孤伏不寡面迎非近背接非逺望之惟逸發之惟靜敬茲法也盡妙矣言訖遂隠予遂鐫石以為陳迹維永和九年九月五日晉右軍將軍王羲之記王僧䖍筆意贊書之妙道神彩為上形質次之兼之者方可紹於古人以斯言之豈易多得必使心忘於筆手忘於書心手遺情書筆相忘是謂求之不得考之即彰乃為筆意贊曰剡子易墨心圓管直漿深色濃萬毫齊力先臨告誓次寫黄庭骨豐肉潤入妙通靈努如植槊勒若横釘虚專妥帖毆鬭崢嶸開張鳯翼聳擢芝英粗不為重細不為輕纎微鄉背毫髪死生工之盡矣可擅時名梁武荅陶貞白夫運筆斜則無芒角執手寛則書緩弱㸃撆短則法擁腫㸃撆長則法灕澌畫促則字横畫疎則形慢拘則乏勢放又少則純骨無媚純肉無力少墨浮澀多墨笨鈍此並黙然在心所謂自然理也若抑揚得所趣舍無違值筆廉斷觸勢峯鬱揚波折節中規合矩分閒上下濃纎有方肥瘦相和骨力相稱婉婉曖曖視之不足稜稜凜凜常有生色適眼合心便為甲科衆家可識亦當復由事耳六文可工亦當復由習耳一聞能持一見能記亘古亘今不無其人大抵為論終歸於是程邈所以能變書體為舊也張芝所以能善書工學之積習也隋釋智果心成頌囘展右肩頭項長者向右展寧宣臺尚字是簡縁云非是頭項長是右肩也長舒左足有脚者向左舒實其典字是謂亻彳木才之類非其典之謂峻拔一角字方者擡右角國周用字是潛虚半腹畫稍粗於左右亦須著逺近均匀逓相覆蓋放令右虚用見岡月字是閒開閒闔無字四㸃四畫為綜上開則下闔也簡縁云畫即竪也隔仰隔覆並字隔二畺字隔三皆斟酌二三字仰覆用之迴互留放謂字有磔掠重者若爻字上住下放茶字上放下住是也不可并放變換垂縮謂兩竪畫一垂一縮并字右縮左垂斤字左縮右垂是也繁則減除王書懸字虞書毚字皆去下一㸃張書盛字改血從皿簡縁云盛字去内丁字非從皿也若皿字則本無㸃疎當補續王書神字䖏字皆加一㸃却字卩從阝字是也分若抵背卅冊之類皆須自立其抵背鍾王毆虞皆守之合如對目八字州字之類皆須潛相矚視孤單必大一㸃一畫成其獨立者是也重並仍促昌吕爻棗等字上小林棘絲羽等字左促森淼等字兼用之以側映斜撆為斜磔為側交欠以入之類是以斜附曲謂人為曲女安必互之類是單精一字力歸自得鄉背仰覆垂縮廻互不失也盈虚統視連行妙在相承起伏行行皆相映帶聨屬而不背違也簡縁云其說多有重見但其人在隋唐之際言之所始故存之唐太宗論書太宗嘗謂朝臣曰書學小道初非急務時或留心猶勝棄日凡諸藝業未有學而不得者也病在心力懈怠不能專精耳朕少為公子時頻遭陣敵義旗之始乃平冦亂執金鼔必有指揮觀其陣即知強弱以吾弱餌其強以吾強衝其弱敵犯吾弱追奔不踰百數十步吾擊其弱突過其陣自背而反擊之無不大潰多用此制朕思得其理深也今吾臨古人之書殊不學其形勢惟在求其骨力而形勢自生吾之所為皆先作意是以果能成也簡縁云雖重骨力而結體不妥則骨力反見其怪唐太宗論筆法欲書之時當收視反聽絶慮凝神心正氣和則契於妙心神不正字則欹斜志氣不和書必顛仆其道同魯廟之器虚則欹滿則覆中則正正者和之謂也大抵腕竪則鋒正鋒正則四面勢全次實指指實則筋力均平次虚掌掌虚則運用便易為㸃必收貴𦂳而重為畫必勒貴澀而遲為撆必掠貴險而勁為竪必努貴戰而雄為戈必潤貴遲疑而右顧為環必卸貴蹙鋒而緩轉為波必磔貴三折而遣毫側不得平其筆勒不得卧其筆須筆鋒先行努不宜直直則失力趯須􅢶其筆鋒得勢而出策須仰䇿而收掠須筆鋒左出而利啄須卧筆而疾罨磔須戰筆發外得意徐乃出之夫㸃要作稜角忌圓平貴通變合策處策年字是也合勒處勒士字是也凡横畫並上仰下覆志字是也凡三畫悉用之合掠即掠戶字是也彡乃形影字右邊不可一向為之須背下撆之爻須上磔衂鋒下磔放出不可雙出多字四撆一縮二少縮三亦縮四須出鋒巧在乎躪躒則古秀而意深拙在乎輕浮則薄俗而直置採摭精能芟薙蕪穢庶近乎翰墨脫專執自賢闕於師授則衆病蜂起衡鑑徒懸於闇矣簡縁云此篇最明白最要𦂳唐太宗筆意夫學書者先須知有王右軍絶妙得意處真書樂毅論行書蘭亭草書十七帖勿令有死㸃死畫方盡書之道也簡縁云一語道破唐太宗指意夫字以神情為精魄神若不和則無態度也以心為筋骨心若不堅則字無勁健也以副毛為皮膚副若不圓則字無温潤也所資心副相參用神氣沖和為妙今比重明輕用指腕不如鋒芒用鋒芒不如沖和之氣自然手腕虚則鋒含沈靜夫心合於氣氣合於心神心之用也心必靜而已矣虞安吉云夫解書意者一㸃一畫皆求象本乃轉自取拙豈是書邪縱放類本體樣奪真可圖其字形未可稱解筆意此乃類乎效顰未入西施之奥室也故其始學得其粗未得其精太緩者滯而無筋太急者病而無骨横毫側管則鈍慢而肉多竪筆直鋒則乾枯而無骨及其悟也心動而手均圓者中規方者中矩粗而能銳細而能壯長者不為有餘短者不為不足思與神㑹同乎自然不知所以然而然矣簡縁云本者筆畫也歐陽詢書法瑩神靜慮端已正容秉筆思生臨池志逸虚拳直腕指齊掌虚意在筆前文向思後分閒布白勿令偏側墨淡即傷神彩絶濃必滯鋒毫肥則為鈍瘦則露骨勿使傷於軟弱不須怒降為竒調匀㸃畫上下均平逓相顧揖筋骨精神隨其大小不可頭輕尾重勿令左短右長斜正如人上稱下載東映西帶氣宇融和精神灑落省此微言孰為不可也歐陽詢八法丶如髙峯之墜石乚如長空之新月一如千里之陣雲丨如萬嵗之枯藤如勁松倒折落掛石崖簡縁云勁松倒折不如峩峩乎如喬松之欲倒也􅗵如萬鈞之弩發丿如利劍斷犀象角一波常三過筆簡縁云此與右軍大同小異此是最要語何妨再見歐陽詢付善奴訣每秉筆必在圓正重氣力縱横重輕凝神靜慮當審字勢四面停匀八邊具備簡縁云此即方法此八字惟歐公獨妙他人不能也短長合度粗細折中心眼準程疎宻欹正最不可忙忙則失勢次不可緩緩則骨癡又不可瘦瘦當形枯復不可肥肥則質濁細詳緩臨自然備體此是最要妙處貞觀六年七月十二日詢書付善奴秘訣唐人論書見指南字裏金生行閒玉潤真則字終意不終草則行盡勢不盡其得書之趣矣簡縁云是言褚法張懷瓘用筆十法凡工書㸃畫體理精𤣥約象立名究之可悟豈不以㸃如利鑽鏤金畫似長錐界石倣茲用筆坐進千里夫書第一用筆第二識勢第三裹束三者兼備此為法書茍守一途即為未得夫用筆豈止於偏傍向背其要在蹲馭起伏識勢豈止於散水烈火其要在權變改製裹束豈止於虚實展促其要歸於互出曉此三者始可言書今作成頌以盡精㫖偃仰向背兩字併為一字須求㸃畫上下偃仰離合之勢陰陽相映陰為内陽為外斂心為陰展筆為陽必須相應左右亦然鱗羽參差㸃畫編次無使齊平如鱗羽參差之狀峯巒伏起起筆蹙衂如峯巒之狀殺筆亦須存結真草偏枯兩字或三字不得真草合成一字謂之偏枯須求映帶字勢雄媚斜正失則落筆結字分付㸃畫之法須依位次遲澀飛動勒鋒側筆字須飛動無凝滯之勢是為得法簡縁云勒鋒磔筆最易凝滯射空玲瓏謂烟感識字行草用筆不依前後尺寸規度不可長有餘而短不足須引筆至盡處則字有凝重之態隨字變轉如蘭亭一筆作懸針其下嵗字則變垂露又其閒一十八箇之字各别其體張懷瓘論行書夫行書非草非真離方遁圓在乎季孟兼真者謂之真行兼草者謂之行草子敬之法非草非行開張於行流便於草又處其中閒無藉因循寧拘制則臨事制宜從意適便風行雨散潤色開花數體之中最為風流者也逸少秉真行之要子敬執行草之權父之靈和子之神俊皆古今之獨絶張懷瓘論執筆草書論云執筆亦有法若執筆淺而堅掣打勁利掣三寸而一寸著紙勢有餘矣若執筆深而束牽三寸而一寸著紙勢已盡矣其故何也筆在指端則掌虚運動適意騰躍頓挫生氣在焉筆居半則掌實如樞不轉折豈能自由既不能轉運迴旋乃成稜角筆既死矣寧望字之生動乎張懷瓘評書評書藥石論云夫馬筋多肉少為上肉多筋少為下書亦如是今之書人或得肉多筋少之法薫蕕同氣十年不分寧知不有藏其知能渾其體法雷同賞遇或使之然至如馬之羣行驥子不出其外列柂銜策方知逸足含識之物皆欲骨肉相稱神貌怡然若筋骨不任其脂肉在馬為駑駘在人為肉疾在書為墨豬惟其病狀未即已也非醫緩不能為之惟題署及八分則肥宻可也自此之外皆宜蕭散恣其運動然能之至難鑒之不易精察之者必如庖丁解牛目無全形析枝分理其有一㸃一畫意態縱横偃亞中閒綽有餘裕結字峻秀類於生動幽若深逺煥若神明以不測為量書之妙也是曰無病勤而行之益佳其有方闊齊平支體肥腯佈置偪側有所不容稜角且形况復無像神貌昏懵氣候蔑然以濃淡為華者書之困也是曰病甚稍須毒藥以攻之古文篆籕書之祖也都無角節將古合道理亦可明蓋欲方而有規圓不失矩亦猶人之指腕促則如指之拳賖則如腕之屈理須譬之以皮肉若露筋骨是乃病也豈曰壯哉書亦須用圓轉順其天理若輒成稜角是乃病也豈曰力哉夫良工理材斤斧無迹才子敘事潛刃其閒書能入流含於和氣宛與理㑹曲若天成刻角耀鋒無利餘害萬事拙者易能者難童䝉書有稜角豈謂能也若始疎而終宻者則大同始宻而終疎者則大異故小人甘以壞君子淡以成耀俗之書甘而易入乍觀肥滿則悅目開心亦猶鄭聲之在聽也稜角者書之弊薄也脂肉者書之滓穢也嬰斯病弊須訪良醫滌蕩心胷除其煩憒古人妙迹用思沈鬱自非冥搜不可得見也夫學鍾王尚不能繼虞褚况他者哉李陽冰筆法夫㸃不變謂之布棊畫不變謂之布算方不變謂之斗圓不變謂之環東海公璹筆法璹徐浩之子傳其父筆法浩之父嶠之亦書家置筆於大指中節前居動靜之際以頭指齊中指兼助為力指自然實掌自然虚雖執之使齊必須用之自在今人皆置筆當大指節碍其轉動拳指塞掌絶其勢力况執之愈急則愈滯不通縱用之規矩無以施為也執筆在乎便穩用筆在乎輕徤輕則須沈便則須澀謂藏鋒也不澀則險勁之狀無由而生太流則成浮滑浮滑則俗故㸃畫須依筆法然後書同古人之迹而合於作者矣欲書當先看所書紙中是何詞句言語多少及紙色相稱以何等書令與書體相合或真或行或草與紙相當意在筆前筆居心後皆須存用筆法難書之字預於心中布置然後下筆自然容與徘徊意態雄逸不可臨時無法任筆成形李華論書用筆在乎虚掌而實指緩衂而急送意在筆前字居筆後其勢如舞鳯翔鸞則其妙也大抵字不可拙不可巧不可今不可古華質相半可也鍾王之法悉而備矣近世虞世南深得其體别有婉媚之態凡云八法學者悉善予有二字之訣至妙之方所謂截拽是也茍善斯字逸少伯英彼何人哉虞雋臨池訣第一用紙筆第二認勢第三裹束第四真如立行如行第五草如走第六上稀第七中匀第八下宻用筆之法拓大指擫中指斂第二指拒名指令掌心虚如握卵此大要也凡用筆以大指節外置筆令轉動自在勿令太𦂳名指拒中指小指拒名指此細要也皆不過雙包自然虚掌實指永字論云以大指拓頭指鈎中指拒此言單包者然必順氣脈均匀拳心須虚虚則轉側圓潤腕須挺起粘紙則輕重失準把筆淺深在去紙逺近逺則浮泛虚薄近則搵鋒體重用水墨之法水散則墨在近迹浮而稜斂有若自然紙剛則用軟筆策掠按拂制在一鋒紙柔則用硬筆衮努鉤磔順成五指純剛如以錐畫石純柔如以泥洗沙既不圓暢神格亡矣書石及壁用紙剛例蓋相得也張旭傳永字八法并五畫軌則側不患平勒不貴卧努過直而力敗趯當存而勢生當存一作宜峻策仰收而暗掲掠左出以鋒輕啄倉皇而疾罨磔趯䟐以開撐簡縁云按此八句書家皆作栁宗元語不知其本出於張旭也蓋宗元傳八法於皇甫閲閲傳之徐浩浩傳之旭古人授受淵源毫髪不亂如此丨頓筆先縮鋒驟努令頓下衂之其垂露懸針即衂之餘勢抽筆成懸針住筆成垂露也一策奮南寺者真一勒其齊在一飛事子十一鱗勒阻不下可已上五畫軌則先賢口傳手授不形紙墨今特明之筆法一曰囓鏃門此一門亦曰書之祖也亦曰書之命也又云乾坤清氣此古諸聖秘而不傳者也簡縁云多力多筋則清無力無筋則濁二曰陰陽門濃淡去住内外肥瘦等簡縁云妙在有形者為陰妙在無形者為陽三曰君臣門内外左右上下君須君臣須臣不得違背簡縁云即賔主也一筆是主衆筆是臣須有相顧意四曰鄉背門鄉即俱鄉背即俱背不得一鄉一背簡縁云此言一字内也五曰偏枯門不得一邊真一邊草一面大一面小也簡縁云亦説一字六曰孤露門肥瘦上下不等名曰孤露須得自在簡縁云妙在形勢束裹七曰五指玲瓏門凡㸃筆常迴避相觸也簡縁云一字内㸃畫皆有遜避黒白分明也八曰停筆遲澀門遲自遲澀自澀常欲令其透過紙背簡縁云此言得勢也九曰通氣門亦云通水凡㸃畫令通其氣不得塞也簡縁云筆不斷形不撒使血脈相通總說一字十曰顧荅門凡㸃畫字勢常須相顧也古今傳授筆法蔡邕得之於神人傳女文姬文姬傳鍾繇繇傳衛夫人夫人傳羲之羲之傳獻之獻之傳羊欣欣傳王僧䖍僧䖍傳蕭子雲子雲傳智永智永傳虞世南世南傳歐陽詢詢傳張旭旭傳李陽冰陽冰傳徐浩浩傳顔真卿真卿傳鄔彤彤傳韋玩玩傳崔邈􅗵勾裏岡罔南向田諸皆例此勹勾努匀旬均物等用此返異勢當豈長扆促左轉右勢常宣尚實左虚右勢其月周同抑左昻右勢圖圍國上下不齊勢行河水永八法挫決囊􅂒仰曳抛引殺人托撲摺勒口送勾摺許也蹲掠駐努趯州報荅勢交爻門賑摺抛曳如救抑努趯鈎評托口勒挫人引搭州駐揖也撲囊決􅂒蹲掠送壓已上十三訣先賢只口傳授並不形紙墨張旭唯傳永字後自𢎞五勢一切字法無不該矣元巙巙子山九生法一生筆純毫為心薄覆長短不過六寸軟而復徤二生紙漸出篋者暢潤受書三生硯用即著水使筆須洗滌令乾淨四生水須汲新水五生墨隨要用旋研多研則凝滯六生手過或執勞須得腕徤七生目欲寢適寤不得眠寐既寐須歇八生神凝念不令躁煩九生景晴窻明曉解此九生法乃得名書也簡縁云果然要寫好字此亦不可不講韓方明執筆五法與前變法法畧有不同第一執管平腕雙包虚掌實指世俗多愛單包則力不足書無神氣每作一㸃畫雖有其法亦當使用不成惟平腕雙包虚掌實指妙無可加也若篆書則多用單勾取其圓直有準第二簇管聚五指頭筆管在其中心也急疾無體之書或起草藁用之第三撮管大草圖障用之五指頭聚筆管也與握管不逺第四握管以四指押筆於掌心懸腕以肘力書之或云諸葛誕倚柱書雷擊柱書不撤如此執管後王僧䖍學此執筆人以為笑近世張從申亦如此第五搦管二指節中搦之非書家之事也陸希聲傳筆法鄧州錢若水嘗言古之善書者鮮有得筆法陸希聲得之凡五字曰擫押鈎格氐用筆雙鈎則㸃畫遒勁而盡妙謂之撥鐙法希聲自言昔二王皆傳此法自斯公以下陽冰亦得之希聲以授沙門𧦬光𧦬光入長安為翰林供奉希聲猶未達以詩寄𧦬光曰筆下龍蛇似有神天池雷雨變逡巡寄言昔日不龜手應念江頭洴澼人𧦬光感其言因引薦希聲於貴倖後至宰相刁術言江南後主得此法書絶勁復增二字曰導送今待詔尹希古亦得之而所書為一時之妙李無感小亦得其法查道始習篆患其體勢柔弱希古教以法乃雙鈎用筆經半年始習熟而篆體勁直甚佳栁公權筆諫唐穆宗即位栁公權以夏州掌書記入奏帝曰我於佛寺見卿筆迹思之久矣即拜翰林侍書學士穆宗問公權筆法對曰用筆在心心正則筆正上改容知其為筆諫也公權筆勢勁媚自成一家當時公卿大臣家碑板不得公權手筆者以為不孝至外夷入貢别書貨貝曰此購栁書鄭子經天五篇夫執筆者法書之機鍵也夫善執筆則八體具不善執筆則八體廢寸以内法在掌指寸以外法兼肘腕掌指法之常也肘腕法之變也又學古篇云執筆貴圓握管不可不直直則方字貴方得勢不可不轉轉則圓篆圓其用而方其體隸方也外雖方而内實圓圓效天方法地圓有方之理方有圓之象一方一圓其效法天地之道乎林韞撥鐙説韞咸通末為州刑椽時廬陵盧肇罷南浦太守歸宜春公之文翰海内知名韞竊慕小學因師於盧公子弟安期嵗餘盧公忽相謂曰子學我書但求其力耳殊不知用筆之方不在於力用於力筆死矣虚掌實指指不入掌東西上下何所闗焉常人云永字八法乃㸃畫爾拘於一字何異守株翰林禁經云筆貴饒左書尚遲澀此君臣之道也大凡㸃畫不在拘拘長短逺近但勿遏其勢俾令筋脈相連意在筆前然後作字若平直相似狀如算子此畫爾非書法也吾昔受教韓吏部其法曰撥鐙今將授子勿妄傳推拖撚拽是也訣盡於此子其㫖而味乎韞加以久罹戎事筆硯多亡終不能窮其妙敢復傳於智者又曰夫作字貴乎結構結構具矣字形貴活字形活矣又在㸃畫等活㸃畫活矣則為全美然欲㸃畫又在有起有止則可惟撚筆方㑹其妙是撚筆實為用筆之機也簡縁云按此段恐是後人所增然其言有係故存之釋棲霞論書凡書通即變王變白雲體歐變右軍體栁變歐陽體永禪師褚遂良顔真卿李邕虞世南等並得書中法後皆自變其體以傳於世俱得垂名若執法不變縱能入木三分亦被號為奴書終非自立之地此書家之大要也韋榮宗論書凡下筆心主於手然後可下若小等閒殆亦無憑又曰須淺其執牢其筆實其指虚其掌論正書行草則曰真書小宻執宜近頭行書寛縱執宜稍逺草書流逸執宜更逺逺取㸃畫長大近取分布齊均張敬𤣥論書運腕不可太𦂳𦂳則腕不能轉而字體粗細上下不均楷書不必懸臂氣力有限若行草須懸腕大草書須懸臂筆勢無限也法成之後字體各有管束一字管兩字兩字管三字如此管一行一行管兩行兩行管三行如此管一紙凡此皆學書者所當知也李後主書述壯嵗書亦壯猶霍嫖姚十八從軍初擁千騎陵沙漠目無全虜又如夏雲竒峯畏日烈景從横炎炎不可向邇其任也如此老來書亦老若諸葛亮董戎韋叡接敵舉板輿自隨以白羽揮軍不見其風骨而毫素相識筆無全鋒噫壯老不同功用則異能惟所能者可以言之書有七字法謂之撥鐙自衞夫人并鍾王家傳於歐顔褚陸等流於此矣然世人罕知其道孤以幸㑹得授誨於先生謂𧦬光也竒哉是書也非天賦其性口授要訣然後研切覃思則不能窮其奥妙安得不秘而寳之所謂法者擫壓鈎掲抵導送是也此字今有顔魯公墨迹尚存於世余恐將來學者無所聞焉故書此以記之徐鉉小篆鉉善小篆映日視之畫之中心有一縷濃墨正當其中至於曲折處亦當中無有偏側乃筆鋒直下不倒故鋒常在畫中簡縁云正書亦當如是翰林粹言胷中有書下筆自然不俗坡詩云退筆如山未足珍讀書萬卷始通神此言良是為書之妙不必憑文按本妙在應變無妨行行要有活法字字須求生動有功無性神彩不生有性無功神彩不實兼此二者然後得齊古人筆正之說真格言也筆正則古人筆法皆如吾手矣側鋒取妍此鍾王不傳之秘濡毫之次法與鋒合然後運筆無非法也捉筆在手便須運意不可妄落一筆纔落便想第二筆合作如何下偶寫一字不成須於衆碑中尋之若無即出意自造不可輕易率然而作作字雖忌滑熟然不可生硬如顔如栁初未嘗有生硬之筆先識此字書則得之素與相忘必難描寫臨書最有功以其可得精神也字形在紙筆法在手筆意在心筆筆生意分閒布白小心布置大膽落筆左者右之右者左之偏者正之正者偏之以近為逺以逺為近以連為斷以斷為連筆近者意逺筆逺者意近字看碑刻須像運筆又須挹其氣象隨其所寓成形結字得形體不如得筆法得筆法不如得氣象學字如女子學梳掠惟性虚者尤能作態度只學一家書學成不過為人作奴婢集衆長歸於我斯為大成篆添隸減篆長隸匾東坡書說真書難於飄揚草書難於嚴重大字難於結宻而無閒小字難於寛綽而有餘書法備於正書溢而為行草未能正書而能行草猶未能莊語而輙放言無足道也真生行行生草真如立行如行草如走未有未能立而能行未能行而能走者也劉正夫論書字美觀則不古不美觀者必古今人之字如觀文繡久而生厭古人之字如觀鼎鍾愈久愈愛米元章論書家人謂吾書為集古字蓋取諸長處總而成之既老始自成家人見之不知以何為祖也字要骨格肉須裹筋筋須藏肉帖乃秀潤書在布置穩不俗險不怪老不枯潤不肥顔魯公每使家僮刻字故㑹主意脩改波撆致大失真惟吉州廬山題名題訖而去後人刻之故皆得其真無做作之差乃知顔出於褚也夫真迹皆無蠶頭燕尾之筆與郭知運爭座位帖有篆籕氣真傑思也世人皆以公權努目張拳為筋骨不知不努張自有筋骨也凡大字要如小字小字要如大字褚遂良小字如大字其後經生祖述閒有造妙者大字如小字則未之見也學書須得趣他好俱忘乃入妙别為一好縈之便不工也山谷亦云用心不雜乃是入神要路山谷書說凡書要拙多於巧近世少年作字如新婦子粧梳百種㸃綴終無烈婦態也肥字須要有骨瘦字須要有肉古人學書學其工處今人學書肥瘦皆病又多偏得其醜惡處如今人作顔體乃其粲然者書旨書必先生而後熟亦必先熟而後生始之生者學力未到心手相違也熟而生者不落蹊徑不隨世俗新意時出筆底具化工也簡縁云生而熟者人知之熟而生者則未之知也不惟他人不知即趙松雪亦不知趙子固論書法學唐不如學晉人皆能言之夫豈知晉豈易學學唐尚不失規矩學晉不從唐人入多見其不知量也僅能欹側雖欲媚而不媚翻成畫虎之犬耳何也書字當立閒架牆壁則不骫骳思陵書法未嘗不圓熟要之於閒架牆壁處不著工夫此理可為識者道近得北方舊本虞永興破邪論序受而不知其惡也故為此說正坐無牆壁也右軍樂毅畫讚蘭亭最真一一有牆壁者右軍一榻直下是也李瑋家開皇帖行書之祖於此最昭昭化度及魯公離堆得此法左右陰陽極明麗丁道䕶啟法寺碑筆右方直下最具此法學者垂情如此下筆則妍麗方直端重楷正昧此則癡鈍墨豬矣黄庭賀捷有鍾體雖微欹側隱然亦有牆壁力命勁利更髙學者毋但徇俗而不究本惟遺教經宛然是經生筆了無神明決非羲筆識此已又識破懷仁聖教序之流入院體也又須戒徐㑹稽之濁在跛偃李北海之濁在欹斜惟張從申得大令之通暢無二公之流弊且世云㑹稽法自蘭亭出蘭亭即無偃筆也又云北海深悟大令大令不若是之跛倚也跛偃之弊流而悟我坡公欹斜之弊流而為元章父子矣故余深信閒架牆壁為要也學隸楷於魏晉之下邈乎無以稽也僅有化度寺九成宫廟堂碑三者耳三書之法在平正恬澹分閒布白行筆停匀學此者横畫必兩頭均平不可左低右昻又於十字處如中牛年等字凡是一横一竪中停者皆當著心凝然正直平均不可使一髙一低一斜一欹少涉世俗守此法既牢則凡施之閒架自然平匀使不俗氣人知蘭亭韻致取其映帶以為態度不知態度者書法之餘也骨格者書法之祖也未正骨格先尚態度幾何不舍本而逐末邪左欲去吻右欲去肩左右兩平上長下短左上滿喃嘯之類右下滿所井之類行草宜用棗心筆者以其摺裊婉媚然此筆須出鋒用之須捺筆鋒向左意趣如只用筆腰不用筆尖乃可如真書直用筆尖則施之行草無態度此是要𦂳處人多未之知孫過亭草書言能籠罨横竪最善發明棗心筆於用之時每難揮運雙鈎懸腕久久得趣其要正在勿使筆尖也董内直書訣無垂不縮謂直下筆既下復上至中閒則垂而頭圓又謂之垂露如露水之垂也無往不收謂波拔處既往當復囘不要一拔便去如折釵股圓徤而不偏斜欲其屈折圓而有力如壁拆縫用筆端正寫字有絲牽處斷頭起筆其絲正中如新泥壁拆縫尖處在中閒欲其無布置之巧如屋漏痕寫字之㸃如空屋漏孔中水滴一㸃圓正不見起止之迹簡縁云向謂雨過而屋壁漏痕直而䟐􅂒也如印印泥如錐畫沙自然而然不見起止之迹簡縁云印印泥布置均正而分明也錐畫沙筆鋒正中而墨浮兩邊也左欲去吻左邊起筆不要有嘴右欲去肩右邊轉角不要露肩古人謂之暗過簡縁云要圓勁無痕帶下努筆有力綿裹鐵筆力藏在㸃畫之内外不露圭角東坡所謂字外出力中藏稜者也劉有定論書篆直分側直筆圓側筆方用法有異而執筆初無異也其所以異者不過遣筆用鋒之差變耳蓋用筆直下則鋒常在中欲側筆則微倒其鋒而書體自方矣若夫執筆則不可不方也古人學書皆用直筆王次仲等造八分始有側法簡縁云此隸楷之所以發源於小篆也不然而何以必要正鋒然則今之以側筆取妍者皆異端也學書者斷斷乎不可使邪魔外道盤踞胷中使終身陷於妖俗而不自知也戒之哉戒之哉凡字如日月目貝等字内有短畫者不可與兩直相粘則畫乃首尾有法否則不守法度也趙子昻蘭亭跋書法以用筆為上而結字亦須工蓋結字因時相傳用筆千古不易右軍字勢古法一變其雄秀之氣出於天然故古今以為師法齊梁人結字非不古而乏俊氣此又存乎其人然古法終不可失也論隸之誤簡縁云宋王洙字源叔博極羣書晚喜隸書尤得古法當時學者翕然宗之於是隸法復興朱長文曰余内兄蔡君弼嘗謂余言隸即今之真書源叔之隸書乃八分也源叔強名曰隸書耳余始疑之後考劉向列仙傳云上谷王次仲作八分而衛恒四體書勢其曰隸勢則以王次仲師宜官梁鵠等為始作之人按恒去漢不逺不應如此之誤又蔡邕三體石經隸書及今所存漢碑皆與真字異乃知漢自有隸書而今之八分乃漢魏之際增隸而作者也今之真字乃漢魏之際省隸而作者也長文之所言如此余考晉江式表唐韋績五十六種書及王僧䖍庾肩吾張懷瓘諸君皆云王次仲作八分程邈作隸書惟庾肩吾直云隸即今正書餘皆無明文先伯鈍吟公亦云秦權上字秦之隸書乃篆之捷也與今正書不同然非分書也蓋隸書本如此後漸變而為今正書耳按此則與長文古隸之說合歐文忠以分書為隸而今人皆謂八分為隸非也書法正傳卷五
