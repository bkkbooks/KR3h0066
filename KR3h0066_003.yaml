body:
  text: 書法正傳卷三常熟馮武撰永字八法八法解把筆八法運筆八法永字八法八病永字散形永字結構三十二勢八病勢八法分論顔魯公八法頌栁宗元八法頌八法為作字之根本故具列之不厭其詳也八法解蓋聞文字之來尚矣自伏羲氏造書契以代結繩之政厥後蒼頡象鳥獸之迹以廣之其所書者古朴而已歷代以下書者工於筆法之妙其名世者如晉之鍾繇王羲之唐之歐虞顔栁之輩亦各家有書所傳之祕惜乎淪沒日久真跡不存惟羲之永字八法共三昧歌流傳在世理趣淵深初學之者難於措手獨雪菴永字八法變化三十二勢其於書法實與有功書者不由其法而成則未免陷於粗俗草率之病也雪菴之作者運筆之法有八曰落起走住疊圍回藏永字之法有八曰側勒努躍策掠啄磔八法之勢又名曰怪石玉案鐵柱蟹爪虎牙犀角鳥啄金刀於中又為二十四法曰懸珠垂珠龍爪瓜子杏仁梅核石楯象簡垂針象笏曲尺飛雁龍尾鳯翅獅口搭勾寶蓋金錐懸戈飛帶戲蝶蟠龍吟蛩游魚通前共三十二勢使初學者下手運筆有所依歸凡習書必先學永字八法學且熟方可學二十四法於此三十二勢習之既精方可結構成字如此則學有規矩字有體法不然則筆意不精字亦失乎格度矣蓋一筆有一筆之法一字有一字之法一字之法貴在結構一筆之法妙在起止起止得宜則畫無不美結構有道則字無不佳然結構之道所重者尤在乎筆法之精妙也筆法之妙不亦難乎如側之祖妙須三作用鋒向右而勢向左勒之祖首尾藏鋒用筆欲橫而勢欲欹努之為法用彎行曲扭如挺千斤之力躍之為法要輕挫潛生而起快峻之鋒策始作者用仰鋒上揭而貴乎遲留掠始作者用肥健悠揚而宜乎舒暢啄法之妙在卧側潛進以連斂其鋒鋩磔法之妙在險橫三過而開揭其勢力此八法已精則二十四法自然有得變化而成也然其妙則首尾欲有情起落欲相顧偏鋒者不可使其筆正正鋒者不可使其筆偏蹲過處當審於輕重搶駐處必宜於著力折鋒搭鋒為下筆之始衄筆揭筆為收殺之權筆捺則肉自肥筆提則筋有餘力為骨之法憑指骨之提縱生血之道賴水墨之和勻忌軟徑之失均喜威嚴之敦厚勿輕浮以阻礙務均布以安平變換屈伸轉回旋於起伏藏收開閉運承接於送迎措邊旁而合軌振氣象以生神筆法之妙於斯乎盡矣是雖未能造夫升堂入室之域抑亦為登髙行逺之一助云把筆八法身直手直腕工背力虎口鳯眼陰筆陽筆運筆八法落起走住疊圍回藏永字八法側勒努躍策掠啄磔八病牛頭鼠尾蜂腰鶴膝竹節稜角折木柴擔八法分論側不得平其筆當側筆就右為之口訣云先右揭其腕次輕蹲其鋒取勢緊則乘機頓挫借勢出之疾則失中過又成俗側鋒顧右借勢輕揭潛出務於勒也然不言㸃而言側何也謂筆鋒顧右審其勢險而側之故名側也止言㸃則不明顧右無存鋒向背墜墨之勢若左顧右側則側無方故側不險則失於鈍鈍則芒角隱而書之神格喪矣側者側下其筆使墨精暗墜徐乃反揭則稜利矣又口訣云作㸃向左以中指斜頓向右以大指齊頓作報答便以中指挫鋒須按筆收鋒在內而出之右軍云作㸃皆須磊磊如大石之當衢又云㸃不變謂之布棊貴通變也勒不得卧其筆中髙兩頭下以筆心壓之口訣云頭傍鋒仰策次迅收若一出揭筆不躍而暗收則薄圓而疏筆無力矣夫勒筆鋒似及於紙須微進峻躍然不言畫而言勒何也曰勒者躍筆而行承其虛畫取其徑澀則功成矣不言畫者慮在不躍一出便畫則鋒拳而怯薄矣若作策法斜指擡筆若作勒法即用中指鉤筆澀進覆畫以中指頓筆然後以大指遣至盡處此三勢相近用法不同畫有重復不為布算乃可簡緣云躍者打勢也努不得直其筆直則無力立筆左偃而下最要有力口訣云凡旁卷微曲蹙筆纍走而進之直則衆勢失力滯則神氣怯散夫努須側鋒顧右潛躍輕挫則揭或問畫者中心竪畫也今不言直畫而言努何也曰努者勢微努在乎躍筆下行若直置其畫則形圓勢質為書之病筆訣云努筆之法竪筆徐行近左引勢勢不欲直直則無力矣躍須蹲鋒得勢而出出則暗收鋒又云前畫卷則别斂鋒而出之口訣云傍鋒輕揭借勢勢不勒筆不挫則意不深躍與挑一也貴於澀出適出期於倒收所謂欲挑還置也夫躍自努出潛鋒輕挫借勢而出之或問凡字出鋒謂之挑今謂之躍何也曰躍者語之小異耳以筆鋒去而言之躍自努畫收鋒竪筆潛徑借勢而躍之筆訣云即努筆下殺筆躍起也法須挫衄轉筆出鋒佇思消息則神蹤不墜矣簡緣云左筆曰躍右筆曰挑策須斫筆背發而仰收則背斫仰策也兩頭髙中以筆心舉之口訣云仰筆潛鋒以鱗勒之法揭腕躍勢於右潛鋒之要在畫勢暗鋒捷歸於右也夫策筆仰鋒竪䟐微徑借勢峻顧於掠也又云作策法仰指擡筆上或問策一名折翼畫今謂之策何也曰仰筆躍鋒輕擡而進故曰策若及紙便畫不務遲澀向背偃仰者此備畫耳筆訣云始築鋒而仰策徐轉筆以成形是也掠者拂掠須迅其鋒左出而欲利又云微曲而下筆心至卷處口訣云撇過謂之掠借於策勢以輕駐鋒簡緣云此言永字之撇右揭其腕加以迅出勢旋於左法在澀而徑意欲暢而腕遲留則傷於緩滯夫側鋒左出謂之掠或問掠一名分發今稱為掠何也曰掠乃疾徐有準手隨筆遣鋒自左出取險徑盡而為節發則一出運用無的故掠之精㫖可守也筆訣云從策筆下左出而鋒利不墜則自然佳矣啄者如禽之啄物其筆下罨以疾為勝口訣云右上左之勢為卷啄按筆蹲鋒潛蹙於右借勢收鋒迅擲旋左須精險衄去之不可緩滯夫筆鋒及紙為啄在潛徑而啄之或問撇謂之啄何也撇者䝉俗之言啄因勢而言啄以輕徑為勝筆訣云啄筆速進徑若鐵石則勢成矣磔者不徐不疾戰行欲卷復駐而去之又曰躍筆戰行翻筆轉下而出筆磔之口訣云右送之波皆名磔右揭其腕逐勢緊䟐傍筆迅磔盡勢輕揭而暗收在迅徑得之夫磔法筆鋒須䟐勢欲險而澀得勢而輕揭暗收存勢候其勢盡而磔之或問發波謂之磔何也曰發波之筆循古無從源其用筆磔法為徑筆訣云始入筆緊築而微仰便下徐行勢足而後磔之其筆或藏鋒或出鋒由人心之所好為之也顔魯公八法頌側蹲鴟而墜石勒緩縱以藏機努彎環而勢曲躍峻快以如錐策依稀而似勒掠髣佛以宜肥啄騰凌而速進磔抑惜以遲移栁宗元八法頌或曰張旭傳側不貴卧勒常患平努過直而力敗躍宜峻而勢生策仰收而暗揭掠左出而鋒輕啄倉皇而疾罨磔䟐趞以開撐書法正傳卷三
