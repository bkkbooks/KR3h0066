body:
  text: 書法正傳卷六常熟馮武撰纂言中梁武帝觀鍾繇書法十有二意平謂橫也直謂縱也均謂間也密謂合也鋒謂端也力謂體骨也輕謂屈也快謂牽也補謂不足也損謂有餘也巧謂布置也稱謂大小也字外之竒文所不書世之學者宗二王元常逸迹曾不睥睨筆法之妙羲之有過論後生遂爾雷同元常謂之古肥逸少謂之今瘦古今既殊肥瘦頗反如自省覽有異衆説芝鍾巧趣精細殆同神機肥瘦古今豈易致言真迹雖少可得而推逸少至學鍾書勢巧形密及其獨運意疏字緩譬猶楚音習夏不能無楚過言不悒未為篤論又子敬之不逮逸少猶逸少之不逮元常學子敬者畫虎也學元常者畫龍也余雖不習偶見其理不習而言必慕之歟聊復自記以補其闕非欲明解強以示物也倘有巧思思盈半矣蕭子雲十二法一曰潔二曰空三曰整四曰放五曰因六曰改七曰省八曰補九曰縱十曰收十一曰平十二曰側簡緣云蕭子雲十二法與張旭十二意大同小異蓋魯公得法于張長史長史得法于陸彥逺彥逺張之舅也其父陸柬之得法于歐陽詢詢得法于虞世南世南得法于智永永親受法于蕭子雲子雲得之王僧虔僧虔得之羊欣欣是子敬甥故得二王的傳窮流溯源則長史之法大率不外乎子雲十二法子雲之法大率不外乎元常意外十二巧妙然細玩之子雲十二字比長史更覺周密其曰潔者所謂如印印泥筆畫圓淨也其曰空者即黑白分明也一字有一字之空處一行有一行之空處一幅有一幅之空處也其曰整者即形體端嚴不止筆畫多即一筆兩筆者亦要配立不傾斜也其曰因者乘上勢也其曰改者避重復也一字之中亦有重筆不可不變曰縱者斂之反也曰收放者對筆畫而言也曰平者穩重也曰側者取勢也顔魯公傳張旭十二意筆法平直均密鋒力轉決補損巧稱余罷秩醴泉特詣京洛訪金吾長史張公請師筆法長史於時在裴警宅憩止有羣衆師張公求筆法或有得者皆曰神妙僕頃在長安師事張公叩以筆法大笑而已即對以草書或三紙五紙皆乘興而散不復有得其言者僕自再于洛下相見眷然不替僕因問裴警足下師長史有何所得曰但書得絹屏素數十軸亦嘗論諸筆法惟言倍加功學臨寫書法當自悟耳僕自停裴家月餘因日與裴警從長史言話散却回至師前請曰既承九丈奬諭日月滋深夙夜工勤溺於翰墨倘得聞筆法要訣終為師學以冀至於能妙豈任感戴之誠也長史良久不言乃左右顧視拂然而起僕乃從行歸東竹林院小堂張公乃當堂踞床而坐命僕居于小榻而曰筆法玄微難妄傳授非志士高人詎可與言要妙也書之求能且攻真草今以授之可須思妙乃曰夫平謂畫子知之乎僕思以對之曰嘗聞長史示令每為一平畫皆須令縱橫有象此豈非其謂乎長史乃笑曰然而又問曰直謂縱子知之乎曰豈不謂直者必縱之不令邪曲之謂乎曰然曰均謂間子知之乎曰嘗蒙示以間不容光其此之謂乎曰然曰密謂際子知之乎曰豈不謂築鋒下筆皆令宛成不令其疏之謂乎曰然曰鋒謂末子知之乎曰豈不謂末巳成畫使其鋒健之謂乎曰然曰力謂骨體子知之乎曰豈不謂䟐筆則點畫皆有筋骨字體自然雄媚之謂乎曰然曰轉謂屈折子知之乎曰豈不謂鈎筆轉角折鋒輕過亦謂轉角為暗過之謂乎曰然曰決為牽掣子知之乎曰豈不謂牽掣為掣一作撇決意挫鋒使不怯滯令險峻而成之謂乎曰然曰補謂不足子知之乎曰豈不謂結構點畫或有失趣者則以别點畫旁救之謂乎曰然曰損謂有餘子知之乎曰豈不謂趣長筆短雖點畫不足常使意勢有餘之謂乎曰然曰巧謂布置子知之乎曰豈不謂欲書豫想字形布置令其平穩或意外字體令有異勢是之謂巧乎曰然曰稱謂大小子知之乎曰豈不謂大字蹙之令小小字展之為大兼令茂密所以為稱乎曰然長史曰子言頗皆近之矣夫書道之妙煥乎其有旨焉子其勉之工精勤悉自當妙矣真卿前請曰幸蒙長史傳授筆法敢問工書之妙如何得齊于古人張公曰妙在執筆令得圓轉勿使拘攣其次諸法須口傳手授之訣勿使無度所謂筆法也其次在於布置不慢不越巧使合宜其次紙筆精佳其次諸變適懷縱捨掣奪咸有規矩五者備矣然後齊於古人矣曰敢問神用執筆之理頗得聞否長史曰豫傳授筆法得之老舅陸彥逺彥逺曰吾聞昔日説書若有工而迹不至後聞於褚河南曰用筆當須如印泥畫沙思所以不悟後於江島過見沙地平淨令人意悅欲書乃偶以利鋒畫而書之其徑險之狀明利媚好乃悟用筆如錐畫沙使其藏鋒畫乃沈著當其用筆常欲使其透過紙背此功成之極矣真草用筆悉如畫沙點畫淨媚則其道至矣是乃其迹可久自然齊古人矣但思此理以專想工用故其點畫不得妄動子其書紳余遂銘謝再拜逡巡而退自此得工墨之術於茲五年真草自知可成矣簡緣云此即所謂意外十二巧妙也真書家不傳之祕魯公自述如此而後得之噫古人之難如此後學視為易易而忽之何也徐浩書法論周官內史教國子六書書之源流其來尚矣程邈變隸體邯鄲淳傳楷法事則朴略未有能工厥後鍾善正書張稱草聖右軍行法小令破體皆一時之妙近古以來蕭永歐虞頗傳筆勢褚薛以降自鄶無譏矣然謂虞得其筋褚得其肉歐得其骨當矣夫鷹隼乏彩而翰飛戾天骨徑而氣猛也翬翟備色而翺翔者百步肉豐而力沈也若藻曜而髙翔書之鳯凰矣歐虞為鷹隼陸褚為翬翟焉歐陽率更云蕭書出于章草頗為知言然歐陽飛白曠古無比余年在齠齔便工翰墨忘寢與食胼胝筆硯而性不能逾力不可強徑而逾拙勞而無功區區碑石之間矻矻几案之上亦古人所恥吾豈忘情耶德成而上藝成而下殷鑒不逺何學書為必以一時風流千里面目斯亦愈於博奕亞於文章矣發揮聖賢事業其由斯乎初學之際先立筋骨筋骨不立肉何所附用筆之勢特須藏鋒鋒若不藏字則有病病且未去能何有焉字不欲疏亦不欲密亦不欲大亦不欲小小展令大大蹙令小疏肥令密密瘦令疏斯亦大經矣筆不欲捷亦不欲徐亦不欲平亦不欲側側𥪡令平峻勿使傾捷則須安徐則須利如此則其大較矣張伯英臨池學書池水盡黑永師登樓不下四十餘年張公精熟號為草聖永師拘滯終著能名以此而言非一朝一夕之所能盡美俗云書無百日工蓋悠悠之談也宜白首工之豈可百日乎汝曹年未弱冠但當研精覃思心目注想時復問本驗頥短長可致佳竟爾鍾太傅坐則畫地數步卧則書被穿表裏由是乃為翰墨之龜鑑耳虞永興筆髓原古文字經藝之本王政之始蒼頡象山川江海之狀蟲蛇鳥獸之迹而立六書戰國政異俗殊書文各别秦患多門定為八體後復訛謬凡五易焉然並不述用筆之妙及乎蔡雍張索之輩鍾繇王衛之流皆造意精微自悟其旨也辨應心為君妙用無窮故為君也手為輔承命竭股肱之用故為臣也力為任使纎毫不撓尺丈有餘故也管為將帥處運動之事執生死之權虛心納物守節藏鋒故也毫為士卒隨管所使迹不拘滯故也字為城池大不虛小不孤故也釋真筆長不過六寸捉管不過三寸一真二行三草指實掌虛右軍云書弱紙強筆強紙弱筆強者弱之弱者強之也遲速虛實若輪扁斫輪不徐不疾得之于心而應之于手口所不能言也拂掠輕重若浮雲蔽晴天波撇平勻如微風搖碧海氣如奔馬亦如朵鈎輕重出乎心而妙用應乎手然則體約八分勢同章草而各有所趨無問巨細皆虛散其筆鋒圓毛蕝按轉易也釋行行書之體略同於真至於頓挫磅礴若猿獸搏噬進退鈎巨若秋鷹迅擊故覆筆搶毫乃接鋒而直引其腕則內旋外拓而環轉紓結也旋毫不絶內轉鋒也加以筆掉聨毫若石璺玉瑕自然之理也亦如長空遊絲容曳而來往又似蟲網絡壁徑實而復虛右軍云遊絲斷而能續皆契天真同於輪扁也又云每作點畫皆懸管掉之令其鋒開自然徑健矣釋草草則縱心奔放覆腕轉蹙懸管叢鈎柔毛外拓右為外左為內起伏連卷收攬吐納內轉藏鋒既如舞袖揮拂而縈紆又如垂藤樛盤而繚繞蹙旋轉鋒如騰猿過樹躍鯉透泉一云逸虯得水輕兵逐虞烈火燎原或氣雄不可抑或勢逸不可止縱狂逸放不違筆意也契妙欲書之時當收其視聽絶慮凝神正心和氣則契於妙心神不正書則欹斜志氣不和書則顛仆同魯廟之器虛則欹滿則覆中則正正者沖和之氣也然字雖有質迹本無為稟陰陽而動靜體物象而成形達性通變其常不住故知書道玄妙必資於神遇不可以力求也機巧必須以心悟不可以目取也字形者如目之視也為目有止限由執字體也既有質滯為目所視逺近不同如水在方圓豈由其水且筆妙喻水方圓喻字聽視則同逺近則異故明執字體也字有態度心之暢也心悟非心合於妙也借如鑄銅為鏡非匠者之明假筆傳心非毫端之妙必在澄心運思至微至妙之間神應斯徹又同鼓琴輪指妙響隨意而生握管使鋒逸態逐毫而應學者心悟於至妙畫契於無為茍涉夫浮華終昧於斯理勸學自古賢哲勤乎學而立其名不學即沒代而無聞矣且會稽竹箭湛盧斷割不括而羽之淬而厲之終不見其利用之材矣右軍云耽之玩之功積邱山張芝學書池水盡黑當學其雅趣求其真意無圖其形容滯於體質此貴乎心意專精必有誠意也豫中宵之間夢吞筆覺後若在胸臆又因假寐見張芝指一道字用筆體斯源也足明至誠感神信有徴矣不得其門而入則苦學而難成故立以君臣之體類以攻戰之勢將以近而喻逺必因蹄而得兔務欲成其要妙啓其戶牖庶後來君子思而勉之矣歐陽率更書三十六法是言歐法如此排疊字欲其排疊疏密停勻不可或闊或狹如夀臺畫筆麗羸爨系旁言旁之類八訣所謂分間布白又曰調勻點畫是也高宗書法所謂堆垜亦是也避就避密就疏避險就易避逺就近欲其彼此映帶得宜又如廬上一撇既尖下一撇不當相同府字一筆向下一筆向左逢字下辵拔出則上必作點亦避重疊而就簡徑也頂戴字之承上者多唯上重下輕者頂戴欲其得勢如疊壘藥鸞驚鷺鬐聲醫之類八訣所謂正如人上稱下載又不可使頭輕尾重是也穿插字畫交錯者欲其疏密長短大小勻停如中弗井曲册兼禹禺爽爾襄甬耳婁由垂車無密之類八訣所謂四面停勻八邊具備者是也向背字有相向者有相背者各有體勢不可差錯相向如非卯好知和之類是也相背如兆北肥根之類是也偏側字之正者固多若有偏側欹斜亦當隨其字勢結體偏向右者如心戈衣幾之類向左者如夕朋乃勿少肱之類正而偏者如亥女丈乂互不之類字法所謂偏者正之正者偏之又其妙也八訣又謂勿令偏側亦是也挑􅦸字之形勢有須挑􅦸者如戈弋武丸氣之類右邊既多須得左邊􅦸之如獻勵散斷之類左邊既多須得右邊􅦸之如省炙之類上偏者須得下􅦸之使相稱方善相讓字之左右或多或少須彼此相讓方為盡善如馬旁糸旁鳥旁諸字須左邊平直然後右邊可作字否則妨礙不便如􅒋字以中央言字上畫短讓兩糸出頭如辦字其中近下讓兩辛出如鷗鶠馳字兩旁俱上狹下闊亦當相讓使不妨礙然後為佳此類是也補空如我哉字作點須對左邊實處不可與成戟戈諸字同如襲辟餐贛之類欲其四隅方滿如醴泉銘建字是也貼零如今令冬寒之類是也粘合字之本相離開者即欲粘合使相著顧揖乃佳如諸偏旁字卧鑒非門之類是也滿不要虛如園圃圖國回包南隔目四鈎之類是也意連字有形斷而意連者如之以心必小川水求之類是也覆冒字之上大者必覆冒其下如雲頭穴宀頭􅲉頭奢金食夆巷泰之類是也垂曳垂如都鄉卿卯夆之類曳如水支欠皮更之走民也之類是也借換如醴泉銘祕字就示字右點作必字左點此借換也黃庭經庭字魏字亦借換也又如靈字法帖中或作􅀢或作丕亦借換也又如蘇之為蘇秋之為秋鵝之為鵝之類為其字難結體故互換如此亦借換也所謂東映西帶是也增減字有難結體者或因筆畫少而增添如新之為新建之為建是也或因筆畫多而減省如曹之為曺美之為美但欲體勢茂美不論古字當如何書也應副字之點畫希少者欲其彼此相映帶故必得應副相稱而後可又如龍詩讎轉必一畫對一畫相應亦應副也撑拄字之獨立者必得撑拄然後徑健可觀如可下永亨亭丁手司卉草矛巾千豫于弓之類是也朝揖字之凡有偏旁者皆欲相顧兩文成字者為多如鄒謝鋤與三體成字者尤欲相朝揖八訣所謂迎相顧揖是也救應凡作字一筆才落便當思第二三筆如何救應如何結裹書法所謂意在筆先文向思後是也附麗字之形體有宜相附近者不可相離如形影起超飲勉凡有文欠攴旁者之類以小附大以少附多是也回抱回抱向左者如曷丐易菊之類向右者如艮鬼包旭它之類是也包裹謂如園圃國圈之類四圍包裹也尚向上包下幽凶下包上匱匡左包右勾胸右包左之類是也卻好謂其包裹鬭湊不致失勢結束停當皆其宜也小成大字以大成小者如坰辵下大者是也以小成大者則字之成形及其小字故謂之小成大如孤字只在末後一捺寧字只在末後一勾欠字一拔戈字一點之類是也小大成形謂小字大字各字有形勢也東坡先生曰大字難於結密而無間小字難於寬綽而有餘若能大字結密小字寬綽則盡善盡美矣小大大小書法曰大字促令小小字放令大自然寬猛得宜譬如日字之小難與國字同大如一字二字之疏亦欲字畫與密者相間必當思所以位置排布令相映帶得宜然後為上或曰謂上大下小上小下大欲其相稱亦一説也左小右大此一節乃字之病左右大小欲其相停人之結字易於左小而右大故此與下二節皆字之病也左髙右低左長右短此二節皆字之病不可左高右低是謂單肩左短右長八訣所謂勿令左短右長是也簡緣云字體亦有左高右低者如即郎之類右邊齊上便不是書亦有左長右短者如缸扣之類右邊若長亦不是字不可專謂字之病也褊學歐書者易於作字狹長故此法欲其結束整齊收斂緊密排疊次第則有老氣書譜所謂密為老氣此所以貴為褊也簡緣云歐書病在頭長腳短褊者欲其相稱非謂密也書譜密為老氣非此之謂各自成形凡寫字欲其合而為一亦好分而異體亦好由其能各自成形故也至於疏密小大長短廣狹亦然要當消詳也相管領欲其彼此顧盼不失位置上欲覆下下欲承上左右亦然應接字之點畫欲其互相應接兩點者如小八小自相應接三點者如系則左朝右中朝上右朝左四點如無然則兩旁二點相應中間相接又作亦相應接至於撇捺水木州之類亦然已上皆言其大略又在學者能以意消詳觸類而長之可也張懷瓘玉堂禁經夫人工書須從師授必先識勢乃可加功功勢既明則務遲澀遲澀分矣無繫拘局拘局既亡求諸變態之旨在於奮斫奮斫之理資於異狀異狀之變無溺荒僻荒僻去矣務於神彩神彩之至幾於玄微則宕逸無方矣設乃一向規矩隨其工拙以追肥瘦之體疏密齊平之狀過乃戒之於速留乃畏之於遲進退生疑否臧不決運用迷於筆前震動惑於手下若此欲速造玄微未之有也今論點畫偏旁用筆向背皆宗元常逸少兼遞代傳變各有所由循其軌範並列條貫用筆法夫書之為體不可專執用筆之勢不可一槩雖心法古而制在當時遲速之態資於合宜凡筆大法點畫八體備於永字側不得平其筆勒不得卧其筆努不得直直則無力躍須蹲其鋒得勢而出䇿須背筆仰而䇿之掠須筆鋒左出而利啄須卧筆疾罨磔須躍筆戰行右出八法起於隸字之始後漢崔子玉歷鍾王以下傳授所用八體該於萬字墨道最微不可遽明又先達八法之外更立五勢以備制度門一曰鈎裏勢須圓角而憿鋒网閔田字用之刀二曰鈎弩勢須圓角而躍鋒均勻旬勿字用之丶三曰衮筆勢須按鋒上下衄之今令字下點用之丨四曰儓筆勢須竪䇿之鍾法上字用之一五曰奮筆勢須嶮䇿之草書一二三字用之又有用筆腕下起伏之法用則有勢字無常形一曰頓筆摧鋒驟衄是也則弩法下腳用之二曰挫筆挨鋒捷進是也則綿頭上三點用之三曰馭鋒直撞是有點連物則名暗築目其是也四曰蹲鋒緩毫蹲節輕重有準是一􅡧等用之五曰􅢶鋒駐筆下衄是也夫欲躍者必先蹲之刀冖是也六曰衄鋒駐鋒暗接是烈火用之七曰躍鋒緊御澀進如錐畫石是也八曰按鋒曩鋒虛闊草書磔法用之九曰揭筆側鋒平發人天腳是如鳥爪形烈火異勢從此古烈火勢出於正體書於銘石時或用之法以發勢潛築迅憿而徑側從字頭僉字腳用之火此名各自立勢勢則抵背潛衄視之不見考之則彰乃鍾法即繇白然字下是爾後王逸少行之不怠隸用之火此名聫飛勢似連綿相顧不絶法以暗衄而微著勢以輕揭而潛躍乃右軍變於鍾法而參行諸法則樂毅論燕字無字時或間為後遵用之至今不替火此名布棊俗勢凡拙不可為也散水異法水此名遞相顯異意以或藏或露狀類不同法以剛側而中偃下潛挫而躍鋒則右軍黃庭樂毅論用此也水此名潛相矚視外雖解摘內則相附此蓋鍾法上冰以潛鋒暗矚下以迅躍而捷遣右軍遵用之於真隸常所為之水此行書法以微按而餉揭意以輕利而為美鍾張二王行書並用此法又用此水也冰此草書法法以借勢捷遣而已矣若失之以緩滯即其為病甚矣不可不慎也勒法異勢一此名鱗勒鱗勒之中勢存仰策而收雖言仰收無芒角芒角則失於遒潤矣鍾王以下常用之一此名借勢法以不仰策及鱗勒但取古徑枯澀無求銛利則其妙也右軍通變以避駢勢夫為真隸必先用之一此名平布凡俗不可用也乛此名草法勢以險策捷坐鋒露飛動而已策變異勢二此名遞相顯異何者兩橫引而不可一槩理資變異各狀殊工法以上背筆而仰策下緊躍而覆收則鍾書常用此逸少參而用之二此名借勢不務策勒但取古澀而已雖云古澀用筆之意不忘仰覆之理二此名章草草書之勢法以嶮策飛動鍾張二王章草草書常用此二此名布算時俗所貴非墨家之態戒之三畫異勢三此名遞相解摘何者三畫用筆相類不求變異則涉凡淺法以上畫潛鋒平勒中畫背筆仰策下畫緊躍覆收此蓋王法則黃庭經三門三字用之三此名遞相疏峙蓋行書用之法以上勒側而中策下奮筆而橫飛鍾張二王行草並依此法三此名峭峻勢亦草書之法嶮利為勝三此名畫卦勢俗鄙不可用啄展異勢人此人入等法法此左罨略而迅利右潛躍而戰行行勢盡而微著摘出而暗收脫若便拋下虞流滑則冥於凡淺梁庾肩吾書論云將欲放而更留謂此人此名交爭勢蓋行草法也法以衄鋒啄掣捷利疾進為勢若交急意存力敵若或失之於鈍滑斯可慎也陳僧智永常用此法人此名章草之法法以潛按而微進輕揭而暗收躍之欲利按之欲輕輕則滑徑而神清肥乃質滯而俗鈍王濛草善於此法􅡧腳異勢隱此名外略法蹲鋒緊略徐擲之不欲速速則失勢略不欲遲遲則緩怯此法蓋鍾法稍涉于八分散隸則歐陽詢守而不替隱此名蠆毒法法以引過其曲微以輕􅢶其鋒又以徐收而躍之不欲出出則暗收如芒刺為善庾肩吾書論云欲挑還置謂駐鋒而後躍也乙此名俗勢慎勿為之宀頭異勢宀此名若􅢶夫上點既駐筆挫鋒左右亦須挫鋒橫畫亦須挫筆何者勢須順戒在反異則王書告誓實字之宀是也宀此名各相顯異上點既側橫畫則勒左衄筆而擺鋒右峻躍以輕揭則王書告誓容字之宀是也宀此行書法法以圓而飛動為妙宀此章草書之法其于嶮側務在露鋒其于鈎裏忌之緩滯人不得法則失之於忽微爾切慎之倚戈異勢此名折芒勢法以潛鋒緊躍躍意盡乃潛收之而躍䟐之鍾繇下哉字用是也乀此名秃出勢上下縮鋒雖言縮鋒亦須潛躍而頓衄則虞世南常用此法􅡧此名借勢既不潛躍而暗躍法以利徑而捷遣則虞歐用此法􅡧此名背躍時用之蓋所以失之於前正之於後故右軍有言曰上俯而過矣下衄曲而就之則告誓後載字是也頁腳異勢頁此狀上畫平勒而仰收其次暗築而憿鋒左右謂之鈎裏其中布點顧以更美夫以上竦之而仰策則中偃而平收夫以策而再竦則左啄而右側故鍾張二王應從頁並用之頁此名斗折不仰不策點不偃不收並謂之壘塹張長史名之窗櫺非書家所為也垂針異勢丨此名頓筆之法以摧挫為工此乃古法鍾元常守而不失改為垂露丨此名懸針古無此法右軍書曲水序年字緣向下頓筆嵗字上畫藏鋒與年字頓相逼遂改垂露為頓筆直下垂針後人立懸針相承遵此也結裏法夫言抑左升右者圖國圓冏等字是也夫言舉左低右者崇豈專等字是也夫言促左展右者尚執常寬宣等字是也夫言實左虛右之勢者月周用等字是也夫言左右揭腕之勢者令人入等字是也夫言上下不齊之勢者行何川字是也夫言用勾裏之勢者岡岡白田等字是也夫言欲挑還置之勢者元行􅡧寸字是也夫言用鈎弩之勢者均勻旬勿等字是也夫言將欲放而更留者人入木火字是也翰林密論用筆二十四條或云是李陽冰作丶點法口訣云作點向左以中指斜頓向右以大指齊頓作報答便以中指挫鋒須收鋒在內按筆收之又衄下其筆含濡其鋒摩輪簇心然後收筆填在員半禁經云點如利鑽鏤金是也又半蟻法宜字上用之為避其旁點又側下其筆使墨精暗墜徐乃反揭則稜利矣右軍云作點皆須磊磊如大石之當衢又點不變為布棋貴通變也更有打點單以指送筆似打物之勢甚難用也一畫法口訣云作橫畫皆用大指遣之若作策法即用名指擡筆上若作勒法即用中指鉤筆澀進覆以中指頓筆然後以大指遣至盡處此三勢相近用法不同也鱗勒法須仰收禁經云畫如長錐界石是也又緊走仰收似長舟之截小渚兩頭勢起使芒角不失遒潤借勢不策不鱗勒稍徐收之取古徑枯澀無求銛利凡在字上宜用之擡筆法初緊策中擡鋒輕徑微勒向右按衄古經云鍾書宣示字長畫用又畫不變為布算行草法云勢須險策露鋒飛動為勝三三畫法口訣云上潛鋒平勒中背鋒仰策下緊躍覆收名遞相解摘古經云黃庭經三關字用草法上衄側中策下奮筆橫飛遞相聳峙以險利為勝丨懸針法口訣云鋒須先發管逐勢行䟐筆緊馭澀進如錐畫石禁經云懸針如長錐綴地是也又契字下雙筆須一努一垂變換用之三勢不同或垂或躍或外掠而中努右軍云懸針垂露難為體制衛夫人云如萬嵗之枯藤臨池訣云懸針法蘭亭年字盡其勢也張敬玄云申字中畫宜卓筆直審疾抽事字中畫宜直下筆便挑不宜停筆丨垂露法口訣云鋒管齊下勢盡殺筆縮鋒又始築筆而極力終駐鋒而作勢又無垂不縮此言頓筆以摧挫為功右軍云竪如春筍之抽寒谷是也臨池訣云玉露本腳名玉筯如古叉倚物也簡緣云篆為隸源即此可見􅡧背拋法口訣云蹲鋒緊掠徐擲之速則失勢遲則緩怯臨池訣云此鍾法稍涉八分尾法引過其曲轉蹲其鋒又徐取而蹲躍之不欲出須暗收使其如負芒刺則善右軍云援毫蹲節輕重有準庾肩吾云欲拋還置駐鋒而後躍之也乀抽筆法口訣云左罨掠須峻利右潛躍而戰行待勢卷而機駐揭摘出而暗投若便拋必流滑凡淺又側起平發緊殺按波為抽筆從腹內起庾肩吾云將放更留又人字第二筆云攙引抑拽是也夫本等字亦同用背躍法口訣云悉以中指遣至盡處以名指拒而躍之又云潛鋒門勒勢盡然後躍之右軍背躍戈法上則俯而過下則曲而就蓋所以失之於前正之於後也古經云鍾書哉字用又永禪師澀出戈法下以名指築上借勢以中指遣之按筆至下以名指衄鋒潛躍此名秃出法張旭折芒法潛鋒緊走意盡乃收而躍之鍾書常用也右軍云落筆峩峩如長松之倚溪谷唐太宗云為戈必潤貴遲疑而顧章草法潛按微進輕揭暗躍揭欲利按欲輕輕則骨徑神清肥乃質滯鈍俗張敬玄云戈腳宜斜筆直抽直者緣上實下自成也水散水法口訣云上衄側中偃下潛挫躍鋒古經云黃庭樂毅同用栁宗元云散水幽縱黃庭宗之是也臨池訣云或藏或露狀類不同要遞相顯異若頻有兩點相近而下點當高此名潛相矚視外雖解摘內相附屬為上中潛鋒暗衄下峻躍潛遣蓋鍾法也行書勢微按而鈎揭以輕利為美冰冰法口訣云上側覆殺下築而躍之須相承揖並連衄側輕揭則率字左右用之草法須借勢捷遣若緩滯則為病也火烈火法口訣云衄鋒暗按臨池訣云須各自立勢抵筆潛衄所謂視之不見考之彌彰古經云鍾書然字用火聨飛法口訣云暗衄微駐輕揭潛躍筆鋒連綿相顧不絶也禁經云聨飛如雁陳當秋樂毅論燕然字用之虞永興兼字用其半勢蓋中斷也宀顯異法口訣云上點駐鋒左右挫鋒橫書按筆勢須相順古經云出告誓文又上點側橫畫勒左一筆擺鋒右峻啄輕揭告誓實字用虞永興用之行法以圓峻飛動為美章草法擬於圓峻飛動其餘險側務在露鋒鈎裏忌緩滯也辵平磔法口訣云不遲不疾戰筆側去勢卷不可便出須駐鋒而後放禁經云磔磔如生蛇渡冰是也鍾元常每作磔筆須三過折筆故唐太宗云為波必磔貴三折而遣毫􅗵勾裹法口訣云圓角躍鋒作努法勢未盡而躍之顔魯公云勾裹法用筆如紙下行日月目因岡罔向字皆用之張敬玄云固字轉角之勢初不宜稜角努張即是體俗也非特固字但有轉筆一切貴其圓潤􅗵勾努法口訣云圓角激鋒待筋骨而成要如武人屈臂石軍云回角不用峻及有稜是也衛夫人謂之徑弩法勻均勿字皆用之小奮筆法口訣云左側而獨立中衄折而右鈎古經云鍾書宣示字下用若中竪則左右暗衄而潛躍又簇鋒捷進為系字下三點是也彡衫法口訣云上平點中啄下衄側隱外臂法口訣云左峻掠中潛鋒衄挫右蹲鋒外擲丨竪畫法口訣云擡筆竪策挫鋒上下竪直也尚嘗字中竪畫用丷八曽頭其腳法口訣云左潛揭而右啄曽頭用如上法左啄右側其腳用之暗築法口訣云馭鋒直衡有點連物則名暗築月字其字內兩點用衮筆法口訣云須按鋒上潛下衄又按鋒上下蹙衄之令今等字是也爻縮出法口訣云上磔衄鋒下磔出之此八分法也蓋避雙出也又戔字上縮鋒作努下出鋒作躍張云戔如束棘簡緣云玉堂禁經及翰林密論兩篇書家多不全載此正是功夫細膩處其中雖多同處然各有發揮余故不以其重復而並録之黃長睿東觀餘論云流俗言作書皆欲懸腕而聚指管端真草必用此法乃善豫謂不然逸少書法有真一行二草三以言執筆去筆跗逺近耳今筆長不過五寸雖作草書必在其三而真行彌近今不問真草必欲聚指管端乃妄論也觀晉宋及唐人畫圖執筆未嘗若此可破俗之鄙説簡緣云此亦老成之言但腕不可著案書法正傳卷六
