body:
  text: 書法正傳卷二常熟馮武撰書法三昧書法題辭一下筆二布置三運用㸃之祖畫之祖短畫之祖竪畫之祖鈎之祖撆之祖短撆之祖捺之祖四為學綱目五結構附衍極至朴篇書法傳流金華胡翰曰楷法雖出於漢魏未見於三代其源要從篆隸而變也其㸃畫波磔横從曲直圓銳端側豈徒然哉其中必有法矣夫分上而分下辨左而辨右宜偏宜中或藏或露有起而有止當向而當背其俯仰其收駐其推讓其迴折先後開合之次序大小長短之類聚必使相稱相應然後體始成而少合乎古人變楷初意爾不然字勢雖可愛而無法之可尚不過一楷書俗吏如涪翁所云何足重哉此編名書法三昧不知撰者誰氏其言或本於古人之所已言而書則未有能盡知也前元時見於都下館閣名臣家漁陽鮮于樞吳興趙松雪康里巙巙子山常寳愛之參政周伯琦來吳中久而人方知其有是編其歸鄱陽也人始得而相傳之乃知諸公之寳愛果然也古人論書云一須人品髙二須師法古是書之法學者習之固常熟之於手必先脩諸德以熟之於身德而熟之於身書之於手如是而為書焉其容止之可觀進退之可度隱然自見於毫楮之閒端嚴而不刻温厚而難犯簡縁云知此方可免崢嶸求勝之態如鄧志之論蔡君謨始可以為善矣臨池君子其謂然乎書法題辭執筆之法實指虚拳運筆之法意在筆先八法立勢永字精研一字體態側倚取妍仰覆向背開合折旋垂縮留放肥瘦方圓畫分篆隸鋒别正偏藏風聚氣結構綰牽習與俱化心手悠然凡茲三昧參透幽𤣥茍非知者不可以傳一下筆下筆之始有折鋒有搭鋒凡作字第一多是折鋒第二三字多是搭鋒承上筆勢故爾若一字之間右邊多是折鋒應在左邊故也又有平起如隸簡縁云横畫藏鋒如篆簡縁云竪畫大要折搭多精神平藏善含蓄簡縁云方與小篆合則妙矣二布置布置如中字孤單則居中龍字相並則分左右為二停衝字則分為三停雲字則分為上下二停凡四方八面㸃畫皆拱中心唯嚨呼吸等字左短口欲上齊和扣如知等字右短口欲下齊須先主後賔承上接下左右相應以大包小以少附多太繁則減省太少則增益如此則成一字自然可觀謂如宣尚髙向等字須迴轉右肩如其實貝真等字長舒左足如月丹用周等字則峻拔一角如見目罔内等字則潛虚半腹如無字四竪則上開下合四㸃則上合下開如工並字畫則上仰下覆如三字則上畫仰中畫平下畫覆與畺字同如爻字則上捺留下捺放茶字則上捺放下捺留如亦字右縮左垂斤字則右垂左縮上下亦然如毚字則下免除二撆懸字則除系左㸃譬字則除上口盛字則除成字中鈎如神字加一㸃辛字加一畫冊門字須自立向背八州字皆潛相矚視如字或止一㸃一畫者須大書以成其獨立之勢如昌吕爻棗等字須上小林棘羽竹等字須左蹙之類難以枚舉以此類推則隨字立意位置則知結體之大槩矣三運用夫作字之要下筆須沈著雖一㸃一畫之間皆須三過其筆方為法書蓋一㸃微如粟米亦分三過向背俯仰之勢一字有一字之起止朝揖顧盻一行有一行之首尾接上承下之意此乃古人不傳之𤣥機宜加察焉簡縁云悟此方沈著㸃之祖凡㸃之類倣此㸃之祖蹲鴟之勢三過側法也起自中而末鋒自中出㸃有尖秃斜正隨字勢而用之仰三角㸃覆三角㸃用於勢當仰覆者傍三角㸃用於直波㸃水直三角㸃直四角㸃用於宀帀之類亂四角㸃起於蘭亭茂字用於立羊善美等字長鼠矢㸃用於長吏使更等字短鼠矢㸃用於夾奚契等字三往一復㸃向背㸃兩傍分八字相向與中帶相背立寛横波㸃促横波㸃皆用於下四㸃急雁陣緩雁陣燕然樵三字外不可用抝兩對㸃用於米兆等字順兩對㸃用於飛雲等字順三對㸃用於非災興變等字上小字用於光堂等字下小字用於示系等字上八字用於曾公下八字用於貝只垂膽㸃用於宁穴字等字三角顧盻㸃用於州字心字開三㸃用於系斂三㸃用於孚横三㸃用於龍閒六㸃用於榮畫之祖凡畫之類倣此畫之祖勒法也狀如算子便不是書其法初落筆鋒向左急勒迴向右横過至末復駐鋒折迴其勢首尾俱低中髙拱如覆舟樣故曰勒常患平智永虞世南上而鍾王多用篆法為畫歐陽褚薛多用隸法為畫秘訣云竪畫須横入筆鋒横畫須直入筆鋒簡縁云得此大悟矣此不傳之樞機也短畫之祖凡策之類倣此短畫之祖策法也其法仰筆䟐鋒輕擡而進有如鞭策之勢故言策不言勒異於勒者勒則兩頭下中髙策則兩頭髙中下唐太宗云策者仰策仰收栁宗元云策仰收而暗掲如其天夫才之類皆短畫皆為策也竪畫之祖凡直落筆倣此竪畫之祖努法也栁宗元云努過直而力敗其法初横入筆向上行而少駐復引鋒下行勢須作凸胷而立至末復駐鋒收向上此垂露也末鋒駐而不收引而伸之此懸針也大要畫多則分仰覆以别其勢竪多則分向背以成其體目字之竪向也門字之竪背也川字中竪直左右之竪相背冊字中二竪直左右之竪相背圖字六竪相向皆分向背以避鋪算子也鈎之祖凡鈎之類倣此鈎之祖趯法也栁宗元云趯宜蹲而勢生其法蹲鋒上出險勢傍分然亦分三體左如氐長字須長趯以應右右如門丹字須長趯以應左中如東乘字趯須朝上又有棘針短而有力蠆尾丁亭寧字用之蟹爪殊字用之事于之趯皆隨體變化也撆之祖凡撆之類倣此撆之祖掠法也栁云掠左出而鋒輕顔云掠髣髴以宜肥其法曰此乃斜懸針而末鋒飛起也簡緣云記此則撆無病宜出鋒處送筆力到而匀不可半途撆出則無力而瘦弱如大夫右字之類是也又謂之腕須直下筆而彎出之如左字用􅚀須斜硬右字用􅚀須腕轉也鈍吟云手根懸起和筆俱行則長撆如蘭葉若手根著紙則斜拂去有半途撥出之病簡縁云七法皆正鋒惟掠法用偏鋒短撆之祖凡啄之類倣此短撆之祖啄法也水永等字用之其法下筆駐鋒後即出名曰啄栁宗元云啄倉皇而疾掩凡字之短撆皆用之隼尾也如立人頭上撆是也如鷹隼之立乎柱首竪三撆者則須分勢如三字之畫為仰平覆也此則上撆平中撆斜下撆直狀如栁穿魚捺之祖凡磔之類倣此捺之祖磔法也今人作捺多是兩駐雖曰三過實不知此法其法首搶起中駐而右行末駐筆蹲鋒而出如蘭亭之捺皆含蓄而不露最為髙也栁云磔䟐趞以開撑又有欣字燕尾者乃急就章之波法也如水之自泉口流出其下遇石激而過故謂之激石波凡永長分外等字用之右上項側勒努趯策掠啄磔八法備矣書法運用盡矣但於側倚取妍擔夫爭道血脈聨屬雄徤嫵媚體態横生出乎八法之外者又須詳論非紙筆可形容用力熟閑自詣壼奥至此不幾其神乎四為學綱目書法綱目萬字俱全凡學必有要若網在綱有條而不紊永字者衆字之綱領也識乎此則千萬字在是矣三靜法地五動象天地靜也故以不變者法焉天動也故以變者法焉簡縁云三不變勒策磔是也五變側趯掠啄努是也次及條目變㸃方圓變者如髙低長短闊狹其變無窮也㸃者下筆成㸃而後行也方者自方圓者自圓如置筯於案上而非匾鋒也簡縁云此之謂圓俯仰向背沈瑩清權有俯仰向背者則俯仰向背無則為之俯仰向背沈者下筆不浮刻入紙中也瑩者如孤月流天無雲翳也清者非謂瘦與寒也肥者亦有清氣也在參古帖而得之權者如鬢字無镸㸃譬字無口之類是也抝者讓者引焉疑焉抝者你東我西而不失於相順讓者要還他地位隨時處宜而措之也引者如左簷等字引而伸之疑者如有伏兵疑不敢動如帝帶等類是也鳥立木上雁在天邊鳥立木上行仁之類是也雁在天邊燕然樵之類是也掬特圓起掬者從本身上掬出也故其上欲圓口字是也特者特筆寫也故其上欲起口字是也二者相需為用也搶摺迴聨搶者策類也摺則筆鋒飛動翻而非硬直也迴則有虚迴實迴聨則有虚聨實聨二者不可偏廢也齊努磋駐齊者勒類也努者竪畫也嗟者左右掲腕也駐者如駐馬無往而非此道也屋漏蜿蜒屋漏痕者不見起止之迹也烏絲闌者蔡襄所專烏絲闌者鋒正則兩傍如界也復有八忌切意精研枯槁生硬輕重纒綿内外是縱左右非堅枯槁則無潤澤生硬則非軟美輕重則不典纒綿則不瑩内縱者腹肚闊外縱者手脚不停分而長左為左掲腕右為右掲腕皆不可無力知所趨捨為書中仙趨所當法避所當忌則為盡善矣五結構雲空上勾之應下如鳥之視胷九見腕勾之應上須折鋒而起門月右勾應左半斜銳以為精來東中勾應上隨縮鋒而微露長民左勾應右須盡趯其鋒黍委上下之撆㸃有陰陽之分不分則無上下相承之意術衝三排之直畫者卓然中立不倚而左右有拱揖之情畺三三排之横畫者截然中處不乖而上下有仰覆之别其目四畫之字上下反其情而二三但取其順然無四㸃之字左右要成八字中帶可就上不可就下皿四四柱之字左右上開而下合炎茶兩捺之字或上捺或下捺各宜所重反及兩撆之字先長而斜硬後差短而腕轉廬多此等之字先腕轉而後斜硬口曰不可横不可長須下畫長承直末臣巨直末欲直内而右傍短直應之旬匊此等字裏面與勾齊方稱長馬如此短畫不可與長直畫相粘衣良捺應左勾須畧平起莫矢此等之字下畫宜長撆短不轉而㸃取下之長短用之思志心在下者欲折右足右寛方稱見貝此等之字須右長直畫作棘刺中短畫不可相粘欲其圓淨匀平而啄短出以㸃承長直畫而為之終逺還凡之遶裏面字上大下小方稱雖難此等直畫微向左以避右邊之勢鳥烏屈脚之勢如角弓之張用周須初撆首尾向外次努首尾向右簡縁云或作左則右傾矣固國初直畫首尾向右平畫仰次直畫首尾向在戔森重勾之字在乎先縮鋒而後出鋒作趯以應捺亦同作行左短而右長於佳右短而左長自因左竪短而右勾微長亦馬㸃之重併亦必屈伸以變換之不變謂之布棊三冊畫之重併者必隨宜屈伸仰覆向背以變換之否則如布算􅀢薑繁雜者必求古人佳樣用之古無則不可擅寫邊爾太繁者宜減除之倉食上面不可寫波上下直畫宜短㸃皆近上是足卜字居中下撆須横而波啄之中又名三牽綰法也攵初啄而畫頭接其尾中復以波上接啄而終之心初㸃向裏横戈斜平勾向内而收中㸃取髙勢欲粘帶第三㸃第三㸃又須與勾髙不可下風兩邊悉宜圓名曰金剪刀簡縁云此法在廟堂碑柔下面朩左右須與直齊者日字不宜正對土字十横畫較長直畫宜短七横畫較長直畫轉而復迴和偏少者伸㸃畫以就之羶偏礙者尾鈎以避之升字之孤單者展一畫以書之棗字之重併者蹙一畫以書之畫九畫之字必須下筆勁淨疎宻停匀照應為佳當疎不疎反成寒乞當宻不宻反成寛疎相揖相背發於左者應於右起於上者伏於下此不易之法也辛太疎者補續之仍必有古人佳樣乃可寫左畫短而斜硬其撆右畫長而腕轉其撆大横畫微短撆就畫上直下至畫下方腕轉向左波首微出畫上大要波首暗接連腕末鋒則血脈聨屬簡縁云此篇切記附衍極至朴篇書法傳流初蔡邕得書法於嵩山以授崔寔及其女琰張芝之徒咸受業焉魏初韋誕得之秘而不傳鍾繇令人掘韋誕墓得蔡氏法將死授其子㑹宋翼繇之甥也學書於繇繇弗告也晉太康中有人破鍾公塚翼始得之魏晉閒衞氏三世能書衞覬與其子瓘及見胡昭韋誕鍾繇瓘及其子恒俱學於張芝恒從妹衞夫人親受業於蔡琰衞與王世為中表故羲之父曠得之以授羲之羲之授其子獻之及王濛之子脩故諸王世傳家法獻之傳其甥羊欣欣傳王僧䖍僧䖍傳蕭子雲晉宋而下能者頗多其流皆出於二王也隋釋智永羲之九世孫或云七世也頗能傳其學又親授法於蕭子雲虞世南親見永師故其法復傳於唐焉歐陽詢得於世南褚遂良親師歐陽或云虞褚同師史稜稜隋人也歐陽詢傳陸柬之柬之及見永師又世南之甥也陸傳子彦逺彦逺傳張旭彦逺張之舅也旭又得褚遂良餘論以授顔真卿李陽冰徐浩韓滉鄔彤魏仲犀韋玩崔邈等二十二人釋懷素聞於鄔彤栁公權亦得之其流實出於永師也徐浩傳子璹及皇甫閱崔邈傳褚長文韓方明受法於璹及邈皇甫閱傳栁宗元劉禹錫楊歸厚歸厚傳姪緯緯傳權審張藂翟𢎞裕𢎞裕禹錫外孫也𢎞裕傳盧潛潛傳頴頴傳崔紓栁宗元傳房直温有劉埴者亦得一鱗半甲簡縁云此編直捷精至覽之使人洞然無疑非大悟徹人不能為此也書法正傳卷二
