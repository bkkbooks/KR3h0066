  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0066_WYG_004-1a, image: WYG0826/WYG0826-0360a.png}
body:
  text: 書法正傳卷四常熟馮武撰大字結構八十四法明李淳進臣幼習大字未領其要後獲儒僧楚章授以李溥光永字八法變化三十二勢寶而學之漸覺有得後又獲王右軍羲之八法詩訣共三昧歌玩其妙用亦轉覺有所進步也雖然運筆之法近得頗熟結構之道實有未明因取陳繹曾所述之書法及徐慶祥所注之書法求其藴奧見有天覆地載分疆三勻及勾弩勾裹之目總而輯之共有一百一十三目用而為法書之庶幾近於規矩惜其紊亂中閒猶有未盡善者則去而不取止選五十八目成法緣未盡書法之道臣忘其固陋竊取陳徐二家法外之意續添二十六目如二段三停減捺減勾之類同前共八十四目就題曰大字結構八十四法又每法取四字為例作論一道以開字法之奧今集既成固知僭踰罪莫能逃臣不勝戰栗之至臣謹言天覆宇宙宫官要上面蓋盡下面法宜上清而下濁地載直且至里要下畫載起上畫法宜上輕而下重讓左助幼即却須左昻而右低若右邉有謙遜之象讓右晴蝀績峙宜右聳而左平若左邊有固遜之儀分疆體輔願順取左右平而無讓如兩人併相立之形三勻謝樹衛術取中閒正而勿偏若左右致拱揖之狀二段鑾嚮需留要分為兩半較其長短微加饒減三停章意素纍要分為三截量其疏密以布均停上占地步雷雪普昔要上面濶而畫清下面窄而畫濁下占地步衆界要禹要下面寬而畫輕上面窄而畫重左占地步數敬劉對要左邊大而畫細右邊小而畫粗右占地步騰施故地要右邊寬而畫瘦左邊窄而畫肥左右弼辦衍仰要左右瘦而俱長中閒肥而獨短上下鸞鶯釁叢要上下寬而微匾中間窄而勿長添中占地步蕃華衝擲要中間寬大而畫輕兩頭窄小而畫重俯仰勾躍冠冦宓宅要上蓋窄小而勾短下腕寬大而勾長添平四角國固門闌要上兩角平而下兩角齊法忌挫肩垂腳開兩肩南丙雨而要上兩肩開而下兩腳合法忌直腳卸肩勻畫壽疆畫量黑白喜得均勻錯綜馨聲繁繫三部怕成犯礙疏排爪介川不疏排之撇須展不展則寒乞孤窮縝密繼䌴纒䌵縝密之畫用蹙不蹙則疏寬開散懸針車申中巾懸針之字不用中竪若中竪則少精神中竪軍年單畢中竪之字不用懸針若懸針則字不穩重上平師明牡野上平者其小者在左而莫錯方隅下平朝叙叔細下平者其小者在右而勿差地位上寬寧可亨市上寬者下面固然難大惟長趁而方佳下寬春卷夫太下寬者上面已是成尖用短蹙而方好減捺燮癸食黍減捺者宜減不減則重捺難觀減勾禁野戔懋減勾者宜減不減則重勾無體讓橫喜婁吾𤣥讓橫者取橫畫長而勿擔讓直甲干平市讓直者要直竪正而勿偏橫勒此七也也橫勒者但放平而無勢均平三云去不均平者若兼勒以失威從波丈尺吏㬰從波之波惟喜藏頭收尾橫波道之是足橫波之波先須拓頸寬胸從戈武成幾夷從戈之戈但怕彎曲力敗橫戈心思志必橫戈之戈尤嫌挺直勾平屈腳烏馬焉為屈腳之勾須要尖包兩㸃承上天文支父承上之撇宜令義對正中曾頭曾善英羊曾頭者用上開而下合其腳其具與典其腳者用上合而下開長方罔周同冊長方者喜四直而寬大短方西曲回田短方者貴兩肩而平開搭勾民衣良長搭勾者勾須另搭不則纍茍筆之態重撇友及反夌重撇者撇須宛轉不則犯排牙之名攢㸃采孚妥􅗸攢㸃之㸃皆宜朝向不則為砌石之樣添排㸃無照㸃然排㸃之㸃須用變更不則為布棊之形添勾努菊萄蜀曷勾努之字不宜用裹若用裹字便不方圓勾裹甸句勾勺勾裹之字不宜用努若用努字最難飽滿中勾東束米未中勾之字但憑偏正生妍添綽勾乎手豫于綽勾之字亦喜妍生偏正伸勾紫資旭勉伸勾之字惟在屈伸取體添屈勾鵷鳩輝俯屈勾之字要知體立屈伸添左垂笄并亦弗左垂者右邊不得太長添右垂升叔拜卯右垂者左邊須索要短添蓋下㑹合金舍蓋下者左右宜乎均分添趁下琴谷吞吝趁下者兩邊貴乎平展添從腕鳯風飛氣從腕之腕宜長惟怕蜂腰鶴膝橫腕見毛尤兔橫腕之腕嫌短不宜鶴膝蜂腰從撇尹戶居庶從撇之撇最忌短仍患鼠尾牛頭橫撇考老省少橫撇之撇偏喜長惟怕牛頭鼠尾聨撇參彥形彤聨撇之法取下撇之首對上撇之胸散水沐波池海散水之法躍下㸃之鋒應上㸃之尾肥土止山公肥者止許略肥而莫至於浮腫瘦了卜才寸瘦者但須少瘦而休反為枯瘠疏上下士千疏本稀排乃用豐肥粗壯密贏齎龜鼉密雖緊布還宜自在安舒堆晶品畾磊堆者纍纍重疊宜重疊處以鋪勻積爨䉹􅓱鬱積者總總繁紊用繁紊中而取整偏入八􅡧已偏者還須偏稱圓轡巒樂欒圓者則喜圍圓斜毋勿乃力斜者雖斜而其中要取方正正主王正本正者已正而四方無使餘偏重哥昌吕圭重者下必要大併竹林羽弱併者右必用寬長自目耳茸長者原不喜短短白曰臼四短者切勿求長大􅀢􅀢囊櫜大者既大而妙於攢簇小某口小工小者雖小而貴在豐嚴向妙舒飾好向者雖迎而手足亦須回避背孔乳兆非背者固扭而脈絡本自貫通孤一二十丨孤者畫孤而惟患於輕浮枯瘦單日月弓乍單者形單而偏重於俊麗清長蓋聞字之形體有大小疏密肥瘦長短字之㸃畫有仰覆屈伸變換嘗患其浩瀚紛紜莫能盡於結構之道所以定此八十四法為例推廣求之若無法者不失於偏枯則失於開放不失於開放則失於承載趨避鮮有合格可觀者焉蓋大字以左端均稱為貴偏斜放肆為忌是以此法取分界地步為主折算偏傍為用收斂肢體布置形容具注則繁略伸大意且如一字之形理有數等有上蓋大者有下畫長者有左邊髙者有右邊髙者非在一途而取軌全資衆道以相承約方圓於規矩定平真於準繩欲使四方八面俱拱中心勾撇㸃畫皆歸閒架有相迎相送照應之情無或反或背乖戾之失雖字形有千百億萬之不同而結構亦不出乎此法之外也若夫筋骨神氣須自書法精熟中融通變化久則自然有得非但拘拘然守此成法為也景泰二年二月初一日臣李淳謹上進書法正傳卷四
