body:
  text: 書法正傳卷九常熟馮武撰名迹源流鍾繇賀捷表歐陽永叔以史考之謂建安二十四年九月闗某未死不應先作此表董逌又謂元常字細畫短逸少臨之不應畫疎體枝鋒露筋絶決知非元常之書也簡縁云按元常真迹若偽右軍不應臨寫若鍾書可偽則右軍學者亦偽乎鍾書賀捷宣示墓田諸迹歴代内府珍藏歴代善書大臣鑒定宋儒偏要生事甚無謂也鍾繇宣示表楮目八行南齊王僧䖍書録云太傅宣示墨迹為丞相始興寳愛喪亂狼狽猶以此表衣帶帶過江後在右軍處右軍借王脩脩死其母以其子平生所愛納諸棺中遂不𫝊所傳者乃右軍别臨本梁武所謂勢巧形宻勝於自運者也唐韋述叙書云開元中蕭令奏滑州人家藏右軍扇上真書宣示及小王行書二卷敕命滑州給驛齎書本赴京其書扇有貞觀印舊褾織成題字蓋宣示祗有右軍臨本鍾迹亡矣鍾繇季直表鍾繇薦季直表至元甲子分湖陸行直字季道以厚貲購得於方外友旋失去二十六年至正九年又得之髙古純朴超妙入神上有河東薛紹彭印黄初至今二百餘年方見於世從前鑒賞家並未齒及神物顯晦蓋有候也先朝又歸沈石田家或疑為唐人書然書法非元常不能也今有刻本甚精鍾繇丙舍帖原跡無存張彦逺謂右軍暮年臨此筆法彌老墨本在吕文靖公家薛紹彭摹得兩紙右軍蘭亭序唐何延之蘭亭記述之最詳晉穆帝永和九年三月三日四十一人同遊於山陰蘭亭逸少製序酒酣興樂而書用鼠鬚筆蠶繭紙遒媚勁徤絶代更無凡二十八行三百二十四字字有重者皆搆别體就中之字最多乃有二十許箇變轉悉異其時似有神助醒後他日更書數十百本皆不如右軍亦自惜之留付子孫傳至七代孫智永永是右軍第五子徽之之後故獨傳家法為隋唐間諸家所師其書付弟子辨才太宗聞之令蕭翼計取入大内太宗崩遺命入昭陵真迹遂亡太宗初得真迹命供奉搨書人趙模韓道政馮承素諸葛貞等四人各搨數本以賜太子以下諸王近臣人閒稀少今趙模等所搨在者一本尚直數萬錢也宋董逌廣川書跋云蘭亭序貞觀中舊有二本其一入昭陵其一當神龍中太平公主借搨摹遂亡其後温韜發諸陵蘭亭復出仁宗時闗中得蘭亭墨書字畫不逮逸少他書其後秘閣用此刻石為法帖今諸處蘭亭本至有十數惟定州舊石為勝此書雖唐人臨搨然亦自有佳處簡縁云按真迹止有辨才本又有神龍本不知何據又云成都蘭亭寳月刻東坡贊蓋子由得於中山舊石故所摹獨傳於蜀中州人或未知也貞觀中詔湯普徹搨蘭亭賜梁公等八人而普徹亦竊搨出外以傳其書普徹自能書識逸少意故雖摹搨自到極處逮褚河南歐陽詢所臨則自出家法不復隨㸃畫也蘭亭真本世不復見普徹典刑猶有存者今所傳皆本於此中山其一也簡縁云按褚公歐公各有臨本褚則佻逸之極歐尚不失逸少面目定武本疑是歐臨以其似歐筆法也董逌一概抹倒恐亦未為篤論歐陽公集古録云蘭亭真迹相傳云已入昭陵𤣥宫太宗貞觀初嘗令搨書人湯普徹等搨賜房𤣥齡等八人普徹竊搨以出故外得傳之世所傳本蓋唐數家所臨也唐末之亂昭陵為温韜所發所藏書畫皆剔取其裝軸而棄之於是魏晉以來諸賢墨迹復流播人間至宋太宗時購摹所得集為十卷俾摹傳之謂之淳化閣帖用數以分賜近臣獨蘭亭真本不存故不得列於法帖今予所有其一流俗所傳不記其所其二得於殿中丞王廣淵家其三得於故相王沂公家又有别本在定州民家各自有石校其本纎毫不異其四得於蔡君謨家世所傳本不出乎此簡縁云按董逌書跋云宋仁宗時蘭亭復得於闗中用此刻石蓋真迹已亡此所得而上石者必唐人摹臨也至云魏晉真迹俱從温韜所發而出則所殉葬者何多也未可信矣南部新書云蘭亭序武德四年歐陽詢就越詐求之始入秦王府麻道嵩奉教搨兩本一送辨才一王自收貞觀二十三年褚遂良請入昭陵書法離鈎云世以定武本為第一金陵清涼本為第二定武本薛珦别刻石易去宣和間於薛珦家入禁中建炎南渡不知所存清涼本洪武初因寺入官其石留天戒寺僧金西白盜去後事發其僧繫獄死石遂不知其處藝苑巵言云定武本有肥者有瘦者有五字損本五字不損本當時諸供奉搨此帖獨信本逼真刻石留之禁中他本在外爭相摹搨而歐本獨不出耶律德光入汴得而棄之殺虎林流轉李學究家以至復入公庫所謂未損本也定武薛紹彭摹之他石潛易古刻於湍流左右五字微劖一二筆藏於家大觀中上知之取進御龕之宣和殿壁師陷諸珍寳悉逐虜北而此石獨留宗汝霖得之以進光堯至維揚而復失之所謂損本也簡縁云按大内所藏皆絹素墨迹此云刻石禁中未知何所據也元黄元鎮秋聲集定武蘭亭跋云右軍真迹已入昭陵其次即定武石刻也初石晉末契丹輦載中原北至真定德光死棄此石於中山為季生所得慶厯中韓忠獻公帥中山堅欲索觀李藏其石别刻以示公李死其子出之宋景文公守定州以公帑金購入官庫熈寧間薛守師正子紹彭又刻别本易而歸長安大觀中詔取置宣和殿靖康之亂不知存亡此聞之於康伯可者米元章云見蘇耆家蘭亭三本一本是蘇易簡題第二是易簡子耆跋筆法最精題為褚遂良摹第三唐粉蠟本是其族人沂摹尚有一絹本在蔣長洹處一紙本在其子之文處一本在滕中處後歸米氏一本在之友處又王文惠公孫居高郵收得褚遂良黄絹上臨本紛紛不一各言其真大抵臨本也又云泗州杜氏收刻板蘭亭待制杜公所得即宣文閣摹本有鋒勢筆活余得之以其本刻板視定本及世妄刻本甚不同也此書不亡於後世者賴存此本遇好事者即與一本不可再得世謂之三米蘭亭王鞏謂余家印本是湯普徹所摹與贈王詵家摹本一同錢塘闗景仁收唐石本佳於定武尚不及吾家板本也趙子昻云當宋未渡南時士大夫人人有之石刻既亡江左好事者往往家刻一石無慮數十百本而真贋始難别矣王順伯尤延之諸公能精識之於墨色紙色分毫不爽晦翁跋蘭亭謂不獨議禮如聚訟蓋笑之也又云學書在玩味古人法帖悉知其用筆之意乃為有益右軍書蘭亭是已退筆勢因其勢而用之無不如志茲其所以神也董宗伯云姜山人遊豫章得蘭亭石蓋農夫鋤田數見夜有光以為異發而獲之已缺兩行真定武宋搨也文休承云唐摹蘭亭余見凡三本一在宜興吳氏一在吳中陳緝熈家已刻石傳世一即神龍本也嘉靖初豐考功存禮嘗摹刻於烏鎮王氏今真迹已歸項子京家簡縁云蘭亭不獨真迹久亡即唐人摹本不可得不惟摹本即定武石搨亦不可得蓋石搨自宋至今已不可勝計惟定武為可學唐人所臨大抵佻險而飛逸者必褚河南嚴整而圓備者惟歐陽蘭臺定武所刻純是歐法故後學可師褚公則非老學不易窺也今石既亡則從定武翻者亦足重矣其餘翻本紛紛切勿輕信右軍樂毅論河南書目云四十三行付官奴右軍筆論語子敬云吾書樂毅論一篇貽子藏之勿播於外樂毅之法王氏累世學此得成自外皆達勿以難學而自惰焉此論日有丹陽僧求吾吾不與也智永題右軍樂毅論後云樂毅論者正書第一梁世摹出天下珍之自蕭阮之流莫不臨學陳天嘉中人得以獻文帝帝賜始興王王作牧境中即以見示吾昔聞其妙今覩其珍閲玩良久匪朝伊夕始興薨後仍屬廢帝廢帝既殁又屬餘杭公主公主以帝王所重恒加寳愛陳世諸王皆求不與及天下一統四海同文處處追尋累載方得此書留意運工特盡其妙其閒書誤兩字不欲㸃除遂雌黄治定然後用筆陶隠居云大雅吟樂毅論太師箴等筆力鮮媚紙墨精新斯言得之矣梁武帝答陶𢎞景云逸少無甚極細書樂毅論乃微粗徤恐非真蹟𢎞景亦云疑是摸本𢎞景又云樂毅書極勁利而不甚用意故頗有壞字簡縁云按此則武帝貞白所論是摸本耳非直謂非右軍書也負暄野録無錫徐氏家藏樂毅論碑石止存五塊可見者一百八十九字皆用木匣鐵束甚寳愛之徐氏之上世名縝字君徽者劉公敞原父之妹婿常與原父評論金石刻始末跋此碑尤詳云樂毅論有二本其一元豐初吳人得其石於太湖水中石缺過半背面皆有刻面十三背亦如之後題永和四年十二月二十四日書賜官奴其上書异僧權即梁朱异徐僧權也其一即周越書苑所載高紳學士得其石於秣陵井中者是也凡二十九行石缺一角後兩行只有最下一字至海字止紳之子安世卒於吳其家以石質錢於州民錢氏家當官每令摹拓錢氏厭之紿為失火焚燬矣熈寧中吳大饑疫趙子立者以金質得之又云舊傳樂毅論乃右軍親書於石其後石入昭陵朱梁時温韜發陵得之復傳人閒即高氏本也是褚遂良記貞觀中内出樂毅論真迹令直𢎞文館馮承素摹寫賜長孫無忌等筆勢精妙備盡楷則子立所得高氏本字亦竒絶非右軍親書於石亦摸真迹而刻之者子立名竦泉南人曾將漕兩浙入為都水使者無子有二女長嫁徐康直字平甫即君徽之子也子立死以石授平甫徐氏再世寳之尤延之衺王順伯厚之皆有題跋延之謂常親見歐陽公所藏集古録高氏本梅聖俞於碑後白紙缺處題甚妙二字與此卷前一本同順伯謂考之集古録高紳子弟以石質錢於富人其家失火遂焚其石今無復存矣趙德甫云集古録謂石焚非也元祐閒余侍親官舍徐州時故郎官趙竦被㫖開吕梁堰挈此石隨行竦殁石遂不知所在蓋歐陽為錢氏所紿而趙德甫則不知石後歸徐氏也又碑有朱徐二人押縫者乃梁朝摸刻之本又上有小字云太和六年中勒畢太和唐文宗年號是經唐時再摹刻也字體比徐氏稍肥然極有典型此石出太湖時為章氏所得刋二印為末文云申國秘藏及章淵文房印章淵字伯淵乾道閒嘗江山宰寓居於吳余及識之亦疎爽好事者今不知此石尚存其家否禇遂良搨本樂毅記云貞觀十二年四月九日奉敕内出樂毅論是右軍真迹令直𢎞文館馮承素臨寫賜司空長孫無忌房𤣥齡高士廉侯君集魏徴楊師道六人於是在外乃有六本筆勢精妙備盡楷則至中宗神龍之際不惜内府珍藏中書令宗楚客奏事承恩乃乞二王真迹敕賜大小二十卷楚客裝作二十扇屏風以褚遂良閒居枯樹賦為脚大會賔客示之時薛稷盧藏用等在坐廢食歎美太平公主婿武延秀亦在坐歸以告公主公主明謁見頗有怨言帝令開庫悉與之公主取五帙五十卷主特愛樂毅論以織成錦袋盛置作箱當籍没時咸陽老嫗竊舉袖中縣吏尋覺遽而奔趁嫗乃驚懼投之爨下香聞數里千載名筆不復可得又云武后時武平一時育於宫中見出六十餘函於億嵗殿曝之楷書每函可十餘卷所記憶者是樂毅吿誓黄庭後為太平公主取出其敗也薛崇𦙍懷樂毅等七軸托某駙馬貽岐王以求免戾據此則又與咸陽老嫗之説異矣董逌云李庠舊得樂毅論其本乃高紳學士家所藏石過自矜持謂真逸少書沈存中亦謂前人説逸少書多是縑紙惟樂毅論書於石不知何据太宗於右軍書特留賞蘭亭樂毅尤寳重太平之禍其迹已亡開元録但有黄庭畫贊告誓而無蘭亭樂毅其亡信矣此論乃右軍手書以貽子敬者始入於梁武後歸陳陳文帝以賜始興王貞觀中進御十三年命褚遂良排署至中宗朝而罹爨下之禍沈存中謂右軍手書刻石唐太宗將以殉葬非也宋有二石刻其一為秘閣所刻其一為高紳學士家所藏蓋以摹本夀諸石者也宣和書譜云樂毅論有褚河南臨本集古録云樂毅論石在高紳學士家紳死家人初不知惜好事者往往就閲或摸傳其本其家遂秘藏之漸為難得後其子弟以其石質錢於富人而富家失火遂焚其石今無有本矣蓋可惜也董逌又云樂毅論世無全文髙紳所藏石至海字止以史挍之四纔得其一耳今世所傳又其摹者蓋無取也又云昔時於秦玢兵部家得别本樂毅論文字完整筆力差劣然挍今秘閣石本亦可上下相敵或疑王著之所書也潘無聲云黄庭經樂毅論俱有完本不完本為米顛諸公駁論幾成魚目至有以為吳通微及王著筆者此中尚可容虞世南褚遂良數人不知通微輩能辦之否簡縁云樂毅論原本已亡於咸陽之慘秘閣石搨未知所在髙紳學士家所藏不全石刻又亡於火今所傳石刻完本意是秘閣石搨本翻出未可知也右軍黄庭經河南書目云六十行道士永和十二年與山陰梁虞􅛱論書表云羲之好鵞山陰曇釀村有一道士養好鵞十餘王清旦乘小船故往意大願樂乃吿求市易道士不與百方譬説不能得道士乃言性好道久欲寫河上公老子縑素早辦而無人能書府君若能自屈寫道德經各兩章便合羣以奉羲之便住半日為寫畢籠鵞而歸簡縁云據此則河南書目誤矣唐徐浩古蹟記云𤣥宗開元五年十一月五日收綴大小二王真蹟得一百五十八卷大王正書三卷内黄庭經第一畫贊第二告誓第三臣以為畫贊是偽跡不近真又云潼闗失守内庫法書皆散失初收城後浩充使捜訪圖書收獲二王書二百餘卷訪黄庭真蹟或云張通儒將向幽州莫知去處董逌書跋云夫求馬者必自其羣至授以騏驥之任則真馬出矣唐得漢魏晉隋書多至七百卷而以黄庭為第一在衆書時豈無所異而可一概哉顧世未嘗衡挍而彈繩之則論有同異不足怪也至稽之法度而脗合案之體裁而結宻索之神明而不竭者於是知世有驊騮矣此是當時唐人摸搨本而入石者時見筆意與常見二本及今秘閣所存異甚知唐初選置能盡書矣又云黄庭非右軍書以傳考之知嘗書道德經不言寫黄庭也然羲之自寫黄庭授子敬不為道士書此陶貞白云逸少有名之蹟不過數首黄庭為第一天寳末張通儒盜去莫知所在乃知原書不傳矣今所見者特後世重搨疊摸不得其真多矣蜀本黄庭筆墨粗不足貴簡縁云黄庭為逸少正書第一真迹已亡於張通儒後世所傳真迹意是唐人摸搨本其刻於石者在宋已有二三本多從唐摸本上石今之翻本甚多收藏家得宋石刻已是絶頂矣東觀餘論跋黄庭經後云黄庭經世有數本或響搨或刋刻皆正書蓋六朝及唐人轉相摹倣所以不同此卷臨學殊工字勢原倣歐陽率更固自合作但世傳黄庭為逸少書則非也按真誥晉哀帝興寧二年南嶽魏夫人始降黄庭於世逸少以穆帝升平五年卒安得逸少預書之又虞􅛱論書表云為山陰道士寫道德經晉書本傳亦云為寫道德經當以羣鵞相送以二書考之初未嘗言寫黄庭也然陶隠居與梁武帝啟云逸少有名之迹不過黄庭勸進吿誓數首不審猶有存否蓋此啟在真誥前故未之考耳唐張懷瓘書估云樂毅黄庭但得全文幾篇即為國寳世遂誤以為逸少書李太白承之有寫黄庭換白鵞之詩今此帖始見於梁代蓋晉興寧以後或宋齊人書也僕頃在洛中見承直郎李鵬舉家蓄此帖是唐褚令摹單廓未填筆勢精善乃錢思公家本號玉軸黄庭中有五行為周越摹換今歸御府矣簡縁云按真誥一書從扶鸞來未可盡信其中可駁處甚多不獨黄庭一案也蓋右軍另寫道德經但今無其書余見一新翻本似是宋元人書并非唐摹也又云黄庭多刓缺不全獨慶厯中摸者字畫具存氣象猶在不可以其近而忽之米氏書史云黄素黄庭一卷是六朝人書並無唐人氣格縫有書印字是曾入鍾紹京家黄素縝宻上下是烏絲織成欄其用硃墨界行卷末跋台仙二字有陳氏圖書及錢氏忠孝之家印陶穀跋云山陰道士劉君以羣鵞獻右軍乞書黄庭經此是也此書乃明州刺史李振景福中罷官過浚郊遺光禄朱卿卿名友文即梁祖之子後封博王王薨余獲於舊邸時貞明庚辰秋也晉都梁苑因重背之中書令陶穀記是日降制以京兆尹安彦威兼副都統余跋云書印字唐越國公鍾紹京印也晉史載為寫道德經當舉羣鵞相送因李太白送賀監云山陰道士如相送應寫黄庭換白鵞世人遂以黄庭為換鵞經甚可笑也簡縁云此是太白誤用耳非後人因此而誤也當時褚河南已云黄庭換鵞矣又云世傳黄庭多惡札皆是偽作唐人以畫讚猶為非真則黄庭内多鍾法者猶是好事者為之耳簡縁云米老云偽本是惡札非謂右軍所書是惡札也右軍東方朔畫讚河南書目云三十行廣川書跋云王濛子脩或作循嘗求書於右軍右軍為寫東方朔畫贊與之及脩亡其母見子平生所愛内置棺中則此書早已不傳矣今所傳者考其筆墨蹊逕多不類蓋後人為之托逸少以傳也簡縁云南齊王僧䖍論書則云納置棺中者鍾繇宣示也僧䖍在前疑董逌或誤廣州書跋又云唐自貞觀購書逮開元捜訪亦既盡矣校定大王書二卷黄庭第一畫讚第二告誓第三韋挺以畫讚是偽迹夫畫讚已亡而更出者可知其為偽也今世所傳疑不在韋挺論中彼得存於貞觀而入録當亦有可亂真處今之傳者不能便入貞觀録也徐浩以為畫讚是偽迹不近真簡縁云東方朔畫讚從來謂是右軍神品韋徐諸公以為偽亦言其臨摸者爾米元章書史云右軍東方朔畫讚糜破處歐陽詢補之在丁諷學士家歸宗室令畤劉涇以僧繇畫梁武像易去潘無聲離鉤云東方朔畫讚筆圓靜而勁肥瘦得中但字身差長耳蓋崔子玉字形如此前輩或隨時用一人筆法也簡縁云無聲此説必有所本佛遺教經集古録云相傳是羲之書偽也蓋唐時寫經手所書爾唐時佛書今存者大抵類此黄山谷云此書在楷法中小不及樂毅論不知樂毅論已遭火而别本為薛崇徹所藏亡於五溪其搨本皆摸畫善者則亦與寫經手何異但此書疎肥令宻宻瘦令疎自得古人意其為名輩所推良有以也離鉤云此書小不及樂毅論耳清勁方重蓋度越蕭子雲數等先鈍吟亦云非右軍不能東坡亦不以歐陽永叔言為然右軍告誓文河南書目云十四行董逌云告誓文今入晉書傳中昔逸少為王懷祖檄也當時以不能堪摘細事遂脱幘自投朝庭以其誓苦故不強起以官開元中此書得於潤州瓦官寺講堂鴟尾其書一字為數體一體别成㸃畫不可一概求之如字有横顯異法行法變草未嘗復出實天下竒作也李延業獻之岐王十二年復出岐王宅被焚則宜世不傳矣今碑字刻畫過於嚴重似是唐寫經手搨摹以傳陶𢎞景論書謂逸少自吳興前書猶未為稱凡厥存迹皆是永和十許年中自失郡告靈不仕後畧不復自書然告誓文已出當時知鴟尾得者别本也貞觀書目已列告誓文武平一在武后宫中嘗見於小函同樂毅論黄庭經共藏便知此本不一傳摹相承不能辨其真贗也唐韋述敘書録云開元五年敕陸元悌檢挍御府珍藏告誓猶存唐徐浩古迹記云開元時御史史惟則奉使晉州博訪書畫時趙城倉督隠没公貨極多推案承伏云有好書贖罪惟則索看遂出扇書告誓等四卷并二王真迹四卷問其得處云禄山下將過太原停於督家三月餘秪供稱意留此為贈惟則將至闕下大有爵賞智永臨右軍五紙告誓第一今所見者多永師蹟也右軍十七帖法書要録云十七帖長丈有二尺貞觀中館本也凡百有七行九百四十三字逸少草書中烜赫著名帖也文皇帝購二王書大王書有三千紙率以一丈二尺為卷取其迹以類相從綴成卷以貞觀兩字印印之褚河南監裝背率多紫檀軸首白檀身紫羅褾織成帶明皇開元五年又以開元兩字印印之跋尾列當時大臣名此帖號十七者以卷首有十七字故以名宋黄長睿東觀餘論跋云逸少十七帖乃先唐所刻石本今世閒有二刻本其一刻於汴梁卷尾有大敕字褚遂良解無畏挍人家或得之此最佳蓋唐本也其一即此卷無敇字洛陽李邯鄲家所蓄舊本與此相類其餘世傳别本為賀知章所臨南唐李後主煜得之勒石置澄心堂者本朝侍書王著又别刻石勢殊疎拙而瘦又有一板本亦似南唐刻者第敘次顛舛文為十七帖而誤目為十八帖字亦瘦弱失真獨敕字本及此本乃先唐所刻右軍筆法具存世殊艱得政和三年五月初吉黄伯思書又云畢文將叔家有唐初人所摸此帖來禽等四物外又有宻蒙花一種然余按今諸本並無此一種而張彦逺十七帖亦不載此不知縁何畢氏本有之簡縁云近代又有翻刻多無足取在淳化絳帖東庫本大觀太清樓戲魚堂星鳯樓諸類帖中者為近之曹娥碑此即蔡邕聞之來觀夜闇手摸其文而讀之題文云黄絹幼婦外孫韲臼又云三百年後碑當墮江中當墮不墮逢王匡昇平二年八月十五日記之是也但不著所書人名嵗月昔人碑目往往疑為六朝人書蔡邕所見應是八分古碑此小楷字體竒而古筆勁如鐵非右軍必不能但舊搨難得離鉤云曹娥小楷憔悴宛篤若花蕊漂流幼女捐軀於波閒又云其流利豐妍肉不欺骨自是可人元明之閒袁仲長陸季道諸公最重此帖當不誣也洛神賦古人書目多云逸少洛神賦今不傳所傳者子敬書也東觀餘論跋草書洛神賦後云世傳王大令書然結體殊不類獻之而頗似智永疑其遺迹也至洛神小楷則子敬書無疑矣世以小王好書此賦故凡有洛神書本皆歸之子敬亦猶東漢諸碑流俗多以為蔡邕豈盡中郎筆迹哉要當鑒以心目而弗信耳傳為佳董逌云逸少此賦當以為第一今無復存者但子敬所書猶傳疑未可以伯仲閒論也謝安石嘗疑子敬不逮父書世或謂不復可辨子敬曰外人那得知豈書法雖一藝亦自有至處恐非造其域者不能致論也此書摹傳失据更無神明㸃畫存耳非子敬書法盡此又跋洛神賦别本云今世所傳洛神賦余見已四本矣雖王和甫家者最勝結字疎宻得法然不若此書亦自與周子發家者稍異子發謂子敬愛書洛神賦人閒宜有數本似未見其餘也昔馬澄評右軍書謂勸進洛神諸書十餘種皆作今體知逸少嘗書此賦子敬當是習其家學爾然書録不記子敬洛神賦其傳之失實將後人摹搨未可知也字法端勁是書家所難偏傍自見不相映帶分有主客趨鄉整嚴非善書者不能也大觀元年為安希古書簡縁云唐太宗不喜子敬書故子敬真迹不收離鉤云昔人謂洛神賦象凌波神趙松雪所得之陳集賢者十三行僅二百五十字繫晉麻紙字畫神逸墨彩飛動為天下法書冠又宣和書譜所載末有栁公權跋語者其行字筆亦皆同而小乏韻且是唐硬黄紙所書定為臨本無疑簡縁云逸少真迹亡之久矣子敬真迹秪存十三行末有栁公權跋語近今翻本皆從此也今又有小楷全本末知又從何來集右軍聖教序書苑云唐文皇製聖教序時都城諸釋諉𢎞福寺沙門懷仁集右軍行書勒石累年方就逸少劇迹咸萃其中今觀碑中字與右軍遺帖所有者纎微克肖書苑之説信然近世翰林侍書輩多學此碑學弗克至了無高韻因號其書為院體由唐吳通微昆弟已有此目故今士大夫玩之者少然學之弗至者自俗耳碑中字未嘗俗也非深於書者不足以語此政和四年黄長睿記離鉤云聖教序墨迹久藏項子京家近歸武陵楊修齡侍御備極八法之妙簡縁云按當時集成勒石安有真迹恐後人從石本摹臨者也智永千字文梁武帝得右軍遺書令殷鐵石搨一千字每字一紙雜碎無序命散騎侍郎周興嗣次為韻語當其成時一夕鬚鬢盡白謂心力極於此矣當時甚重之詔令蕭子雲寫進而後世以書名者率作千字以謂體制盡備可以見其筆力然非書得成法者亦不能盡工也智永為羲之七代孫妙傳家法為隋唐學書者宗匠住吳興永欣寺登樓不下四十餘年積年臨書千字文得八百本江東諸寺各施一本所退筆頭置之大竹麓受一石餘而五麓皆滿取而瘞之號退筆塚求書者如市所居戸限為之穿穴乃用鐵葉裹之謂之鐵門限長安崔氏所藏千文真迹最佳大觀己丑樂安薛嗣昌命工刋石置之漕司南㕔歐陽永叔疑薛氏所刻有殘缺處為後人所補字多不類永師剔去二百餘字猶以為未盡或以為王著所補恐皆未確海嶽名言云智永臨集千文秀潤圓勁八面俱備有真迹自顛沛字起在唐林夫處他人所收不及也元昭武黄鎮成字元鎮所著秋聲集云嘗見武夷清碧杜公所藏智永真迹千文竊歎其歴世既久而縑素猶新蓋吳中陸氏之所褾軸者其補綴缺腐畧無瑕迹徐以日映之然後稍見唐張彦逺所謂宻其隟縫端其經緯厚薄均調潤潔平穏者陸其庶幾矣簡縁云智永搨千文見於時者雖多然真偽雜出藏者已病其難辨觀右軍書記永和世謂默符聖典有鄉背之宜而智永取名謂潛印𤣥蹤盡其家法故側勒努趯䇿掠啄磔雖盡其法度而縱擒緩急自出法度外若泰豆氏之御進復履繩旋曲中矩取道致逺筆力有餘此豈可求於書儈畫販而得其真偽邪禇河南聖教序宣和書譜云禇公喜作正書其磨崖碑在西洛龍門孟法師碑在長安國子監聖教序在長安慈恩塔中皆世所著聞者廣川書跋云河南初學右軍既又學虞伯施後於史稜得用筆法乃曰此法更不可教人是得其妙處也羿之立教必至於彀至巧之所極當自其心得非可法度準繩授也學至於此當自知之簡縁云石刻有二一刻於同州倅㕔龍朔三年兩篇合一碑筆畫稍粗硬一刻於雁塔永徽四年兩篇各一碑筆畫細媚而圓潤歐陽詢九成官醴泉銘簡縁云今世惟醴泉銘多舊本當是宋人好臨倣其書而石堅緻耐拓耳然今已壊極矣宋璟碑在荆州沙河縣歐陽永叔謂魯公書宋文貞碑瘦徤清拔似瘞鶴銘法碧落碑在絳州龍興宫咸亨元年陳惟玉書李漢以為黄公譔書莫知孰是宫中有碧落天尊像文刻其背故世傳為碧落碑篆書竒古李陽冰過絳州寢碑下數日不忍去州將不欲以槌擊石像背乃摹别石因封其舊石像今所傳皆摹本也顔魯公麻姑仙壇記小字本大厯十年刻大字本大厯六年刻集古録云或疑非魯公書蓋魯公未嘗有小字書惟干禄字書夾注最為小其體法與此不同所以疑之細玩筆畫巨細皆有法非魯公不能也簡縁云今石搨翻本甚多而糢糊者猶是宋刻蘇靈芝奏議宣和書譜云蘇靈芝有二王法而成就頓放當與徐浩同戈脚復類虞永興在唐人翰墨中固不易得索靖月儀帖晉人評書以索靖比逸少而歐陽詢至卧碑下則筆墨妙絶可知月儀十二章入續法帖中李嗣真謂靖有月儀三章今不止三章董逌疑是唐人臨寫故書剞劂逕出法度外簡縁云索靖有出師頌書法推為章草神品翻刻亦多真迹在項子京家又有無名氏月儀顔魯公中興頌在永州正書大字簡縁云中興頌刻永州浯溪上斲其崖石刺史元結撰文顔魯公書磊落驚人謂之磨崕碑蔡君謨畫錦堂記簡縁云忠惠公書此記每作一字擇其不失法度者裁截布列連成碑形當時謂之百衲碑先鈍吟書錢宗伯西河毛氏誌銘亦自謂百衲本王右軍半截碑簡縁云集右軍行書丹鉛續録云饒州薦福寺碑為雷所擊而碎近日好古者取其碎裂合而卧樹之猶可摹印褚河南西昇經簡縁云或曰唐經生書先鈍吟見之歎服下拜至數十云非登善不能也唐懷素自敘帖簡縁云真蹟為南唐李氏物吳匏庵云今為徐宫傅謙齋所藏空青老人題云自敘帖世傳有三一在蜀中石陽休家黄魯直以魚牋臨數本者是也一在馮當世家後歸上方一在蘇子美家流傳吳中余見刻本有二其一有文夀承書釋文今真跡聞在近李北海雲麾將軍李思訓碑簡縁云在蒲城縣斷裂久矣正德中御史劉逺夫謫為蒲城尉訪而出之錮以鐵復為完物下半糢糊拓者多不全搨余所藏者每行多數十字干禄字書簡縁云魯公著自書大厯九年刻石至開成中已殘缺楊漢公重摹刻今所傳者楊摹本也真本以不完遂不傳顔魯公多寳佛塔宣和書譜云其書㸃如墜石畫如夏雲鉤如屈鐵戈如發弩千變萬化各具一體若中興頌之閎偉家廟碑之嚴重仙壇之秀穎元魯山銘之深厚衆美並萃早年所書已與歐虞徐沈暮年之筆相上下及中興以後筆力迥與前異亦其所得者愈老也簡縁云米元章毁之謂厚皮饅頭甚可笑顔魯公爭座位書藁米老云魯公與郭知運書有籕氣真傑思也簡縁云宋人行書多從此學故翻本最多若近代所刻益不足挍褚遂良三龕碑簡縁云貞觀十三年岑文本撰文遂良書大正書字近分書此碑久沈於水近代始出索者甚衆居民不堪復推於水今不知所在矣余得一本為宿遷徐孝廉取去褚河南枯樹賦簡縁云真行書近有好事者與松雪翁臨本並勒石風流秀韻二書均美虞永興廟堂碑集古録云予為兒童時嘗學此碑刻畫完好二十年後復得一本則殘破甚矣簡縁云此書極似右軍面目與化度寺九成宫為書家所必須也按此則斯碑在北宋時已損壞矣李北海葉有道碑集古録云蔡君謨為余言北海所書此為最佳簡縁云余又見一木搨者又云餘多可辨不及備録書法正傳卷九
