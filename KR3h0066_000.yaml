front:
  text: 欽定四庫全書子部八
  hash: sha256:ed7b890dbd4c5a48db16c46d7fbf2f236332a20a938d6348e5c3606dd689b6ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0066_WYG_000-1a, image: WYG0826/WYG0826-0321a.png}
body:
  text: 書法正傳摠目藝術類一書畫之屬卷一翰林要訣卷二書法三昧卷三永字八法卷四大字結構八十四法卷五纂言上卷六纂言中卷七纂言下卷八書家小傳卷九名蹟源流卷十鈍吟書要臣等謹案書法正傳十卷國朝馮武撰武號簡縁常熟人馮班之従子也班以書法名一時武受其學年八十一時館蘇州繆曰芑家為述此書專論正書之法首陳繹曽翰林要訣一卷次周伯琦所傳書法三昧一卷次李溥光永字八法一卷以三家論書獨得微指故也其語意有未顯者則武為補注以明之次明李淳所進大字結搆八十四法一卷次纂言三卷則歴代書家之微論次書家小傳名蹟源流各一卷而以班所著鈍吟書要一卷終焉毎卷之中武亦各為附論時有精語蓋武於書學頗有淵源耳乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀書法正傳自叙丁亥春馬齒八十一矣吳門繆孝㢘文子不以老耄舍我而延我於樹滋堂窻明几淨筆精墨良晨夕共向芸編蠧卷揚㩁千古事户無雜賔烹苦茗爇名香不知世閒有所謂歌舞聲色博簺圍碁狗馬玩好酬酢炎涼者一日茶罷文子告余曰叟之學吾固聞之矣然八十年中孰者為最優余曰余少而遭亂離破巢完卵久焚筆硯長而以家累久事村塾無少暇即有家學徒聞之而未有得也然於吟詩法書二事或稍有一知半解而書學為稍閑文子曰叟試悉數之余請更僕而聽之余曰書自蒼頡沮誦以來隨代而屢變古文變而為篆籕篆籕變而為八分小篆小篆變而為隸兼篆隸變而為今正書正書變而為行書章草章草變而為草書諸體之中惟正書為最切要焉蓋小篆者正書之源也行草者正書之變也夫書之為道象形為文相生為字冩於竹帛曰書古今人言之者衆矣而其途則有三日六書曰聲韻曰筆法講六書者則有許氏說文徐鉉解字徐鍇繫傳戴侗六書故鄭樵六書畧楊桓六書統周伯琦說文字源趙古則六書本義顔魯公千禄字書張有復古編等書講聲韻者則有廣韻禮部韻畧丁度集韻毛晃增韻韻㑹舉要等書而筆法則為書甚多求其明白簡易深切無隠者則未之有見也余自鼎革以來僻處鄉曲懶遊都市於當世收藏家皆未登龍池而探驪珠第就平日所留意者聚得六十餘種其餘所未見者良多也而况所見者又無多可取也曰叟盍即所取者合成一書且發明其所未發者以嘉惠後學乎余曰此意良所願也雖然以寡聞淺見之耳目而剖明千古不傳之秘奥書成其不為遼東豕貂裘續者幾希矣文子曰大道以多岐亡羊此事非小道也為天地之文明為古今之眼目說者愈多而亡益甚叟其忍使不絶如綫者而竟付之無何有之鄉乎與其不輕傳而竟絶其緒孰若公諸天下後世而俟一後起者得馳騁乎康莊之衢也余曰噫風燭之年途逺而日暮矣即吾所知者而當世已艱遇夫知之者且吾所知為不然者而往往居之不疑焉嗟乎絶固吾不忍也不大聲以呼而使紛紜於既絶之後尤吾所不忍矣於是徇文子之命冒顔而成是編以冀巖之阿水之裔或有謂此未死翁庶可語而教吾所不逮誠甚幸也誠甚幸也不然千百年後蠶箔瓿口之閒或有拾而惜之者鍾王或因是而煌然乎靖節云但恨多謬誤君當恕醉人請易醉為老何如虞山簡縁馮武述凡例一是書為正書而作也故大篆小八分草書皆畧焉而正書之法莫妙於陳繹曾翰林要訣無名氏書法三昧雪菴永字八法但其中有未顯語處使學者猜億之而未當余特為分編三卷細加補注使一見了然一昔人講說書法未始不諄切言之但或各據所見或多著浮詞使頷下驪珠混於魚目初學無從擇取究於下筆無少益助余特為提要鉤𤣥纂成三卷非𦂳要者一語不載所闗切者寧屢見焉一書法之書所引用者最苦於不肻全載余讀虞永興筆髓孫過庭書譜張懷瓘玉堂禁經李陽冰翰林宻論諸書皆字字珠玉資助後學不淺也故全録不遺一古今書家不知凡幾不能全載特取尤當熟悉者以便尋究一晉唐名迹所存無幾後代翻刻不可勝計擬核其真贋溯其存亡畧就聞見另為名蹟源流一卷所以便稽攷也一余之所見得之先伯鈍吟公者居多先伯所教專以用筆結構二法今散見於他說者言言中的字字探微録成一編另為一卷俾學者知所入云一古今書評皆所當留意如庾肩吾李嗣真書品張懷瓘書斷梁武袁昻書評朱長文續書斷皆不可不閱書多難載擬另刻數種並行之一著書之難難於眼目不廣余腹笥寥寥家藏散佚雖有臆解苦無證佐幸文子藏書甚富交遊假借不惜筆舌商酌去取惟我二人焉簡縁子再識一是書編次成帙係先簡縁手定中閒標目處用記認摘出以醒目也句讀㸃斷便披覽也至宻圈尖圈宻㸃處為書之喫𦂳闗目所宜留意此先簡縁㸃定時所斟酌指迷開示後學者今皆仍之其大小圖目尤係法程所在悉取先簡縁手書者付梓姪孫鼎謹識
