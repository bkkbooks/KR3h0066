body:
  text: 書法正傳卷一常熟馮武撰翰林要訣第一執筆法指法擫抵壓拒鈎導掲送腕法枕腕懸腕提腕手法變法撮管捻管􅝷管握管第二血法蹲駐提捺過搶衂第三骨法提縱第四筋法字法藏度指法第五肉法字法滿捺飛提附用筆分數通論紙墨硯第六平法偃仰平勒第七直法垂露懸針鄉背努􅝫第八圓法㸃側頭曾散水其脚聨飛挫烈火打撆啄撆背掠撆鄉捺波連拔磔䇿趯打勾背抛趯下抛挑戈提大背勾勾裏雙包勾努雙裹方平方飛方第九方法八面九宫結構均方第十分布法布方映帶變換體樣字閒行白篇段第十一變法法情氣形勢第十二法書真行草諸帖至正二年冬余聞汪延年得書法于金谿陸氏遂從戴尚文處傳鈔之惜其凡例尚淆㸃畫多繆既改而正之矣乃作目録一篇以條理之其㸃畫則識之於各目云歙朱昇題第一執筆法衞夫人云真書去筆頭一寸二分或作二寸一分行草去筆頭二寸一分或作三寸二分撥鐙法李後主得之陸希聲希聲所傳於􅈯光者止五字後主更益二字曰導送謂之七字訣擫大指骨上節下端用力欲直如提千鈞擫烏叶反壓捺食指著中節旁此上二指主力捺手按鈎中指著指尖鈎筆令向下掲名指著指爪肉之際掲筆令向上抵名指掲筆中指抵住拒中指鈎筆名指拒定此上二指主運轉導小指引名指過右送小指送名指過左此上一指主來往右名撥鐙法撥者筆管著中指名指尖令圓活易轉動也鐙即馬鐙筆管直則虎口閒空圓如馬鐙也足踏馬鐙淺則易出入手執筆管淺即易撥動也右指法枕腕以左手枕右手腕而書之提腕肘著案而虚提手腕而書之鈍吟云此法好懸腕懸著空中而書之最有力枕腕以書小字提腕以書中字懸腕以書大字行草即須懸腕懸腕則筆勢無限否則拘而難運今代惟鮮于郎中善懸腕書問之輒瞑目伸臂曰膽膽膽右腕法唐太宗曰大凡學書指欲實掌欲虚管欲直心欲圓又曰腕竪則鋒正鋒正則四面勢全次實指指實則筋力均平次虚掌掌虚則運用便易簡縁云管直則心圓右手法撮管以撥鐙指法撮管頭大字草書宜用書壁尤宜􅝷管以大指小指倒垂執管􅝷三指攢之就地書大幅屏障捻管以大指與中三指捻管頭書之側立案左書長幅釣字捻乃叶反握管四指中指節握管沈著有力書誥敕榜疏右變法第二血法蹲七分三折管直心圓駐七分力到水聚提三分大指下節骨竦水下捺九分力滿過十分疾過搶各有分數圓蹲直搶偏蹲側搶出鋒空搶衂三分三摇筆殺力字生于墨墨生于水水者字之血也筆尖受水一㸃已枯矣水墨皆藏于副毫之内蹲之則水下駐之則水聚提之則水皆入紙矣捺以匀之搶以殺之補之衂以圓之過貴乎疾如飛鳥驚蛇力到自然不可少凝滯仍不得重改簡縁云此專對水墨說用筆之際自然有此七字在筆下非謂何筆為蹲何筆為駐也第三骨法提竦大指下節骨下端提尾駐飛縱和大指下節骨下臼蹲首駐捺衂過字有骨為字之骨者大指下節骨是也提之則字中骨健矣縱之則字中骨有轉軸而活絡矣提者大指下節骨下端小竦動也縱者骨下節轉軸中筋絡稍和緩也簡縁云此專對骨說提之則骨健縱之則骨活動非謂何筆為縱何筆為提也第四筋法藏首尾蹲搶度中閒空中飛度字之筋筆鋒是也斷處藏之連處度之藏者首尾蹲搶是也度者空中虚打勢飛度筆意也鈍吟云解藏度二字則無死筆活處在筋也又云一畫亦要藏度不專是斷處聨屬簡縁云一行亦有藏度一幅亦有藏度不悟此二字唐人所謂善書手而已矣右字法中指下貫上左貫右筆中柔名指上貫下右貫左筆中韌如吝反右指法第五肉法滿捺飛提字之肉筆毫是也疎處捺滿宻處提飛平處捺滿險處提飛捺滿即肥提飛則痩肥者毫端分數足也痩者毫端分數省也水太漬則肉散太燥則肉枯乾研墨濕㸃筆濕研墨乾㸃筆墨太濃則肉滯太淡則肉薄粗則多累積則不勻簡縁云今人誤以墨重輕為肉之肥痩又云此專對字之肉講非謂何筆為滿捺何筆為飛提也右字法筆字一寸蹲七釐提五釐捺九釐畫一分以是為率清勁逓減三釐初學提活蹲輕則肉圓老成提緊蹲重則肉䟐􅂒右軍云用筆著墨不過三分不得深浸深浸則毫弱無力鈍吟云如萬嵗枯藤䟐􅂒也徐季海筆在畫中力出字外用此也紙強弱有分數筆力臨時斟酌用之右軍云紙剛用軟筆紙柔用硬筆純剛如錐畫石純柔如印印泥既不圓暢神格亡矣書石同紙剛例蓋相得也墨磨墨之法重按輕推逺行近折不得用硯池水令墨滯筆沍以新汲水臨時用之凡書不得自磨墨硯池寛面細每夕一洗則水墨調匀血肉得所書學指南云夫論墨之佳曰輕堅黝黒入硯無聲又曰其堅如玉其文如犀又曰繢綵奮發論硯之佳曰秀潤玉質論筆曰長而不勁不如勿長勁而弗圓不如不勁論紙之佳曰不能澄心堂薛濤江亦必堅薄白滑純柔光澤者若粗厚鬆灰者不惟損筆亦能壞字凡此皆至理也善書者知之右用筆分數并論筆紙墨硯第六平法平者横畫也偃首搶下尾搶上蹲鋒自駐力到疾提力滿微捺力盡囘鋒仰首搶上尾搶下蹲鋒自駐力到微捺力滿疾提力盡囘鋒平首搶平尾搶平蹲鋒自駐力到疾過力盡囘鋒勒上平中仰下偃空中逺搶以殺其力如勒馬之用韁也凡尾提處觀其筆燥濕如何燥則駐蹲捺而實搶以補之其次蹲而不捺其次駐而不蹲其次提而不駐即實搶之濕則提起即空搶可也簡縁云已上三法俱是勒勢非謂另是一筆也翰墨良規云凡平畫忌如筭子終篇展玩不見横畫始是書法鈍吟云八字最妙第七直法直者竪畫也垂露首搶上尾搶下分四停各半之如露之欲垂而復縮懸針首搶上尾搶下空出分三停上二下一筆欲正自上而下如長針垂簡縁云將欲縮鋒引而伸之須要首尾相等但鋒尖耳不可如鼠尾又按古人祗有垂露一法懸針始於蘭亭年字後人遂以為法又按竪畫祗有垂露懸針兩筆其餘皆言其意意以立法教後人也鄉首搶左上右右上左尾搶左上左右上右偏蹲偏駐側搶側過分五停上二下二鄉筆貴和背首搶左上左右上右尾搶左上右右上左偏蹲偏駐側搶側過分五停上二下二背筆貴峻努首搶右築鋒尾搶上左衂訖趯出分七停上一下一藏趯亦可努須凸胷而出不可直直則無力太宗云為竪必努貴戰而雄簡縁云凡竪畫起手不用力雖極短亦不直故頭向右用筆稍駐而下行中自然凸出又云直畫從發筆用力則中閒微凸而出如申字中竪則努而懸針也事字中竪則努而隨趯出也鄉則努而鄉也背則努而背也非另有一筆􅝫首搶中心上出字分盡處空中落下畫分盡處蹲之尾搶上出空中力盡止垂露懸針鄉背努等筆皆有之肥􅇤以字分為稱長短隨偏傍所宜用簡縁云尚嘗等字中竪用之第八圓法側㸃之變無窮皆帶側勢蹲之首尾相顧自成三過筆有偃仰向背飛伏立等勢栁葉鼠矢蹲鴟栗子等形散水上側中偃下仰横二停從四停上内一中外二下自外四至内二聨飛四㸃相隨偃前以後横鈍吟云起偃横煞簡縁云此說起止兩筆烈火外相向而偃内相隨而仰簡縁云外者言外兩筆内者言内兩筆曾頭對向貴從上開下合其脚相背貴横上合下開挫因前筆衂出或上或下或左或右皆衂法也打提鋒空中打下乃㸃法之長者啄㸃首撆尾左出微仰如鳥喙之啄物掠㸃首撆尾右出微仰如箆之掠髪鈍吟云此乃斜懸針而末鋒飛起宜出鋒處送筆力到而匀不可半途撆出則無力而瘦弱背撆首圓蹲過作懸針法左出鄉撆首偏蹲右顧左轉作鄉竪尾懸針左出如手前後撆物波從波五停首一中三尾一横波五停首一中二尾二大體作仰畫不蹲以鋒傍裏空蹲三面力到順指欹下力滿微駐仰出三過筆中又有三過如水波之起伏也簡縁云波者磔也今謂之捺也或曰微直曰磔横過曰波磔偏蹲偏駐疾過緩出首尾自藏須先作上啄取勢如裂帛力在裂外勢盡不可便出須駐筆而後放唐太宗云磔者不徐不疾去欲復駐而去之也拔先作左撆飛筆側打鋒不蹲順勢欹下力滿微駐仰出三過筆如手拔物簡縁云人入等字小捺也逴上㸃如右足立定取力下屈如右股三折取勢下拔如右足之逴溝壑簡縁云之是也赤角反䇿重提輕蹲圓鋒左出勢盡仰收如鞭之策馬力在著物處又曰仰筆趯鋒輕擡而進簡縁云短畫也法應上仰用之其天夫馬之類是也打勾右打反趯抱腹趯下前筆末蹲鋒提趯抱身貴短如足趯物挑右背􅝫仰勒反趯趯貴抱腹而清簡縁云竪趯曰趯横趯曰挑背抛鄉􅝫仰勒反趯趯貴寛圓或仰背偃或作垂露平或作懸針平或作圓趯如背手抛物此名外畧法簡縁云乚是也大背抛仰勒衂左努挑或偃勒衂右背抛長短屈伸各隨字形此名蠆毒法簡縁云􅡧是也戈提空中斫下勢盡或仰趯抱身或收趯歸腹或反趯向左大體如向右竪而左右顧盻反趯之勢欲飛有斫戈有築戈有反戈有飛戈鍾繇折芒勢哉字虞智秃出勢歐陽蘭臺借勢勾裏偃勒鄉􅝫趯或仰勒背􅝫趯用于罔岡白田等字勾努勒努趯或偃鄉或仰背用于均匀勿旬等字雙包左先作鄉撆撆尾停筆取勢飛筆隨勢包撆勢􅝫打閒對撆首打背隨勒尾平撆尾簡縁云風鳯几凡等字是也雙裹法與雙包同但自撆首偏蹲取勢勢逺則勒短裹撆簡縁云包字是也平方上平旁向下偃或上仰旁背下平簡縁云國固圖等字是也飛方上飛平旁飛向下飛偃飛者空中飛筆𦂳提轉腕疾書也簡縁云已上二法八分並用第九方法八面八面俱滿者方竒飛簡縁云智永最近此法凡字各有八面即一字丨字皆有八面勢有在乎實者亦有在乎空者善書者下筆自有八面威風不善書者雖填滿四隅總多缺陷方法不可不知也九宫八面㸃畫皆拱中心簡縁云歐法最近又云中心者非以一筆為中心也結搆隨字㸃畫多少疎宻各有停分作九九八十一分界畫均布之先於鍾王虞顔法帖上以朱界畫印印訖視帖中字畫分數一一臨擬仍欲察其屈伸變換本意秋毫勿使差失四家字體既熟方可旁及諸家法帖字大以小印分數蹙之法帖字小以大印分數展之雖以黄庭樂毅展為方丈可也又以朱界畫印印紙或棐板漆之取許慎說文偏傍字樣一一依法區處務要簡易精熟外妍美而内遒徤各各自佳矣均方長者兩減闊短者兩減長小者四減字形雖有長短闊狹小大行中須留空地仍須寫空中勢須偏著右或亦各一分鈍吟云此分窠法不可不知簡縁云長如日月之類短如四皿之類小如口字之類第十分布法布方中展圓則疎者均方中蹙圓則宻者均方㸃畫孤單者展一畫大人卜之類是也重并者蹙之一傍􅀥轉嶽麓之類是也古者所無不得擅寫簡縁云平日工夫足臨時方能布置映帶凡偏傍不相稱者屈伸㸃畫以避之太繁者減除之太疎者補續之必古人有樣乃可用耳變換字之中㸃畫重并者隨宜屈伸以變換之㸃不變謂之布棊畫不變謂之布筭子若亦馬三冊之類是也字之中偏傍重并者隨宜開合而變換之閒合閒開之類若林晶炎焱之類是也體樣隨字辨體隨體識樣字形有孤單重並併累攢積之體須據說文為主而分布之一二為孤日月為單棗炎為重林並為并晶焱為累墅樣為攢爨鬱為積以此為例廣推求之字閒對者宜疎疎者宜宻行白對者宜等閒者宜平簡縁云識得疎宻等半自然行閒茂宻篇段平起伏六分之一平其三起最後二分伏平者圓穩而平畫多也起者振動而仰畫多也伏者收斂而多偃畫也第十一變法法情喜怒哀樂各有分數喜即氣和而字舒怒則氣粗而字險哀即氣鬱而字斂樂則氣平而字麗情有重輕則字之斂舒險麗亦有淺深變化無窮氣清和肅莊竒麗古淡窻明几淨氣自然清筆墨不滯氣自然和山水仙隱氣自然肅缺氣自然莊珍怪豪傑氣自然竒佳麗園池氣自然麗造化上古氣自然古幽貞閒適氣自然淡八種交相為用變化無窮矣形字形八面迭逓增換一面變形凡八變兩面變形凡十六三面以上變化不可勝數矣勢形不變而勢所趨背各有情態以一為主而七面之勢傾向之也簡縁云寫去自知第十二法書真鍾繇力命剋捷宣示季直王右軍樂毅論畫讚黄庭曹娥霜寒遺教臨鍾書道德經王子敬十三行洛神智永千字文臨羲之書虞永興破邪論歐陽蘭臺九成宫化度寺虞恭公姚辯皇甫君擣素心經虞永興廟堂碑褚遂良聖教序三龕碑枯樹賦陰符經張旭郎官石陶𢎞景瘞鶴銘徐浩不空三藏顔魯公麻姑壇放生池中興頌東方朔干禄字書家廟宋璟臧懷恪八闗齋多寳栁公權𤣥秘馮宿苻璘西平王普照陀羅尼裴休圭峯張從申季子廟四絶季子誌歐陽通道因吳通微楚金禪師行王右軍蘭亭聖教張從申𤣥靜碑髙氏鐵彌勒頌李北海雲麾嶽麓寺娑羅樹褚遂良哀冊虞世南汝南公主顔魯公爭座位祭姪文劉太沖序草右軍十七帖簡縁云有二本後有敕字者佳今翻刻甚多懷素自序聖母淳化閣帖諸帖之祖宋太宗淳化三年出内府真跡命王著用棗板摹刻十卷雖近肥俗深得古意不見真蹟得此足矣上有銀錠紋用澄心堂紙李廷珪墨拓打手模之而不汚親王大臣各賜一本人間罕有今世所傳俱從賜本轉相摹刻者絳帖淳化之子用淳化閣帖増入别帖重編廿卷潘師旦摹刻骨法清勁足正王著肉勝之失然駿馬露骨又未免羸􅇤之憾潭帖淳化之子寳月大師摹刻風韻和雅血肉停匀但形勢俱圓頗乏峭徤之氣慶歴間僧希白重摹者亦佳第三次者失真矣大觀帖淳化之弟大觀閒奉旨以御府真跡重刻於太清樓中有蘭亭帖蔡京摹刻京沈酣富貴筆偏手縱非復古意賴刻手精工猶勝他帖爾太清樓續閣帖劉燾摹刻工夫精緻亞于淳化肥而多骨求備于王著乃失之粗硬遂少風韻戲魚堂帖劉次莊摹於臨江除去淳化年月而增釋文在淳化翻刻中為有骨格者淡墨搨尤佳東庫本世傳潘氏子析居石刻分為二其後絳州公庫乃得上十卷絳守重刻下十卷足為一部名東庫本其家亦復重刻上十卷足為一部於是絳州有公私二本靖康之禍石並無存今重刻者去之逺矣鼎帖廿卷紹興閒武陵丞趙銍父子編中有黄庭經石硬而刻手不佳雖博而乏古意星鳯樓帖曹士冕摹刻工緻有餘清而不濃亞于太清樓續帖玉麟堂帖吳琚摹刻濃而不清多雜米家筆仗寳晉齋帖米元章手摹二王以下真蹟入石佳帖難得學者賴此得見晉唐人髣髴爾汝州帖摘諸帖中字牽合為之每卷尾有汝州印後有㑹稽重摹俗謂之蘭亭帖黔江帖秦子明借寳月古法帖摹刻石在黔江紹聖院乃潭人湯正臣父子刻賜書堂帖宋宣獻公摹於山陽石已不存後又重摹蔡州帖蔡州臨摹絳帖上十卷出于潭帖之上彭州帖刻歴代法帖十卷不甚精彩利州帖慶元中以戲魚堂帖重刻于益昌泉州帖淳化帖翻最為完善少遜于大觀絳帖比之他刻亦大相徑庭自智果而後缺十餘幀羣王堂帖韓侂胄刻筆意清遒雖有勝趣憾刻手不佳不為精妙百一帖王萬慶摹刻脩内司帖淳熈間出内府所藏刻石禁中題尾云脩内司奉㫖上石亦名閟閣續帖甲秀堂帖廬江李氏刻前有王顔書多諸帖所未有二王帖許提舉刻於臨江真賞齋帖錫山華氏刻此明碑之最精者右十二篇大要筆圓字方傍宻閒豁血濃骨老筋藏肉潔筆筆造古意字字有來歴日臨名書無吝紙筆工夫精熟久自得之簡縁云書法之賾和盤托出學者但要自始訖終細心體㑹自有正路可入母為野狐鳴盤踞胷中輕視此編也書法正傳卷一
