front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0066_WYG_010-1a, image: WYG0826/WYG0826-0458c.png}
body:
  text: 書法正傳卷十常熟馮武撰鈍吟書要書是君子之藝程朱亦不廢我於此有功今為盡言之先學間架古人所謂結字也閒架既明則學用筆間架可看石碑用筆非真迹不可結字晉人用理唐人用法宋人用意用理則從心所欲不踰矩因晉人之理而立法法定則字有常格不及晉人矣宋人用意意在學晉人也意不周帀則病生此時代所壓趙松雪更用法而參以宋人之意上追二王後人不及矣為奴書之論者不知也唐人行書皆出二王宋人行書多出顔魯公趙子昻云用筆千古不變只看宋人亦妙唐人難得也蔡君謨正書有法無病朱夫子極推之錐畫沙印印泥屋漏痕是古人秘法姜白石云不必如此知此君憒憒黄山谷純學瘞鶴銘其用筆得於周子發故遒徤周子發俗山谷胷次高故遒徤而不俗近董思白不取遒徤學者更弱俗董公却不俗虞世南能整齊不傾倒歐陽詢四面停勻八方平正此是二家書法妙處古人所言也歐書如凌雲臺輕重分毫無負妙哉歐公一片神骨極有作用倚牆靠壁便不是巙巙子山一流人有牆壁所以不好姜立綱尤俗余見歐陽信本行書真迹及皇甫君碑始悟定武蘭亭全是歐法姜白石都不解董宗伯云王右軍如龍李北海如象不如云王右軍如鳯李北海如俊鷹嘗學蔡君謨書欲得字字有法筆筆用意又學山谷老人欲得使盡筆勢用盡腕力又學米元章始知出入古人去短取長薦季直表不必是真迹亦恐是唐人臨本使轉縱横熟視殆不似正書徐季海似學此也漢人分書不純方唐人分書不純扁王司冦誤論只看孝經與勸進碑爾顧云美云唐人分書極學漢人此論佳可破惑者八分書只漢碑可學更無古人真迹近日學分書者乃云碑刻不足據不知學何物漢人分書多剥蝕唐人多完好今之昧於分書者多學碑上字作剥蝕狀可笑也虞世南廟堂碑全是王法最可師貧人不能學書家無古迹也然真迹只須數行便可悟用筆閒架規模只看石刻亦可學草書須逐字寫過令使轉虚實一一盡理至興到之時筆勢自生大小相參上下左右起止映帶雖狂如旭素咸臻神妙矣古人醉時作狂草細看無一失筆平日工夫細也此是要訣姜白石論書畧有梗概耳其所得絶粗趙松雪重之為不可解如錐畫沙如印印泥如古釵脚如拆壁痕古人用筆妙處白石皆言不必然又云側筆出鋒此大謬出鋒者末鋭不收褚云透過紙背者也側則露鋒在一面矣顔書勝栁書栁書法却甚備便初學古人作横畫如千里陣雲黄山谷筆從畫中起迴筆至左頓腕實畫至右住處却又趯轉正如陣雲之遇風往而却迴也運腕太疾起處有頓筆之迹今人於起處作㸃殊失勢也余教童子作書每日只學十字㸃畫體勢須使毫髪畢肖百日以後便解自作書矣張長史云小字展令大盡筆勢為之也大字蹙令小遏鋒藏勢使閒架有餘也今廣平府有顔魯公儀門字門字小儀字大却相稱殊不見有異竒迹也左去吻右去肩歐陽蘭臺不用此法東坡談書皆篤論過於黄米米老喜作快口語不知執之多為所誤山谷只自言其所得耳畵有南北書亦有南北晉人盡理唐人盡法宋人多用新意自以為過唐人實不及也婁子柔先生云米元章好割截古迹有書賈俗氣名言也東坡書有病筆唐人無此顔魯公書磊落嵬峩自是臺閣中物米元章不喜顔正書至今人直以為怪矣子字分書横畫不飛倚人直筆不向左挑起人字加三撆是古升字黄長睿疑智果書不真此不習南朝書法也歐陽公不信遺教經東坡殊不以為然宋人蔡君謨書最佳今人不重只縁不學古耳書法無他秘只有用筆與結字耳用筆近日尚有傳結字古法盡矣變古法須有勝古人處都不知古人却言不取古法直是不成書耳余見東坡子昻二真迹見坡書㸃畫學顔魯公體勢學李北海風捲雲舒逼之若將飛動趙殊精工直逼右軍然氣骨自不及宋人不堪並觀也坡書真有怒猊抉石渇驥奔泉之態徐季海世有真迹不知視此何如爾坡公少年書圓覺經小楷直逼季海見老泉一書亦學徐浩山谷稱東坡學徐季海蘇斜川却云不然我信山谷作書須自家主張然不是不學古人須看真迹然不是不學碑刻唐人用法謹嚴晉人用法瀟灑然未有無法者意即是法本領者將軍也心意者副將也本領極要緊心意附本領而生邑人嚴道普名澤家藏右軍二謝帖或誚之曰誰見右軍執筆作此字余曰能作此字即是右軍使右軍不能作此字我亦不重右軍秦權上字秦之隸書乃篆之捷也與今正書不同然非分書也蓋隸書本如此後漸變為今正書耳歐公以此似今八分遂呼漢人分書為隸既知其不同且疑薛尚功摹之失體誤也今人作正書是鍾王法然鍾王古字亦多與今不同世傳六朝唐初碑上字分隸相雜疑當時正書如此至唐中葉以後始變如今法後人純學鍾王也右軍正書多古字東方朔畫讚序字作序樂毅論字㬥字黄庭經耶字遺教經字今皆不行今人所用只是宋元體曹娥碑猶古陜西傳摹盡去之矣古人作小正書與碑板誥命書不同今人用碑板上大字作小正書不得體也祝希哲常痛言之唐人碑板刻手亦有工拙然勝於宋人佳佳麗字也隹鳥短尾也近時人作佳麗字盡誤漢書東方朔傳來來先生分書􅀥字作重來今人改作束字誤也見夢溪筆談不習二王下筆便誤魯公書如正人君子冠佩而立望之儼然即之也温米元章以為惡俗妄也欺人之談也顔書要畫中有筋其用筆與徐季海父子相同多寳是少年時書㸃畫皆有法不知者學之正如布算相似須要看他墨酣意足處與朱巨川誥參看最得書至成時神竒變化出没不窮若功夫淺得少為足便退落如嚴天池二三十嵗好後來便可厭只為從前功夫不多也大畧初學時多可觀後來不學便不成書耳宋人作書多取新意然意須從本領中來米老少時如集字晚年行法亦不離楊少師顔魯公也本領精熟則心意自能變化字有二法一曰用筆汝用筆疎硬而骨枯非法也看褚書便知血脈處極細而有筆意也二曰佈置左右向背上下承蓋半濶半細半高半低分閒架在佈白處汝毫無法但直寫而無意不成字也佈置用筆千古講之者多矣趙子昻專言此汝可尋思凡學書千字文少不得簡縁云千字文是將右軍字凑成智永臨寫八百本非永書也此是右軍舊法得此便有根本如二王法帖只是影子惟架子尚在可觀耳書有二要一曰用筆非真迹不可二曰結字只消看碑要知結字之妙明朝人書一字看不得看了誤人事行書從二王起便是頭路真行用羲之法以小王發其筆性草書全用小王大草書用羲之法如狂草學旭不如學素此吾法也教人作書吾便於栁法謝二書只學趙自餘一步不窺所以全不合古法也然用筆如錐畫沙細而有姿媚汝短處正在此不可不用功也若死學栁書其病亦正同耳悟得栁公學古處二王歐虞褚薛打做一團方好也簡縁云盡情吐露至囑已上三札與无咎學書當有晉人法看石刻亦不易所謂差之毫釐謬以千里也趙文敏為人少骨力故字無雄渾之氣喜避難須參以張從申徐季海方可季海筋在畫中晚年有一種如渇驥奔泉之勢老極所以熟而不俗張書古甚拙處人不知其妙也顔行如篆如籕蘇米皆學之最宜留心昨法書多失體佈置匀直少勢鍾公云㸃不變謂之佈棊畫不變謂之佈算最是大忌如真字中三筆須不同佳字左倚人向右右四畫亦要俯仰有情今俱如算子大似無講貫也日來作虞法覺其和緩寛裕如見大人君子全得右軍體今日刻本黄庭都不是但惜不見原本筆畫俯仰處甚遒翻多失之與永師千文看方得與无咎米顛作顔行兼用楊景度有散仙入聖之致坡公須帶二徐本領千古不易用筆學鍾結字學王晉人循理而法生唐人用法而意出宋人用意而古法具在知此方可看帖用意險而穏竒而不怪意生法中此心法要悟行書右軍止有蘭亭及官奴帖獻之辭中令表米元章云但取聖教序學之更學右軍諸札使大小相襍便成書此言甚有會然蘭亭官奴字無大小正如唐人碑上字耳唐人多兼二王張從申所云右軍風規下筆斯在者也然今所存頗似大令徐季海有筋骨如渇驥奔泉怒猊抉石東坡云細筋入骨無人知此言極妙米海嶽以為過老詆之偏見也米黄論書殊不及坡然今人多信米米黄俱好為快語非篤論也我嘗謂蘇黄論詩米元章論書不為無見但抑揚太過使人不樂聞耳趙子昻用筆絶勁然避難從易變古為今用筆既不古時用章草法便拙當其好處古今不易得也近文太史學趙去之如隔千里正得他不好處耳枝山多學其好處真可愛玩但時有失筆别字董宗伯全不講結構用筆亦過弱但藏鋒為佳學者或不知董似未成字在文下趙松雪出入古人無所不學貫穿斟酌自成一家當時誠為獨絶也自近代李楨伯創奴書之論後生恥以為師甫習執筆便羞言模倣古人晉唐舊法於今掃地矣松雪正是子孫之守家法者爾詆之以奴不已過乎但其立論欲使字形流美又功夫過於天資於古人蕭散㢘斷處微為不足耳如楨伯書用盡心力視古人何如哉學前人書從後人入手便得他門戶學後人書從前人落下便有拏把簡縁云語無滲漏汝學趙松雪若從徐季海李北海入手便古勁可愛見汝行書如挽秋蚓意不喜汝學顔書大署書乃有似東坡處此從上學下也汝作多寳塔體多用死筆所以不好要看他活處如貝字有字横處全無俯仰如一張梯此失也小處用功便不死與旡咎學古人書不可失其本趣如近世王履吉書行草學孫過庭全失過庭意正書學虞全不得虞筆虞云先臨告誓後寫黄庭夫子廟堂碑全似黄庭履吉不知也過庭與右軍殆無别矣履吉多險怪全無右軍體白雀帖尤惡本領者將軍也心意者副將也所謂本領只是規模古人然須有取舍不得巧拙兼效雖欲博涉諸家然須得通會不可今古雜出唐人尚法用心意極精宋人解散唐法尚新意而本領在其間米元章書如集字是也至蔡君謨則㸃畫不茍矣坡公立論亦雅推君謨作字惟有用筆與結字用筆在使盡筆勢然須收縱有度結字在得其真態然須映帶匀美書法正傳卷十
