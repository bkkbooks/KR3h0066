body:
  text: 書法正傳卷七常熟馮武撰纂言下晉衛恆四體書勢第一字勢第三𨽻勢第二勢勢第四草書衛恆字巨山少辟司空齊王府轉太子舍人尚書郎祕書丞太子庶子黃門郎恆善草𨽻書為四體書勢曰昔在黃帝創制造物有沮誦蒼頡者始作書契以代結繩蓋睹鳥跡以興思也因而遂書則謂之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰㑹意武信是也五曰轉注考老是也六曰假借令長是也夫指事者在上為上在下為下象形者日滿月虧象其形也形聲者以類為形以配為聲也㑹意者止戈為武人言為信也轉注者以老夀考也假借者數言同字其聲雖異文意一也自黃帝至三代其文不改及秦用篆書燒焚先典而古文絶矣漢武時魯恭王壞孔子宅得古文尚書春秋論語孝經時人已不復知古文謂之蝌蚪書漢世祕藏希得見魏初傳古文者出於邯鄲淳恆祖敬侯為寫尚書後以示淳而淳不别至正始中立三字石經轉失淳法因蝌蚪之名遂效其形太康元年汲縣人盜發魏襄王冢得策書十餘萬言按敬侯所書猶有髣佛古書者數種其一卷論楚事者最為上妙恆竊悅之故竭愚思以諧其美愧不足以厠前賢之作冀以存古今之象焉古無别名謂之字勢云黃帝之史沮誦蒼頡眺彼鳥跡始作書契紀綱萬事垂法立制帝典用宣質文著世爰暨暴秦滔天作戾大道既泯古文亦滅魏文好古世傳丘墳歷代莫發真僞莫分大晉開元𢎞道敷訓天垂其象地效其文天地乃位粲美其章因聲附意類物有方日處君而盈其度月執臣而窺其傍雲委蛇而上布星離披以舒光禾卉莽蓴以垂頴山嶽嵳峩而連岡蟲起蟄而若動鳥似飛而未揚覩其措筆綴墨用心精專勢和體均發止無閒或守正循撿規折矩旋或方圓靡則因事制權其曲如弓其直如弦矯然特出若龍騰於川森爾下頽若雨墜於天或引筆奮力若鴻雁高飛邈邈翩翩或縱肆婀娜若流蘇懸羽靡靡綿綿是故逺而望之若翔鳯厲水清波漪漣就而察之有若自然信黃唐之遺跡為六藝之範先篆籕蓋其子孫隸草乃其曾𤣥聊觀象以致思非言詞之所宣昔周宣王時史籕始著大篆十五篇或與古同或與古異世謂之籕書者也及平王東遷諸侯力政家殊國異而文字乖形秦始皇帝初兼天下丞相李斯乃損益之罷不合秦文者斯作蒼頡篇中車府令趙高作爰歷篇太史令胡母敬作博學篇皆取史籕大篆或頗省改所謂小篆者或曰下邽人程邈為獄吏得罪始皇幽繫雲陽獄十年從獄中作大篆少者增益多者損減方者使圓圓者使方奏之始皇始皇善之出以為御史使定書或曰邈所定乃隸字也自秦壞古文有八體一曰大二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書王莽時使司空甄酆校文字部改定古文復有六書一曰古文孔氏壁中書也二曰竒字即古文而異者三曰傳書秦篆書也四曰佐書即隸書也五曰繆篆所以摹印也六曰鳥書所以書幡信也許慎撰說文用篆書為正體例最可得而論也秦時李斯號為工諸山及銅人銘皆斯書也漢建初中扶風曹喜少異於斯而亦稱善邯鄲淳師焉略究其妙韋誕師淳而不及也太和中誕為成都太守以其能書留補侍中魏氏寶器銘題皆誕書也漢末又有蔡雍采斯喜之法為古今雜形然精密間理不如淳也雍作篆勢曰因為鳥迹蒼頡循聖作則制文體有六篆妙巧入神或象龜文或比龍鱗紆體放尾長翅短身頽若黍稷之垂穎藴若龍蛇之棼緼揚波振擊龍躍鳥震延頸脅翼勢似凌雲或輕舉內投微本濃末若絶若連似水露緣絲凝垂欲下從者如懸衡者如編杪者邪趨不方不圓若行若飛跂跂翾翾逺而望之象鴻鵠羣遊絡繹遷延近而視之端際而不可得見指撝不可勝原研桑不能數其詰屈離婁不能覩其隙閒般倕揖讓而辭巧籕誦拱手而韜翰處篇籍之首目粲斌斌其可觀摛華豓於紈素為學藝之範先嘉文德之𢎞懿藴作者之莫刋思字體之俯仰舉大略而論旃秦既用奏事繁多篆字難成即令隸人佐書隸字漢因行之獨符璽幡信題署用篆隸書者篆之捷也上谷王次仲始作楷法至靈帝好書時多能者而師宜官為最大則一字徑丈小則方寸千言甚矜其能或時不持錢詣酒家飲因書其壁顧觀者以往計錢足而滅之每書輒削而焚其柎梁鵠乃益為板而飲之酒候其醉而竊其柎鵠卒以書至選部尚書宜官後為袁術將今巨鹿宋子有耿球碑是宜官書也梁鵠奔劉表魏武帝破荆州募求鵠鵠之為選部也魏武欲為洛陽令而以為北部尉故懼而自縳詣門署軍假司馬在祕書自效是以今者多有鵠手迹魏武帝懸著帳中及以釘壁玩之以為勝宜官今宫殿題署多是鵠書鵠宜為大字邯鄲淳宜為小字鵠謂淳得次仲法然鵠之用筆盡其勢矣鵠弟子毛𢎞教於祕書今八分皆𢎞法也漢末有左子邑小與淳鵠不同然亦有名魏初有鍾胡兩家為行書法俱學於劉德升而鍾氏小異然亦各有其巧今大行於世作隸勢曰鳥迹之變乃為佐隸蠲彼繁文崇此簡易厥用既形體象有度煥若星陳鬱若雲布其大徑尋細不容髮隨事從宜靡有常制或穹窿恢廓或櫛比針列或砥平繩直或蜿蜒繆戾或長斜角趣或規旋矩折修短相副異體同勢奮筆輕舉離而不絶纎波濃㸃錯落其閒若鐘簴設張庭燎飛煙嶄巖崔嵳高下屬連似崇臺重宇層雲冠山逺而望之若飛龍在天近而察之如心亂目眩竒姿譎誕不可勝原研桑所不能計宰賜所不能言何草篆之足算而斯文之未宣豈體大之難覩將祕奧之不傳聊佇思而詳觀舉大較而輪旃漢興而有草書不知作者姓名至章帝時齊相杜伯度號稱善作篇後有崔瑗崔實亦皆稱工杜氏結字甚安而書體微瘦崔氏甚得筆勢而結字小疏𢎞農張伯英者因而轉精其巧凡家之衣帛必書而後練之臨池學書池水盡黑下筆為楷則常曰匆匆不暇草書寸紙不見遺至今世尤寶其書韋仲將謂之草聖伯英弟文舒者次伯英又有姜孟頴梁孔達田彥和及韋仲將之徒皆伯英弟子有名於世然殊不及文舒也羅叔景趙元嗣者與伯英並時見稱於西京而矜巧自與衆頗惑之故伯英自稱上比崔杜不足下方羅趙有餘河間張超亦有名雖然與崔氏同州不如伯英之得其法也崔瑗作草書勢曰書契之興始自頡皇寫鳥迹以定文章爰暨末葉典籍彌繁時之多辟政之多權官事荒蕪勦其墨翰惟作佐隸舊字是删草書之法蓋又簡略應時踰指用於卒迫兼功并用愛日省力純儉之變豈必古式觀其法象俯仰有儀方不中矩圓不中規抑左揚右兀若竦﨑獸跋鳥峙志在飛移狡免暴駭將奔未馳或黝黭􅚭􅀈狀似連珠絶而不離畜怒奮鬱放逸生竒忽凌邃惴栗若據槁臨危旁㸃邪附似蜩螳挶枝絶筆收勢餘綖虬結若杜伯揵毒看隙緣巇螣蛇赴穴頭沒尾垂是故逺而望之漼焉若沮岸崩崖就而察之一畫不可移幾微要妙臨時從宜略舉大較髣佛若斯張懷瓘十體書斷參唐𤣥度論十體韋積五十六種夢英十八體而增刪之古文者黃帝史蒼頡所造也頡首四目通於神明仰觀奎星圓曲之勢俯察龜文鳥迹之象博采衆美合而為字是為古人嬴氏之代法務徑捷隸書是興古文殆絶漢魯恭王壞孔子舊宅得尚書論語孝經皆蝌蚪文字又河內女子壞老君屋得古文秦誓顧命二篇蝌蚪書即古文别名蒼頡即古文之祖也按許氏說文曰蒼頡之作書也依類以象形故謂之文其後形聲相益即謂之字字者孶乳而寖多也著於竹帛則謂之書書者如也如者如其事也大篆者周宣王太史籕所作也始變古文為大者傳也傳其物理施之無窮秦焚詩書惟易與大篆十五篇獨存史籕即大篆之祖也籕文者亦周太史籕所作也與古文大篆小異後人以其名稱書謂之籕相傳周時史官以此教學童書今所傳周宣王石鼓文是其遺法史籕即籕文之祖也簡緣云所謂籕是也疑即大篆而小變之衛恆謂十五篇即籕文不為無見小篆者秦丞相李斯所作斯妙於法乃增損史籕大篆而為小亦曰秦篆畫如鐵石字若飛動作楷隸之祖為不易之法凡銘題鍾鼎及作符璽至今用焉謂之玉筯篆李斯即小篆之祖也八分者秦羽人上谷王次仲所作以古書字形小波勢乃作八分楷法字方八分言有模楷其後師宜官梁鵠蔡雍善之王次仲即八分之祖也隸書者秦下邽人程邈所造也邈字元岑始為縣令得罪始皇幽繫雲陽獄中覃思十載損益大小篆方圓而為隸書三千字奏之始皇始皇善之用為御史以奏事繁多篆字難成乃用隸字以為隸人佐書故曰隸書或曰邈起徒隸故曰隸書非也按八分已減小篆之半實小篆之捷隸又減八分之半亦八分之捷程邈即隸書之祖也簡緣云按始變楷法原從大小篆而來則今之結體用筆何可茍也一種沈著周正處玩小篆當自得之即錐畫沙印印泥也章草者漢黃門令史游所作王愔云漢元帝時史游作急就章解散隸體粗書之存字之梗槩損隸之規矩縱任奔逸赴速急就因草創之義謂之草書懷瓘按章草之書字字區别章草即隸書之捷草又章草之捷按杜度在史游後一百餘年則解散隸體明是史游創焉史游即章草之祖也行書者後漢頴川劉德升所造也即正書之小僞務從簡易相閒流行故謂之行書劉德升即行書之祖也簡緣云鍾繇謂之行押書正書稍流動者謂之真行草帶行者謂之行草飛白者後漢左中郎將蔡雍所作靈帝時詔雍作聖皇篇篇成詣鴻都門上方修飾鴻都門雍見役人以堊帚成字悅焉歸而為飛白之書雖創法於八分實窮微於小篆漢末魏初並以題署宫闕王僧䖍云飛白八分之輕者張芝草書得簡易流逺之極蔡雍飛白得華豓飄蕩之極梁武帝謂蕭子雲云獻之書白而不飛卿書飛而不白可斟酌為之子雲乃以篆文為之雅合帝意其後歐陽詢得焉伯喈即飛白之祖也草書者後漢張伯英所造伯英名芝杜度妙於章草崔瑗崔實父子繼能羅暉趙襲亦法此藝襲與芝善芝自云上比崔杜不足下方羅趙有餘伯英學崔杜之法變成今草字之體勢一筆而成偶有不連而血脈不斷及其連者氣候通其隔行子敬深明其㫖故行首之字往往繼前行之末世稱一筆書者起自張伯英即此也伯英即草書之祖也唐孫過庭書譜夫自古之善書者漢魏有鍾張之絶晉末稱二王之妙王羲之云頃尋諸名書鍾張信為絶倫其餘不足觀可謂鍾張云沒而羲獻繼之又云吾書比之鍾張鍾當抗行或謂過之張草猶當雁行然張精熟池水盡墨假令寡人耽之若此未必謝之此乃推張邁鍾之意也考其專擅雖未果於前規托以兼通故無慙於即事評者云彼之四賢古今特絶而今不逮古古質而今妍夫質以代興妍因俗易雖書契之作適以記言而淳醨一遷質文三變馳騖沿革物理常然貴能古不乖時今不同弊所謂文質彬彬然後君子何必易雕宫於穴處反玉輅於椎輪者乎又云子敬之不及逸少猶逸少之不及鍾張意者以為評得其綱紀而未詳其始卒也且元常專工於隸書伯英尤精於草體彼之二美而逸少兼之擬草則餘真比真則長草雖專工小劣而博涉多優總其終始匪無乖互謝安素善尺牘而輕子敬之書子敬嘗作佳書與之謂必存録安輒題後答之甚以為恨安嘗問子敬卿書何如右軍答故當勝安云物論殊不爾子敬又答時人那得知敬雖權以此辭折安所鑒自稱勝父不亦過乎且立身揚名事資尊顯勝母之里曾參不入以子敬之毫翰紹右軍之筆札雖復粗傳楷則實恐未克箕裘况乃假託神仙恥崇家範以斯成學孰愈面牆後羲之往都臨行題壁子敬密拭除之輒書易其處私為不惡羲之還見乃歎曰吾去時真大醉也敬乃內慙是知逸少之比鍾張則專博斯别子敬之不及逸少無或疑焉余志學之年留心翰墨味鍾張之餘烈挹羲獻之前規極慮專精時逾二紀有乖入木之術無閒臨池之志觀夫懸針垂露之異奔雷墜石之竒鴻飛獸駭之資鸞舞蛇驚之態絶岸頽峯之勢臨危據槁之形或重如崩雲或輕如蟬翼導之則泉注頓之則山安纎纎乎似初月之出天崖落落乎猶衆星之列河漢同自然之妙有非力運之能成信可謂智巧兼優心手雙暢翰不虛動下必有由一畫之閒變起伏於鋒杪一㸃之內殊衄挫於毫芒況云積其㸃畫乃成其字曾不旁窺尺牘俯習寸陰引班超以為辭援項籍而自滿任筆為體聚墨成形心昏擬效之方手迷揮運之理求其妍妙不亦謬哉然君子立身務修其本揚雄謂詩賦小道壯夫不為況復溺思毫釐淪精翰墨者也夫潛神對奕猶標坐隱之名樂志垂綸尚體行藏之趣詎若功定禮樂妙擬神仙猶埏埴之罔窮與工錘而並運好異尚竒之士玩體勢之多方窮微測妙之夫得推移之奧賾著述者假其糟粕藻鑒者挹其菁華固義理之㑹歸信賢達之兼善者矣存精寓賞豈徒然與而東晉士人互相陶淬至於王謝之族郗庾之倫縱不盡其神竒咸亦挹其風味去之滋永斯道逾微方復聞疑稱疑得末行末古今阻絶無所質問設有所㑹緘祕已深遂令學者茫然莫知領要徒見成功之美不悟所致之由或乃就分布於纍年向規矩而猶逺圖真不悟習草將迷假令薄解草書粗傳隸法則好溺偏固自闕通規詎知心手㑹歸若同源而異派轉用之術猶共樹而分條者乎加以趨變適時行書為要題勒方幅真乃居先草不兼真殆於專謹真不通草殊非翰札真以㸃畫為形質使轉為性情草以㸃畫為性情使轉為形質草乖使轉不能成字真虧㸃畫猶可記文回互雖殊大體相涉故亦傍通二篆俯貫八分包括篇章涵泳飛白若毫釐不察則胡越殊風者焉至如鍾繇隸竒張芝草聖此乃專精一體以致絶倫伯英不真而㸃畫狼籍元常不草而使轉縱橫自兹以降不能兼善者有所不逮非專精也雖篆隸草章工用多變濟成厥美各有攸宜篆尚緩而通隸欲精而密草貴流而暢章務檢而便然後凜之以風神溫之以妍潤鼓之以枯徑和之以間雅故可達其性情形其哀樂驗燥濕之殊節千古依然體老壯之異時百齡俄頃嗟乎不入其門詎窺其奧者也又一時而書有乖有合合則流媚乖則雕疏略言其由各有其五神怡務閒一合也感惠徇知二合也時和氣潤三合也紙墨相發四合也偶然欲書五合也心遽體留一乖也意違勢屈二乖也風燥日炎三乖也紙墨不稱四乖也情怠手闌五乖也乖合之際優劣互差得時不如得器得器不如得志若五乖同萃思遏手蒙五合交臻神融筆暢暢無不適蒙無所從當仁者得意忘言罕陳其要企學者希風敘妙雖述猶疏徒立其工未敷厥㫖不揆庸昧輒效所明庶欲𢎞既往之風規導將來之器識除繁去濫覩迹明心者焉代有筆陳圖七行中畫執筆圖貌乖舛㸃畫湮訛頃見南北流傳疑是右軍所製雖則未詳真僞尚可發啓童蒙既常俗所存不藉編録至於諸家勢評多涉浮華莫不外狀其形內迷其理今之所撰亦無取焉若乃師宜官之高名徒彰史牒邯鄲淳之令範空著縑緗暨乎崔杜以來蕭羊以往代祀綿逺名字滋繁或藉甚不渝人亡業顯或憑附增價身謝道衰加以糜蠧不傳搜祕將盡偶逢緘賞時亦罕窺優劣紛紜殆難覼縷其有顯聞當代遺迹見存無俟抑揚自標先後且六文之作肇自軒轅八體之興始於嬴政其來尚矣厥用斯𢎞但今古不同妍質懸隔既非所習又亦略諸復有龍蛇雲霧之流龜鶴花英之類乍圖真于率爾或寫瑞於當年巧涉丹青工虧翰墨異夫楷式非所詳焉代傳逸少與子敬筆勢論十章文鄙理疏意乖言拙詳其㫖意殊非右軍且右軍位重才高調清詞雅聲塵未泯翰牘仍存觀夫致一書陳一事造次之際稽古斯在豈有貽謀令嗣道協義方章則頓虧一至於此又云與張伯英同學斯乃更彰虛誕若指漢末伯英時代全不相接必有晉人同號史傳何其寂寥非訓非經宜從棄擇夫心之所達不易盡於名言言之所通尚難形於紙墨粗可髣佛其狀綱紀其辭冀酌希夷取㑹佳境闕而未逮請俟將來今撰執使轉用之由以袪未悟執謂淺深長短之類是也使謂縱橫牽掣之類是也轉謂鉤鐶盤紆之類是也用謂㸃畫向背之類是也方復㑹其數法歸於一途編列衆工錯綜羣妙舉前賢之未及啓後學於成規窺其根源析其枝派貴使文約理贍迹顯心通披卷可明下筆無滯詭辭異說非所詳焉然今之所陳務禆學者但右軍之書代多稱絶良可據為宗匠取立指歸豈惟㑹古通今亦乃情深調合致使摹搨日廣研習嵗滋先後著明多從散落歷代孤紹非其效歟試言其由略陳數意止如樂毅論黃庭經東方朔畫讚太師針蘭亭集序告誓文斯並代俗所傳真行絶致者也寫樂毅則情多怫鬱書畫讚則意涉瓌竒黃庭經則怡懌虛無太師針又從橫爭折暨乎蘭亭興集思逸神超私門誡誓情拘志慘所謂涉樂方笑言哀已歎豈惟駐想流波將貽嘽緩之奏馳神睢渙方思藻繪之文雖其目擊道存尚或心迷義舛莫不強名為體共習分區豈知情動形言取㑹風騷之意陽舒陰慘本乎天地之心既失其情理乖其實原夫所致安有體哉夫運用之方雖由已出規模所設信屬目前差之毫釐失之千里茍知其術適可兼通心不厭精手不忘熟若運用盡於精熟規矩諳於胸襟自然容與徘徊意先筆後瀟灑流落翰逸神飛亦猶𢎞羊之心豫乎無際庖丁之目不見全牛嘗有好事就吾求習吾乃粗舉綱要隨而授之無不心悟手從言忘意得縱未窺於衆術斷可極於所治矣若思通楷則少不如老學成規矩則老不如少思則老而逾妙學乃少而可勉勉之不已抑有三時時然一變極其分矣至如初學分布但求平正既知平正務追險絶既能險絶復歸平正初謂未及中則過之後乃通㑹通㑹之際人書俱老仲尼云五十知命七十從心故以達夷險之情體權變之道亦猶謀而後動動不失宜時然後言言必中理矣是以右軍之書末年多妙當緣思慮通審志氣和平不激不厲而風規自逺子敬以下莫不鼓努為力標置成體豈獨工用不侔亦乃神情懸隔者也或有鄙其所作或乃矜其所運自矜者將窮性域絶於誘進之途自鄙者尚屈情涯必有可通之理嗟乎蓋有學而不能未有不學而能者也考之即事斷可明焉然消息多方性情不一乍剛柔以合體忽勞逸而分驅或恬淡雍容內涵筋骨或折挫槎枿外曜鋒芒察之者貴精擬之者貴似况擬不能似察不能精分布猶疏形骸未檢躍泉之態未覩其妍窺井之談已聞其醜縱欲唐突羲獻誣罔鍾張安能掩當年之目杜將來之口慕習之輩尤宜慎諸至有未悟淹留偏追徑疾不能迅速翻效遲重夫徑速者超逸之機遲留者賞㑹之致將反其速行臻㑹美之方專溺于遲終爽絶倫之妙能速不速所謂淹留因遲就遲詎名賞㑹非其心閒手敏難以兼通者焉假令衆妙攸歸務存骨氣骨既存矣而遒潤加之亦猶枝幹扶疏凌霜雪而彌徑花葉鮮茂與雲日而相暉如其骨力偏多遒麗蓋少則若枯槎架險巨石當路雖妍媚云闕而體質存焉若遒徑居優骨氣將劣譬夫芳林落蕊空照灼而無依蘭沼漂萍徒青翠而奚託是知偏工易就盡善難求雖學宗一家而變成多體莫不隨其性欲便以為姿質直者則徑侹不遒剛狠者又崛强無潤矜斂者弊於拘束脫易者失於規矩溫柔者傷於軟緩躁勇者過於剽迫狐疑者溺於滯澀遲重者終於蹇鈍輕瑣者誶於俗吏斯皆獨行之士偏玩所乖易曰觀乎天文以察時變觀乎人文以化成天下况書之為妙近取諸身假令運用未周尚虧工於祕奧而波瀾之際已濬發於靈臺必能傍通㸃畫之情博究始終之理鎔鑄蟲篆陶均草隸體五材之並用儀形不極象八音之迭起感㑹無方至若數畫並布其形各異衆㸃齊列為體互乖一㸃成一字之規一字乃終篇之準連而不犯和而不同留不常遲遣不恆疾帶燥方潤將濃遂枯泯規矩於方圓遁鈎繩之曲直乍顯乍晦若行若藏窮變態於毫端合情調於紙上無間心手忘懷楷則自可背羲獻而無失連鍾張而尚工譬夫絳樹青琴殊姿共豓隋珠和璧異質同妍何必刻鵠圖龍竟慙真體得魚獲兔猶吝筌蹄夫家有南威之容乃可論於淑媛有龍泉之利然後議於斷割語過其分實類樞機吾嘗盡思作書謂為甚合時稱識者輒以引示其中巧麗曾不留目或有誤失翻被嗟賞既昧所見尤喻所聞或以年職自髙輕致陵誚余乃假之以縹緗題之以古目則賢者改觀愚夫繼聲競賞毫末之竒罕議鋒端之失猶惠侯之好僞似葉公之懼真是知伯子之息流波蓋有由矣夫蔡雍不謬賞孫陽不妄顧者以其𤣥鑒精通故不滯於耳目也向使竒音在爨庸聽驚其妙響逸足伏櫪凡識知其絶羣則伯喈不足稱良樂未可尚也至若老姥遇題扇初怨而後請門生獲書几父削而子懊知與不知也夫士屈於不知巳而伸於知己彼不知也曷足怪乎故莊子曰朝菌不知晦朔蟪蛄不知春秋老子云下士聞道大笑之不笑之則不足以為道也豈可執冰而咎夏蟲哉自漢魏以來論書者多矣妍蚩雜糅條目糾分或重述舊章了不殊於既往或茍興新說竟無益於將來徒使繁者仍繁闕者仍闕今撰為六篇分成兩卷第其工用名曰書譜庶使一家後進奉以規模四海知音或存觀省緘祕之㫖余無取焉垂拱三年寫記宋姜白石續書譜名䕫真行草書之法其源出於蟲篆八分飛白章草圓徑古淡則出于蟲篆㸃畫波發則出於八分轉換向背則出于飛白簡便痛快則出於章草然而真草與行各有體製大抵下筆之際盡倣古人則少神氣專務遒徑則俗病不除所貴熟習兼通心手相應斯為美矣白雲先生歐陽率更書訣亦能言其梗槩孫過庭論之又詳皆可參稽之真書魏晉書法之高良由各盡字之真態理也唐人師之法也真書用筆自有八法今略言其指㸃者字之眉目全藉顧盻精神有向有背隨字形勢橫直畫者字之骨體欲其堅正勻淨有起有止所貴長短合宜結束堅實撇捺者字之手足伸縮異度變化多端要如魚翼鳥翅有翩翩自得之狀挑躍者字之步履或長或短或向上或向下或向右或向左或輕出而稍斜或隨衄而峻發各隨字之用處轉折者方圓之法真多用折草多用轉折欲少駐駐則有力轉欲不滯滯則不遒然而真以轉而後遒草以折而後徑不可不知也懸針者筆欲極正自上而下端若引繩若垂而復縮謂之垂露故翟伯夀問於米老曰書法當何如米老曰無垂不縮無往不收此必至精至熟然後能之古人遺墨得其一㸃一畫皆昭然絶異者以其用筆精妙故也真書用筆用筆不欲太肥肥則形濁又不欲太瘦瘦則形枯不欲多露鋒芒則意不持重不欲深藏圭角則體不精神不欲上小下大不欲左低右高不欲前多後少歐陽率更結體雖太拘而用筆特備衆美雖小楷而翰墨灑落追蹤鍾王來者不能及矣草書用筆草書之體如人坐卧行立揖遜忿爭乘舟躍馬歌舞躃踴一切變態非茍然者又一字之體率有多變有起有應如此起者當如此應各有義理王右軍書羲之字當字得字深字慰字最多多至數十字無有同者而未嘗不同也可謂所欲不踰矩矣大凡學草書先當取法張芝皇象索靖等章草則結體平正下筆有源然後倣王右軍申之以變化鼓之以竒崛若泛學諸家則字有工拙筆多失誤當聨者反斷當斷者反續不識向背不知起止不悟轉換隨意用筆任筆賦形失誤顛錯反為新竒自大令以來已如此矣况今世哉然而襟韻不高記憶雖多莫湔塵俗若使風神瀟散下筆便當過人自唐以前多是獨草不過兩字連屬纍數十字而不斷號曰連綿遊絲此雖出於古人不足為竒更成大病古人作草如今人作真何嘗茍且其相連處特是引帶嘗考其字是㸃畫處皆重非㸃畫處偶相引帶其筆皆輕雖復變化多端而未嘗亂其法度張顛懷素最號野逸而不失此法近代山谷老人自謂得長沙三昧草書之法至是又一變矣流至于今不可復觀唐太宗云行行若縈春蚓字字如綰秋蛇惡無骨也大抵用筆有緩有急有有鋒有無鋒有承接上文有牽引下字乍徐還疾忽往復收緩以倣古急以出竒有鋒則以耀其精神無鋒則以含其氣味橫斜曲直鉤鐶盤紆皆以勢為主然不欲相帶帶則近於俗橫畫不欲太長長則轉換遲直畫不欲太多多則神癡以捺代乀以發代辵辵亦以捺代之惟丿則閒用之意盡則用懸針意盡須再生筆意不若用垂露耳用筆總論用筆如折叉股如屋漏痕如錐畫沙如壁拆此皆後人之論折叉股者欲其屈折圓而有力屋漏痕者欲其無起止之迹錐畫沙者欲其勻而藏鋒壁拆者欲其無布置之巧筆正則藏鋒筆偃則鋒出一起一倒一晦一明而神竒出焉常欲筆鋒在畫中則左右皆無病矣故一㸃一畫皆有三轉一波一拂又有三折一丿又有數樣一㸃者欲與畫相應兩㸃者欲自相應三㸃者必一㸃起一㸃帶一㸃應四㸃者一起兩帶一應筆陳圖云若平直相似狀如算子便不是書又如口音圍當行草時尤當泯其稜角以寬間圓美為佳心正則筆正意在筆前字居心後皆名言也故不得中行與其工也寧拙與其弱也寧徑與其鈍也寧速然極須陶洗俗姿則妙處自見矣大要執之欲緊運之欲活不可以指運筆當以腕運筆執之在手手不主運運之在腕腕不主執又作字者亦須知篆文須知㸃畫來歷先後知左右之不同刺刺之相異王之與玉示之與衣以至秦奉泰春形同理殊得其原本斯不浮矣孫過庭有執使轉用之法豈偶然哉用墨作楷墨欲乾然不可太燥行草則燥潤相雜潤以取妍燥以取險墨濃則筆滯燥則筆枯亦不可不知也筆欲鋒長徑而圓長則含墨可以運動徑則有力圓則妍美長而不徑不如勿長徑而不圓不如勿徑蓋紙筆墨皆書法之助也行書夷考魏晉行書自有一體與草不同大率變真以便於揮運而已草出於章行出於真雖曰行書各有定體縱復晉代諸賢亦若不相逺蘭亭記及右軍諸帖第一謝安石大令諸帖次之顔楊蘇米亦後世可觀者大要以筆老為貴少有誤失亦可輝映所貴乎濃纎閒出血脈相連筋骨老健風神灑落姿態備具真有真之態度行有行之態度草有草之態度必須博習可以兼通臨摹摹書最易唐太宗云卧王濛於紙中坐徐偃於筆下可以嗤蕭子雲唯初學書者不得不摹亦以節度其手易於成就皆須是古人名筆置之几案懸之座右朝夕諦觀思其運筆之理然後可以摹臨其次雙鉤蠟本須精意摸搨乃不失位置之美耳臨書易失古人位置而多得古人筆意摹書易得古人位置而多失古人筆意臨書易進摹書易忘經意與不經意也夫臨摹之際毫髮失真則神精頓異所貴詳謹世所有蘭亭何翅數百本而定武為最佳然定武本有數樣今取諸本參之其位置長短大小無一不同而肥瘠剛柔工拙要妙之處如人之面無有同者以此知定武石刻又未必得真蹟之風神矣字書全以風神超邁為主刻之金石其可茍哉雙鉤之法須得墨暈不出字外或廓填其內或朱其背正得肥瘦之本體雖然尤貴于瘦使工人刻之又從而刮治之則瘦者亦變為肥矣或云雙鉤時須倒置之則亦無容私意於其閒誠使下本明上紙薄倒鉤何害若下本晦上紙厚却須能書者為之發其筆意可也夫鋒芒圭角字之精神大抵雙鉤多失此又須朱其背時稍致意焉血脈字有藏鋒出鋒之異粲然盈楮欲其首尾相應上下相接為佳後學之士隨所記憶圖寫其形未能涵容皆支離而不相貫穿黃庭小楷與樂毅論不同東方畫讚又與蘭亭殊指一時下筆各有其勢固應爾也余嘗歷觀古之名書無不㸃畫振動如見其揮運之時山谷云字中有筆如禪句中有眼豈欺我哉方圓方圓者真草之體用真貴方草貴圓方者參之以圓圓者參之以方斯為妙矣然而方圓曲直不可顯顯直須涵泳一出於自然如草書尤忌橫直分明橫直多則字有積薪束葦之狀而無蕭散之氣向背向背者如人之顧盼指畫相揖向背發於左者應於右起於上者伏於下大要㸃畫之閒施設各有情理求之古人惟王右軍為妙位置假如立人挑土田王衣示一切偏傍皆須令狹長則右有餘地矣在右者亦然疏密書以疏為風神密為老氣如佳之四橫川之三直魚之四㸃畫之九畫必須下筆徑靜疏密停勻為佳當疏不疏反成寒乞當密不密必至凋疏風神風神者一須人品高二須師法古三須紙筆佳四須險徑五須高明六須潤澤七須向背得宜八須時出新意則自然長者如秀整之士短者如精悍之徒瘦者如山澤之臞肥者如貴游之子徑者如武夫媚者如美女欹斜如醉仙端楷如賢士遲速遲以取妍速以取徑先必能速然後為遲若素不能速而專事遲則無神氣若專事速又多失勢明朝豐道生筆論雙鉤懸腕讓左側右虛掌實指意前筆後此古人所傳用筆之訣也如屋漏雨如壁拆如印印泥如錐畫沙如折叉股此古人所論作書之勢也然妙在第四指得力俯仰進退收往垂縮剛柔曲直縱橫轉運無不如意則筆在畫中而左右皆無病矣簡緣云人所未發此法鍾王之後惟藏真懷素得之為多庶幾於是者唐則伯施虞世南信本歐陽詢登善禇遂良䖍禮孫過庭紹京鍾泰和李雍伯高張旭清臣顔真卿誠懸栁公權五季則景度楊凝式重光李後主煜宋則君謨蔡襄元章米芾元則子山巙巙子昻趙孟俯本朝則仲珩宋璲貞伯李應楨希哲祝允明數人而已書雖小學然非師法古而用功深豈能成字古今論者衆矣或泛而寡要茲發其祕云學書者既知用筆之訣尤須博觀古帖於結構布置行閒疏密照應起伏正變巧拙無不默識於心務使下筆之際無一㸃一畫不自法帖中來然後能成家數今人不聞古法不見古帖妄以小慧杜撰為書或體勢俗惡或鋒毫側戾邪氣洋溢流俗慕其時名更相效習轉成畫虎此古法之所以益泯也古人以書名者必通篆籕然後結構淳古使轉徑利如蔡雍張芝鍾繇梁鵠韋誕等皆若日月宣光山川布理巨細隱顯縱橫高下不容一毫私智為之而方圓鉤殺溫潤雄俊錯綜開合粲然成章非天地自然之文其孰能與於此篆籕所以為諸體之本也八分者蔡琰曰存篆八分入隸二分故謂之八分隸者今之真書也自歐陽修妄以八分為隸而洪適因之於是分隸之名始混書有筋骨血肉筋生於腕腕能懸則筋衇相連而有勢骨生於指指能實則骨體堅定而不弱血生於水肉生於墨水須新汲墨須新磨則燥濕調勻而肥瘦適可然大要先知筆訣斯衆美從之矣雙鉤懸腕者食指中指圓曲於鉤與拇指相齊而撮管於指尖則執筆挺直大字運上腕小字運下腕不使肉襯於紙則運筆如飛讓左側右者左肘讓而居外右手側而過中常使筆管與鼻準相對則行閒直下而無傾側欹斜之患虛掌實指者指不實則顫掣無準掌不虛則窒礙無勢三指齊撮於上而第四指拉管於下無垂不縮無往不收一畫之閒變起伏於鋒杪一㸃之內齊衄挫於毫芒意前筆後者熟記古帖於字形大小偃仰平直疏密纎濃藴藉於隨物賦形各得其理昔鍾元常見宋翼而厲聲衛夫人掣逸少肘而悲泣知此則知用筆之妙無出四言者矣無垂不縮無往不留則如屋漏雨言不露圭角也連而不犯和而不同帶燥方潤將濃遂枯則如壁拆言布置之巧出于自然也指實臂懸筆有全力擫衄頓挫書必入木則如印印泥言方圓深厚而不輕浮也㸃必隱鋒波必三折肘下風生起止無迹則如錐畫沙言徑利峻拔而不凝滯也水墨得所肉勻骨徑泯規矩於方圓遁鉤繩於曲直則如折叉股言嚴重混厚而不為蛇蚓之態也明乎此則書之風神氣勢信手萬變逸態橫生所謂取之左右而逢其源矣今人所喜效而習之者或云筆畫老硬或云行閒整媚或云用墨鮮濃殊不知老硬者古所謂怒張傾仄非盛德君子之容也整媚者古所謂狀如算子便不是書也鮮濃者古所謂無筋無力者謂之墨豬也然則今之所喜皆古之所惡古之所忌乃今之所趨古今不同如晝夜寒暑之相反豈不信然簡緣云所以然者以今人不知篆籕之理來處淺俗所以愈趨愈下也書法正傳卷七
