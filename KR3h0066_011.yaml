body:
  text: 正書以鍾王為鼻祖至李唐而其法大闡自後衣鉢相傳工者甚夥近代如趙董二文敏其尤也吾虞馮鈍吟先生肆力於此鍾王瓣香其在茲乎鈍吟傳我簡縁夫子憶少時追隨函丈夫子以翰林要訣及古人結構運筆口授手指亹亹不倦畧無遺藴予不敏强識一二未登道岸秪恐失墜夫子晚嵗博採歴代諸名家要訣參以己見勒成十冊曰書法正傳鎔碎金而成佛聚狐白以為裘洵後學之津梁書家之寳筏也其從孫調軒雲亭兩君克承先志夀以棗棃公諸海内佇見劃沙印泥揮毫者競窺其秘漏痕釵脚握管者悉悟其微矣受業門人譚紹隆謹識書法正傳十卷予從祖簡縁先生編集先生於晉唐以來諸名家臨池秘􅛱悉窺其奥而又得先曾叔祖鈍吟公提命登堂入室耄而彌工予自束髪受書竊聞緒論謂古人理法寓於楮墨非徴文考獻末由悟入學者茍指授無人而又不得名流論說幾何不徬徨岐途廢然中止也邪徧考諸家之書非不鉤其𤣥妙要未有統論古今辨晰源流使後之覽者恍然得古人之意以馳騁乎康莊之途者也是編闡明絶業鍾王一燈賴以不墜嘉惠後學豈淺鮮哉而先生謝塵已逾廿載予恐是書之將就湮滅也欲思所以夀世者舍弟雄與予有同志因共相參校以付剞劂姪孫鼎謹識
